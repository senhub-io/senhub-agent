<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="agent-key" content="{{.AgentKey}}">
    <title>SenHub Agent - API Explorer</title>
    
    <!-- CSS Assets -->
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/variables.css">
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/base.css">
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/layout.css">
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/forms.css">
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/buttons.css">
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/components.css">
</head>
<body>
    <div class="header">
        <h1>
            <img src="/web/{{.AgentKey}}/assets/logo.png" alt="SenHub Agent" class="logo">
            API Explorer
        </h1>
        <div class="nav-breadcrumb">
            <a href="/web/{{.AgentKey}}/">Dashboard</a> / API Explorer
        </div>
    </div>
    
    <div class="container">
        <div class="explorer-grid">
            <!-- Request Builder -->
            <div class="card">
                <h2>Request Builder</h2>
                
                <div class="form-group">
                    <label class="form-label" for="endpoint-type">Endpoint Type</label>
                    <select id="endpoint-type" class="form-select">
                        <option value="">Loading endpoints...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="probe-select">Probe</label>
                    <select id="probe-select" class="form-select">
                        <option value="">Loading probes...</option>
                    </select>
                </div>
                
                <div class="form-group" id="tag-filters-group" style="display: none;">
                    <label class="form-label">Tag Filters</label>
                    <div id="tag-filters">
                        <!-- Dynamic tag filters will be loaded here -->
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Generated URL</label>
                    <div id="generated-url" class="url-generator">
                        Select an endpoint and probe to generate URL...
                    </div>
                    <input type="text" id="manual-url" class="form-input" 
                           style="display: none; margin-top: 0.5rem;" 
                           placeholder="Edit URL manually for advanced filtering...">
                    
                    <div class="button-group">
                        <button id="edit-url-btn" class="btn btn-secondary" disabled>
                            ✏️ Edit URL
                        </button>
                        <button id="copy-url-btn" class="btn btn-secondary" disabled>
                            📋 Copy URL
                        </button>
                        <button id="test-request-btn" class="btn btn-primary" disabled>
                            🚀 Test Request
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Response -->
            <div class="card">
                <h2>Response</h2>
                <div id="response-area" class="result-area centered">
                    <span class="placeholder-text">Click "Test Request" to see the response...</span>
                </div>
                <div class="button-group">
                    <button id="copy-response-btn" class="btn btn-secondary" disabled>
                        📋 Copy Response
                    </button>
                    <button id="clear-response-btn" class="btn btn-secondary">
                        🗑️ Clear
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- JavaScript Assets -->
    <script>
        // Make agent key available globally
        window.AGENT_KEY = '{{.AgentKey}}';
    </script>
    <script src="/web/{{.AgentKey}}/assets/js/base.js"></script>
    <script src="/web/{{.AgentKey}}/assets/js/tag-filters.js"></script>
    <script src="/web/{{.AgentKey}}/assets/js/api-explorer.js"></script>
</body>
</html>
