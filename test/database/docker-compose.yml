# SenHub Agent — database probes integration fixture
#
# Run with: make test-database
#
# Two engines, exposed on local ports so the build tag tests on the
# host point at them directly. Credentials are deliberately simple
# (root/test, postgres/test) because nothing here is production —
# the fixture lives for the duration of the test run.

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: appdb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-ptest"]
      interval: 5s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
