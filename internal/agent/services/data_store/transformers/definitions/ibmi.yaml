    unit: "#"
    category: "security"

  - name: "ibmi.sysval.audit_level"
    channel: "ibmi_sysval_audit_level"
    display_name: "QAUDLVL"
    unit: "#"
    category: "security"

  - name: "ibmi.library_list.position"
    channel: "ibmi_liblist_position"
    display_name: "Library {library} ({type})"
    unit: "#"
    category: "config"
    multi_instance_labels: ["library", "type"]

  - name: "ibmi.license.licensed_user_count"
    channel: "ibmi_license_user_count"
    display_name: "Licensed Users — {product_id}"
    unit: "#"
    category: "config"
    multi_instance_labels: ["product_id", "feature_id"]

  - name: "ibmi.license.usage_limit"
    channel: "ibmi_license_usage_limit"
    display_name: "License Usage Limit — {product_id}"
    unit: "#"
    category: "config"
    multi_instance_labels: ["product_id", "feature_id"]

  - name: "ibmi.ptf_group.installed"
    channel: "ibmi_ptf_group_installed"
    display_name: "PTF Group — {group}"
    unit: "#"
    category: "compliance"
    multi_instance_labels: ["group"]

  - name: "ibmi.ptf_group.level"
    channel: "ibmi_ptf_group_level"
    display_name: "PTF Group Level — {group}"
    unit: "#"
    category: "compliance"
    multi_instance_labels: ["group"]

  - name: "ibmi.watch.session_active"
    channel: "ibmi_watch_session"
    display_name: "Watch Session — {session_id}"
    unit: "#"
    category: "compliance"
    multi_instance_labels: ["session_id", "program"]

  # ============================================================
  # Events (history log, QSYSOPR, audit)
  # ============================================================
  - name: "ibmi.message_queue.event"
    channel: "ibmi_msgq_event"
    display_name: "QSYSOPR Message"
    unit: "#"
    category: "events"

  - name: "ibmi.history_log.event"
    channel: "ibmi_history_event"
    display_name: "QHST Event"
    unit: "#"
    category: "events"

  - name: "ibmi.audit_journal.event"
    channel: "ibmi_audit_event"
    display_name: "Audit Event"
    unit: "#"
    category: "events"

  # ============================================================
  # Probe self-observability
  # ============================================================
  - name: "ibmi.collector.success_total"
    channel: "ibmi_collector_success"
    display_name: "Collector Success — {collector}"
    unit: "#"
    category: "health"
    multi_instance_labels: ["collector"]

  - name: "ibmi.collector.failure_total"
    channel: "ibmi_collector_failure"
    display_name: "Collector Failure — {collector}"
    unit: "#"
    category: "health"
    multi_instance_labels: ["collector"]

  - name: "ibmi.collector.last_duration_ms"
    channel: "ibmi_collector_duration"
    display_name: "Collector Duration — {collector}"
    unit: "ms"
    category: "health"
    multi_instance_labels: ["collector"]

  - name: "ibmi.collector.last_success_timestamp"
    channel: "ibmi_collector_last_success"
    display_name: "Collector Last Success — {collector}"
    unit: "s"
    category: "health"
    multi_instance_labels: ["collector"]
