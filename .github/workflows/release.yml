name: Release
on:
  push:
    tags:
      - '*.*.*'
permissions:
  contents: write
  packages: write
jobs:
  release:
    # Skip if tag contains 'beta'
    if: ${{ !contains(github.ref, 'beta') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check which branch the tag was pushed from
        id: check_branch
        run: |
          git fetch --all
          BRANCH=$(git branch -r --contains ${{ github.sha }} | grep -v HEAD | sed 's/^[ \t]*origin\///')
          echo "Current branch for tag: $BRANCH"
          if [[ "$BRANCH" == "master" ]]; then
            echo "IS_MASTER=true" >> $GITHUB_ENV
            echo "Creating production release for tag from master branch"
          else
            echo "IS_MASTER=false" >> $GITHUB_ENV
            echo "Skipping - tag not from master branch"
            exit 1
          fi
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.0'
      - name: Get Go Version
        id: go_version
        run: |
          GO_VERSION=$(go version | cut -d' ' -f3)
          echo "GO_VERSION=$GO_VERSION" >> $GITHUB_ENV
      - name: Get Tag Version
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "TAG=$TAG" >> $GITHUB_ENV
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GOVERSION: ${{ env.GO_VERSION }}
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          files: |
            dist/senhub-agent_linux_*
            dist/senhub-agent_windows_*
            dist/senhub-agent_darwin_*
            dist/metadata.json
          generate_release_notes: false
