name: Deploy Documentation

on:
  push:
    branches: [dev, master]
    paths:
      - 'docs/user-guide/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs source (senhub-agent)
        uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 0

      # The versioned docs are published into the landing repo under /docs via
      # mike, which operates on a checkout of that repo. DOCS_DEPLOY_TOKEN must
      # have Contents:write on senhub-io/agent.senhub.io.
      - name: Checkout deploy target (agent.senhub.io)
        uses: actions/checkout@v4
        with:
          repository: senhub-io/agent.senhub.io
          token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          path: site
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material + mike (pinned)
        run: pip install "mkdocs-material==9.7.*" "mike==2.2.*"

      - name: Configure git identity
        working-directory: site
        run: |
          git config user.name "senhub-io"
          git config user.email "senhub-io@users.noreply.github.com"

      - name: Pick version line from branch
        id: ver
        run: |
          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      # Builds from the source repo's mkdocs.yml and publishes the version into
      # the landing repo's main branch under /docs. mike manages
      # /docs/<version> + /docs/versions.json and leaves the landing root alone.
      - name: Deploy with mike
        working-directory: site
        run: |
          mike deploy \
            --config-file ../src/docs/user-guide/mkdocs.yml \
            --deploy-prefix docs \
            --branch main \
            --push \
            "${{ steps.ver.outputs.version }}"
