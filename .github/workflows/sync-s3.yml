name: Sync Release to S3

on:
  release:
    types: [published]

jobs:
  sync-to-s3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup s3cmd
        run: |
          sudo apt-get update
          sudo apt-get install -y s3cmd
          mkdir -p ~/.s3cmd
          echo "[default]" > ~/.s3cfg
          echo "access_key = ${{ secrets.S3_ACCESS_KEY }}" >> ~/.s3cfg
          echo "secret_key = ${{ secrets.S3_SECRET_KEY }}" >> ~/.s3cfg
          echo "host_base = s3.rbx.io.cloud.ovh.net" >> ~/.s3cfg
          echo "host_bucket = %(bucket)s.s3.rbx.io.cloud.ovh.net" >> ~/.s3cfg
          echo "use_https = True" >> ~/.s3cfg

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Execute sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: |
          chmod +x .github/scripts/sync-to-s3.sh
          .github/scripts/sync-to-s3.sh
