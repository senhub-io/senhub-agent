# SenHub Agent - HTTPS Configuration Examples
# This file demonstrates various HTTPS/TLS configuration scenarios

# ===== BASIC HTTPS WITH AUTO-GENERATED CERTIFICATES =====
# Perfect for: Internal networks, testing, quick setup

agent:
  key: "offline-hostname-1625097600-a1b2c3d4"
  mode: offline
  generated: true

storage:
  - name: http
    params:
      port: 8443                                # HTTPS port
      bind_address: "0.0.0.0"                   # Accept external connections
      endpoints: ["prtg", "senhub", "web", "nagios"]
      
      tls:
        enabled: true                           # Enable HTTPS
        mode: "auto"                            # Auto-generate certificates
        auto_cert:
          organization: "SenHub Agent"
          common_name: "localhost"
          san_hosts:                            # Hostnames for certificate
            - "localhost"
            - "127.0.0.1"
            - "agent.company.local"
            - "192.168.1.100"
          validity_days: 365
          key_size: 2048
        min_tls_version: "1.2"                  # TLS 1.2 for compatibility

probes:
  - name: cpu
    params: {interval: 30}
  - name: memory
    params: {interval: 30}

# Access: https://agent.company.local:8443/web/{agentkey}/dashboard
# Note: Browser will show certificate warning (normal for self-signed)

---

# ===== PRODUCTION HTTPS WITH CUSTOM CERTIFICATES =====
# Perfect for: Production environments, external access, valid CA certificates

agent:
  key: "production-agent-key-12345"
  mode: offline
  generated: false

storage:
  - name: http
    params:
      port: 443                                 # Standard HTTPS port
      bind_address: "0.0.0.0"                   # All interfaces
      endpoints: ["prtg", "senhub", "web", "nagios"]
      
      tls:
        enabled: true
        mode: "provided"                        # Use provided certificates
        cert_file: "/etc/ssl/certs/agent.pem"   # Certificate file
        key_file: "/etc/ssl/private/agent.key"  # Private key file
        min_tls_version: "1.3"                  # TLS 1.3 for modern security

probes:
  - name: cpu
    params: {interval: 30}
  - name: memory
    params: {interval: 30}
  - name: network
    params: {interval: 60}
  - name: logicaldisk
    params: {interval: 30}

# Access: https://monitoring.company.com/web/{agentkey}/dashboard
# Note: No certificate warnings with valid CA certificates

---

# ===== HIGH-SECURITY ENVIRONMENT =====
# Perfect for: Government, finance, compliance requirements

agent:
  key: "secure-env-agent-key-67890"
  mode: offline
  generated: false

storage:
  - name: http
    params:
      port: 9443                                # Non-standard port for security
      bind_address: "10.0.0.100"                # Specific internal IP
      endpoints: ["senhub", "nagios"]           # Limited endpoints
      
      tls:
        enabled: true
        mode: "provided"
        cert_file: "/opt/secure/certs/agent.crt"
        key_file: "/opt/secure/keys/agent.key"
        min_tls_version: "1.3"                  # TLS 1.3 only
        cipher_suites:                          # Specific cipher suites
          - "TLS_AES_256_GCM_SHA384"
          - "TLS_CHACHA20_POLY1305_SHA256"

probes:
  - name: cpu
    params: {interval: 60}                      # Less frequent for performance
  - name: memory
    params: {interval: 60}
  
  # Hardware monitoring for critical systems
  - name: redfish
    params:
      endpoint: "https://secure-server-bmc.internal"
      username: "monitoring"
      password: "complex-secure-password"
      interval: 300
      verify_ssl: true
      collections: ["system", "thermal", "power"]

# Access: https://10.0.0.100:9443/web/{agentkey}/dashboard
# Note: Restricted cipher suites and TLS 1.3 only

---

# ===== LET'S ENCRYPT INTEGRATION EXAMPLE =====
# Perfect for: Internet-facing servers, automatic certificate management

agent:
  key: "letsencrypt-agent-key-11111"
  mode: offline
  generated: false

storage:
  - name: http
    params:
      port: 8443                                # Non-443 to avoid conflicts
      bind_address: "0.0.0.0"
      endpoints: ["prtg", "senhub", "web", "nagios", "prometheus"]
      
      tls:
        enabled: true
        mode: "provided"
        # Let's Encrypt certificate paths
        cert_file: "/etc/letsencrypt/live/agent.company.com/fullchain.pem"
        key_file: "/etc/letsencrypt/live/agent.company.com/privkey.pem"
        min_tls_version: "1.2"

probes:
  - name: cpu
    params: {interval: 30}
  - name: memory
    params: {interval: 30}
  - name: network
    params: {interval: 60}
  - name: logicaldisk
    params: {interval: 30}
  
  # Monitor external websites
  - name: ping_webapp
    params:
      url: "https://company.com"
  - name: load_webapp
    params:
      url: "https://app.company.com"
      timeout: 45

# Access: https://agent.company.com:8443/web/{agentkey}/dashboard
# Note: Valid certificate, no browser warnings

# Automatic renewal with certbot:
# 0 12 * * * /usr/bin/certbot renew --quiet --deploy-hook "systemctl restart senhub-agent"

---

# ===== REVERSE PROXY CONFIGURATION =====
# Perfect for: Load balancing, centralized SSL termination, multiple agents

agent:
  key: "proxy-backend-agent-key-22222"
  mode: offline
  generated: false

storage:
  - name: http
    params:
      port: 8080                                # HTTP backend (SSL terminated at proxy)
      bind_address: "127.0.0.1"                 # Localhost only (behind proxy)
      endpoints: ["prtg", "senhub", "web", "nagios"]
      
      tls:
        enabled: false                          # No TLS (handled by reverse proxy)

probes:
  - name: cpu
    params: {interval: 30}
  - name: memory
    params: {interval: 30}
  - name: network
    params: {interval: 60}

