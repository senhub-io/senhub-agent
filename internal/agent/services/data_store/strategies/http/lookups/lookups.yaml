# SenHub Agent - Universal Lookup Definitions
#
# This file defines state/health/enum mappings for metrics that return numeric codes.
# These lookups are format-agnostic and will be converted to:
# - PRTG: XML ValueLookup files
# - Nagios: Status text + thresholds in perfdata
# - Zabbix: Value mappings
# - Prometheus: Labels (if needed)
#
# IMPORTANT: All values are sourced from official vendor documentation.
# DO NOT invent or guess values - always reference official docs.

# ==============================================================================
# NETSCALER LOOKUPS
# ==============================================================================
# Source: Citrix ADC NITRO API Documentation
# https://docs.netscaler.com/en-us/citrix-adc/current-release/load-balancing/load-balancing-vserver-service-states.html
# https://developer-docs.netscaler.com/en-us/adc-command-reference-int/current-release/basic/service.html

netscaler.lbvserver.state:
  description: "Load Balancing Virtual Server State"
  type: status
  source: "Citrix ADC NITRO API - lbvserver curstate field"
  mappings:
    1:
      text: "DOWN"
      severity: "error"
      description: "Virtual server is not responding to health checks"
    2:
      text: "UNKNOWN"
      severity: "warning"
      description: "State cannot be determined"
    3:
      text: "BUSY"
      severity: "warning"
      description: "Virtual server is processing maximum requests"
    4:
      text: "OUT OF SERVICE"
      severity: "warning"
      description: "Virtual server is administratively disabled"
    5:
      text: "TROFS"
      severity: "warning"
      description: "Transitioning out of service (graceful shutdown)"
    7:
      text: "UP"
      severity: "ok"
      description: "Virtual server is operational"
    8:
      text: "TROFS_DOWN"
      severity: "error"
      description: "Down while transitioning out of service"
  desired_value: 7

