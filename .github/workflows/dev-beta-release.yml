name: Dev Beta Release
on:
  push:
    tags:
      - '*.*.*-beta'

permissions:
  contents: write

jobs:
  # Build the IBM i native runner first; release job waits for it so
  # the binaries can be attached as release assets. fail-fast is off
  # inside the reusable workflow — see native-runner-build.yml.
  build_native_runners:
    uses: ./.github/workflows/native-runner-build.yml

  create_beta_release:
    needs: build_native_runners
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is on dev branch
        id: check_branch
        run: |
          git fetch --all
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})
          echo "Tag commit: $TAG_COMMIT"
          DEV_BRANCH=$(git branch -r --contains $TAG_COMMIT | grep "origin/dev" || echo "")
          if [[ -n "$DEV_BRANCH" ]]; then
            echo "Tag is on dev branch, proceeding with beta release"
          else
            echo "Tag is not on dev branch, skipping"
            exit 1
          fi
          
      - name: Get tag version
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Ne pas ajouter -beta si c'est déjà présent dans le tag
          if [[ $TAG == *"-beta"* ]]; then
            BETA_TAG="$TAG"
          else
            BETA_TAG="${TAG}-beta"
          fi
          echo "Original tag: $TAG"
          echo "Beta tag: $BETA_TAG"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "BETA_TAG=$BETA_TAG" >> $GITHUB_ENV
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          
      - name: Build binaries manually
        run: |
          mkdir -p dist
          CURRENT_COMMIT=$(git rev-parse HEAD)
          CURRENT_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.%NZ")
          GO_VERSION=$(go version | cut -d' ' -f3)
          PRODUCTION_URL="https://eu-west-1.intake.senhub.io"
          DEVELOPMENT_URL="https://eu-west-1.intake-dev.senhub.io"

          # ldflags inject build-time identity used by the agent at
          # runtime (version, commit, env, default URLs).
          LDFLAGS="-s -w \
          -X 'senhub-agent.go/internal/agent/cliArgs.Version=$BETA_TAG' \
          -X 'senhub-agent.go/internal/agent/cliArgs.CommitHash=$CURRENT_COMMIT' \
          -X 'senhub-agent.go/internal/agent/cliArgs.BuildTime=$CURRENT_DATE' \
          -X 'senhub-agent.go/internal/agent/cliArgs.GoVersion=$GO_VERSION' \
          -X 'senhub-agent.go/internal/agent/cliArgs.Env=production' \
          -X 'senhub-agent.go/internal/agent/cliArgs.ProductionURL=$PRODUCTION_URL' \
          -X 'senhub-agent.go/internal/agent/cliArgs.DevelopmentURL=$DEVELOPMENT_URL'"
          echo "Using ldflags: $LDFLAGS"

          # 0.2.0+ layout: per-platform subdirectory, binary always
          # named senhub-agent[.exe] — platform identity carried by
          # the ZIP wrapper, not the file name.
          build_one() {
            local goos="$1" goarch="$2" binname="$3"
            local outdir="dist/${goos}-${goarch}"
            mkdir -p "$outdir"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -ldflags="$LDFLAGS" -o "$outdir/$binname" ./cmd/agent
          }
          build_one linux   amd64 senhub-agent
          build_one linux   arm64 senhub-agent
          build_one windows amd64 senhub-agent.exe
          build_one darwin  amd64 senhub-agent
          build_one darwin  arm64 senhub-agent

          # Wrap each binary in an OS-named ZIP. The release attaches
          # the ZIPs only — operators that want a raw binary unzip
          # locally.
          ( cd dist/linux-amd64    && zip ../senhub-agent-linux-amd64.zip   senhub-agent )
          ( cd dist/linux-arm64    && zip ../senhub-agent-linux-arm64.zip   senhub-agent )
          ( cd dist/windows-amd64  && zip ../senhub-agent-windows-amd64.zip senhub-agent.exe )
          ( cd dist/darwin-amd64   && zip ../senhub-agent-darwin-amd64.zip  senhub-agent )
          ( cd dist/darwin-arm64   && zip ../senhub-agent-darwin-arm64.zip  senhub-agent )

          echo "Contents of dist directory:"
          ls -la dist

          # Smoke check: run --version against the linux/amd64 binary
          # (we're on a linux runner so this is the one we can exec).
          chmod +x dist/linux-amd64/senhub-agent
          dist/linux-amd64/senhub-agent version || true
          

          # Create metadata.json
          echo "Creating metadata.json"
          CURRENT_COMMIT=$(git rev-parse HEAD)
          CURRENT_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.%NZ")
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 $CURRENT_COMMIT^ 2>/dev/null || echo "0.0.0")
          
          echo '{
            "project_name": "senhubagent",
            "tag": "'$BETA_TAG'",
            "previous_tag": "'$PREVIOUS_TAG'",
            "version": "'$BETA_TAG'",
            "commit": "'$CURRENT_COMMIT'",
            "date": "'$CURRENT_DATE'",
            "runtime": {
              "goos": "linux",
              "goarch": "amd64"
            }
          }' > dist/metadata.json
          
          # Create releases directory if it doesn't exist
          mkdir -p dist/releases
          
          # Create or update releases.json
          echo "Creating releases.json"
          echo '[
            {
              "project_name": "senhubagent",
              "tag": "'$BETA_TAG'",
              "previous_tag": "'$PREVIOUS_TAG'",
              "version": "'$BETA_TAG'",
              "commit": "'$CURRENT_COMMIT'",
              "date": "'$CURRENT_DATE'",
              "runtime": {
                "goos": "linux",
                "goarch": "amd64"
              }
            }
          ]' > dist/releases/releases.json
          
      - name: Create and push beta tag
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Vérifier si le tag existe déjà
          if ! git tag -l | grep -q "^${{ env.BETA_TAG }}$"; then
            # Create the beta tag and push it
            git tag ${{ env.BETA_TAG }}
            git push origin ${{ env.BETA_TAG }}
          else
            echo "Le tag ${{ env.BETA_TAG }} existe déjà, on l'utilise directement"
          fi
          
      # Pull the IBM i native binaries built in build_native_runners.
      # Each matrix job uploaded its artifact under jt400runner-<os>-<arch>;
      # pattern + merge-multiple flattens them into dist/native/ which we
      # then move next to the agent binaries so the release files: list
      # picks them up as siblings.
      - name: Download native runners
        uses: actions/download-artifact@v4
        with:
          pattern: 'jt400runner-*'
          path: dist/native
          merge-multiple: true
        continue-on-error: true
      - name: Stage native runners into dist/
        run: |
          if [ -d dist/native ]; then
            cp -v dist/native/jt400runner-* dist/ 2>/dev/null || echo "no native binaries to stage"
            ls -la dist/jt400runner-* 2>/dev/null || true
          fi

      - name: Create Beta Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.BETA_TAG }}
          name: Beta Release ${{ env.BETA_TAG }}
          # 0.2.0+ release asset list: ZIPs only, no raw binaries.
          # Each ZIP holds a single senhub-agent / senhub-agent.exe
          # entry (no platform suffix inside). The two
          # jt400runner-linux-* entries are the IBM i bridge native
          # binaries — kept raw because they're consumed by the
          # agent at runtime, not the auto-updater.
          files: |
            dist/senhub-agent-linux-amd64.zip
            dist/senhub-agent-linux-arm64.zip
            dist/senhub-agent-windows-amd64.zip
            dist/senhub-agent-darwin-amd64.zip
            dist/senhub-agent-darwin-arm64.zip
            dist/jt400runner-linux-amd64
            dist/jt400runner-linux-arm64
            dist/metadata.json
            dist/releases/releases.json
          generate_release_notes: false
          prerelease: true

      - name: Update 'latest-beta' tag to point to this beta release
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Delete the existing 'latest-beta' tag locally and remotely
          git tag -d latest-beta 2>/dev/null || true
          git push origin :refs/tags/latest-beta 2>/dev/null || true

          # Create new 'latest-beta' tag pointing to current commit
          git tag latest-beta

          # Push the new 'latest-beta' tag (force to overwrite if it exists)
          git push origin latest-beta --force

          echo "✓ Tag 'latest-beta' updated to point to ${{ env.BETA_TAG }} (commit: $(git rev-parse HEAD))"