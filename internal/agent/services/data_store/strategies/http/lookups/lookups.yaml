# ==============================================================================
# VEEAM LOOKUPS
# ==============================================================================
# Source: Veeam Backup & Replication REST API v1.3-rev1 (ESessionResult, EInstalledLicenseStatus)

senhub.veeam.job_status:
  description: "Veeam Job Status"
  type: status
  source: "Veeam REST API v1.3 - ESessionResult enum + agent-side derivation (Running/NeverRun/Stale)"
  mappings:
    0:
      text: "NEVER_RUN"
      severity: "warning"
      description: "Job is enabled but has never executed — worth verifying schedule"
    1:
      text: "SUCCESS"
      severity: "ok"
      description: "Job completed successfully"
    2:
      text: "WARNING"
      severity: "warning"
      description: "Job completed with warnings"
    3:
      text: "FAILED"
      severity: "error"
      description: "Job failed"
    4:
      text: "RUNNING"
      severity: "ok"
      description: "Job is currently running — normal operation"
    5:
      text: "STALE"
      severity: "warning"
      description: "Last run is older than the configured hours_to_check window — backup cadence may have drifted"
  desired_value: 1

senhub.veeam.license_status:
  description: "Veeam License Status"
  type: status
  source: "Veeam REST API v1.3 - EInstalledLicenseStatus enum"
  mappings:
    0:
      text: "VALID"
      severity: "ok"
      description: "License is valid"
    1:
      text: "EXPIRED"
      severity: "error"
      description: "License has expired"
    2:
      text: "INVALID"
      severity: "error"
      description: "License is invalid"
  desired_value: 0

senhub.veeam.proxy_status:
  description: "Veeam Proxy Status"
  type: status
  source: "Veeam REST API v1.3 - ProxyStateModel isDisabled/isOnline"
  mappings:
    0:
      text: "DISABLED"
      severity: "warning"
      description: "Proxy is disabled"
    1:
      text: "OFFLINE"
      severity: "error"
      description: "Proxy is enabled but offline"
    2:
      text: "ONLINE"
      severity: "ok"
      description: "Proxy is enabled and online"
  desired_value: 2

senhub.veeam.bottleneck:
  # The bottleneck is diagnostic information — by design, every backup session
  # has some stage that is the slowest (Source / Proxy / Network / Target). A
  # backup running normally and writing as fast as the storage can absorb is
  # reported as TARGET, which is the expected state for a well-sized job. We
  # therefore keep the label visible to operators but never raise a severity
  # event from it. If a customer wants performance alerts they should consume
  # this metric in a Grafana threshold, not as a PRTG status channel.
  description: "Veeam Session Bottleneck (informational, never raises an alert)"
  type: status
  source: "Veeam REST API v1.3 - ESessionBottleneckType enum"
  mappings:
    0:
      text: "NONE"
      severity: "ok"
      description: "No bottleneck detected"
    1:
      text: "SOURCE"
      severity: "ok"
      description: "Bottleneck at source (proxy, network, or WAN) — informational"
    2:
      text: "PROXY"
      severity: "ok"
      description: "Bottleneck at backup proxy — informational"
    3:
      text: "NETWORK"
      severity: "ok"
      description: "Bottleneck in network or throttling — informational"
    4:
      text: "TARGET"
      severity: "ok"
      description: "Bottleneck at target (proxy, network, WAN, or disk) — informational"

senhub.veeam.server_status:
  description: "Veeam Managed Server Status"
  type: status
  source: "Veeam REST API v1.3 - EManagedServersStatus enum"
  mappings:
    0:
      text: "UNAVAILABLE"
      severity: "error"
      description: "Server is unavailable"
    1:
      text: "AVAILABLE"
      severity: "ok"
      description: "Server is available"
  desired_value: 1

