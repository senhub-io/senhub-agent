# Redfish Probe Configuration Examples

# Basic configuration example
basic_config:
  probes:
    redfish:
      enabled: true
      endpoint: "https://bmc-server.example.com"
      username: "admin"
      password: "password123"
      interval: 300  # 5 minutes

# Dell iDRAC configuration example
dell_idrac_config:
  probes:
    redfish:
      enabled: true
      endpoint: "https://idrac-server.example.com/redfish"
      username: "root"
      password: "calvin"
      interval: 300
      verify_ssl: false  # Common with self-signed certs
      collections:
        - system
        - thermal
        - power
        - processor
        - memory
        - storage
        - drives
        - networkadapter

# HPE iLO configuration example
hpe_ilo_config:
  probes:
    redfish:
      enabled: true
      endpoint: "https://ilo-server.example.com" 
      username: "admin"
      password: "strong-password"
      interval: 600
      collections:
        - system
        - thermal
        - power
        - processor
        - memory

# Lenovo XClarity configuration example
lenovo_config:
  probes:
    redfish:
      enabled: true
      endpoint: "https://xcc-server.example.com"
      username: "USERID"
      password: "PASSW0RD"
      interval: 300
      collections:
        - system
        - thermal
