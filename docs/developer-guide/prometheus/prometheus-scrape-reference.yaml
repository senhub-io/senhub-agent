# Configuration de scrape de référence — SenHub Agent
#
# Exemples pour Prometheus, vmagent (VictoriaMetrics) et Grafana Agent.
# Le port et l'URL correspondent à la config HTTP de l'agent.

# ============================================================
# Prometheus — prometheus.yml
# ============================================================

