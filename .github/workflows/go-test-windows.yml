name: Go-test-windows
on: [push, pull_request]

env:
  SENHUB_KEY: "test-key"

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22.x"

      - name: Test with the Go CLI
        run: make test
      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          ENV: production
        run: make build
      - name: Test CLI
        run: .\scripts\test_windows_service.ps1
