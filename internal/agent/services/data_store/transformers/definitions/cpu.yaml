probe_name: "cpu"
friendly_name: "CPU Metrics"
version: "3.0.0"
host_level: true

# Format v3 — OTel-first source of truth:
#   otel:              semantic convention (source of truth)
#   tag_to_attribute:  mapping of cache tag names → OTel attribute names
# Retro-compat fields (channel, display_name, category, multi_instance_labels, description) unchanged.

metrics:
  # ─────────────────────────────────────────────────────────────────────────
  # CPU time cumulative (Linux/Unix — /proc/stat counters)
  # OTel: system.cpu.utilization (gauge, ratio) with cpu.mode attribute
  #
  # NOTE: deviation from OTel semconv `system.cpu.time` (a cumulative
  # counter in seconds). Both probes here emit instantaneous per-mode
  # percentages: Unix computes the delta of cpu.Times() between two
  # collections; Windows reads `\Processor\% User Time` etc. from PDH
  # which is already a rate. Exposing them as utilization gauges
  # (ratio 0-1) is the honest description of what the agent actually
  # measures and matches what PRTG/Nagios users expect to see on the
  # corresponding channels.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cpu_user"
    channel: "cpu_user_time"
    display_name: "CPU User"
    unit: "%"
    category: "usage_breakdown"
    description: "Percentage of CPU time spent running user-space processes"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: user

  - name: "cpu_system"
    channel: "cpu_system_time"
    display_name: "CPU System"
    unit: "%"
    category: "usage_breakdown"
    description: "Percentage of CPU time spent running kernel-space operations"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: system

  - name: "cpu_idle"
    channel: "cpu_idle_time"
    display_name: "CPU Idle"
    unit: "%"
    category: "usage_breakdown"
    description: "Percentage of CPU time spent idle with no pending work"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: idle

  - name: "cpu_nice"
    channel: "cpu_nice_time"
    display_name: "CPU Nice"
    unit: "%"
    category: "usage_breakdown"
    description: "Percentage of CPU time spent running low-priority user-space processes"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: nice

  - name: "cpu_iowait"
    channel: "cpu_iowait_time"
    display_name: "CPU IO Wait"
    unit: "%"
    category: "usage_breakdown"
    description: "Percentage of CPU time spent waiting for I/O operations to complete"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: iowait

  - name: "cpu_irq"
    channel: "cpu_irq_time"
    display_name: "CPU Irq"
    unit: "%"
    category: "usage_breakdown"
    description: "Percentage of CPU time spent handling hardware interrupts"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: interrupt

  - name: "cpu_softirq"
    channel: "cpu_softirq_time"
    display_name: "CPU Softirq"
    unit: "%"
    category: "usage_breakdown"
    description: "Percentage of CPU time spent handling software interrupts"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: softirq

  - name: "cpu_steal"
    channel: "cpu_steal_time"
    display_name: "CPU Steal"
    unit: "%"
    category: "usage_breakdown"
    description: "Percentage of CPU time stolen by the hypervisor for other virtual machines"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: steal

  # ─────────────────────────────────────────────────────────────────────────
  # CPU utilization (cross-platform — instantaneous %)
  # OTel: system.cpu.utilization (gauge, ratio) — mapper converts % → 0-1
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cpu_usage_total"
    channel: "cpu_usage_total"
    display_name: "CPU Total Usage"
    unit: "%"
    category: "usage"
    description: "Overall CPU utilization across all cores"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge

  # Per-core CPU Usage (cross-platform)
  - name: "cpu_core_usage"
    channel: "cpu_core_usage"
    display_name: "CPU Core {core} Usage"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["core"]
    description: "CPU usage percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
    tag_to_attribute:
      core: cpu.logical_number

  - name: "cpu_core_user"
    channel: "cpu_core_user"
    display_name: "CPU Core {core} User"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["core"]
    description: "CPU user time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: user
    tag_to_attribute:
      core: cpu.logical_number

  - name: "cpu_core_system"
    channel: "cpu_core_system"
    display_name: "CPU Core {core} System"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["core"]
    description: "CPU system time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: system
    tag_to_attribute:
      core: cpu.logical_number

  - name: "cpu_core_irq"
    channel: "cpu_core_irq"
    display_name: "CPU Core {core} IRQ"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["core"]
    description: "CPU interrupt time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: interrupt
    tag_to_attribute:
      core: cpu.logical_number

  - name: "cpu_core_softirq"
    channel: "cpu_core_softirq"
    display_name: "CPU Core {core} SoftIRQ"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["core"]
    description: "CPU soft interrupt time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: softirq
    tag_to_attribute:
      core: cpu.logical_number

  # ─────────────────────────────────────────────────────────────────────────
  # Windows system-wide DPC/IRQ rates and queue length
  # Extensions senhub.system.cpu.* — see semantic-conventions §4.1.3
  #
  # Historical note: this section previously also defined raw PDH-name
  # entries (processor_time, user_time, privileged_time, interrupt_time,
  # dpc_time) intended to route Windows _Total percentages to
  # system.cpu.utilization. The Windows probe renames those PDH names
  # to cpu_user / cpu_system / cpu_irq / cpu_softirq / cpu_usage_total
  # BEFORE pushing to the cache, so the raw entries were never reached.
  # They were removed in May 2026 along with the cpu_user/cpu_system
  # remap to system.cpu.utilization (now correct for both Unix derived
  # percentages and Windows PDH percentages).
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cpu_dpc_rate"
    channel: "cpu_dpc_rate"
    display_name: "CPU DPC Rate"
    unit: "#"
    category: "system_counters"
    description: "Deferred Procedure Calls per second"
    otel:
      name: senhub.system.cpu.dpcs
      unit: "1/s"
      type: gauge

  - name: "cpu_dpc_queued"
    channel: "cpu_dpc_queued"
    display_name: "CPU DPC Queued"
    unit: "/s"
    category: "system_counters"
    description: "DPCs queued per second"
    otel:
      name: senhub.system.cpu.dpcs_queued
      unit: "1/s"
      type: gauge

  - name: "cpu_interrupts"
    channel: "cpu_interrupts"
    display_name: "CPU Interrupts"
    unit: "/s"
    category: "system_counters"
    description: "CPU interrupts per second"
    otel:
      name: senhub.system.cpu.interrupts
      unit: "1/s"
      type: gauge

  - name: "cpu_queue_length"
    channel: "cpu_queue_length"
    display_name: "CPU Queue Length"
    unit: "#"
    category: "system_counters"
    description: "Number of threads waiting in the processor queue"
    otel:
      name: senhub.system.cpu.queue_length
      unit: "{thread}"
      type: gauge

  # ─────────────────────────────────────────────────────────────────────────
  # Load Average (Unix-family — Linux + BSD + macOS)
  #
  # Deviation from OTEP 0119, which scopes load average to
  # system.linux.cpu.load_* — but the probe also emits these on macOS
  # via sysctl(vm.loadavg). Using system.linux.* on a darwin host
  # produces misleading metric names. We drop the linux. infix so the
  # name matches the actual data and stays portable.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cpu_load1"
    channel: "cpu_load_1min"
    display_name: "CPU Load Average 1min"
    unit: "#"
    category: "load_average"
    description: "Average number of processes in the run queue over the last 1 minute"
    otel:
      name: system.cpu.load_1m
      unit: "{thread}"
      type: gauge

  - name: "cpu_load5"
    channel: "cpu_load_5min"
    display_name: "CPU Load Average 5min"
    unit: "#"
    category: "load_average"
    description: "Average number of processes in the run queue over the last 5 minutes"
    otel:
      name: system.cpu.load_5m
      unit: "{thread}"
      type: gauge

  - name: "cpu_load15"
    channel: "cpu_load_15min"
    display_name: "CPU Load Average 15min"
    unit: "#"
    category: "load_average"
    description: "Average number of processes in the run queue over the last 15 minutes"
    otel:
      name: system.cpu.load_15m
      unit: "{thread}"
      type: gauge

  # ─────────────────────────────────────────────────────────────────────────
  # Process count — cross-OS gauge of all processes on the host.
  # Maps to OTel `system.processes.count` per OTel system semconv.
  # Used by the SenHub Linux/Windows host dashboards' "running
  # processes" panel.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cpu_processes_total"
    channel: "processes_total"
    display_name: "Processes Total"
    unit: "#"
    category: "processes"
    description: "Total number of processes on the host."
    otel:
      name: system.processes.count
      unit: "{process}"
      type: gauge

tag_metadata:
  core:
    type: resource
    label: "CPU Core"
  instance:
    type: resource
    label: "CPU Instance"
  # System tags (injected by framework)
  host:
    type: resource
    label: "Host"
  os:
    type: resource
    label: "Operating System"
  platform:
    type: resource
    label: "Platform"
  probe_name:
    type: resource
    label: "Probe Name"
  probe_type:
    type: resource
    label: "Probe Type"
