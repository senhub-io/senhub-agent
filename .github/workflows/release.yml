name: Release
on:
  push:
    branches:
      - master
permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.0'
      - name: Get Go Version
        id: go_version
        run: |
          GO_VERSION=$(go version | cut -d' ' -f3)
          echo "GO_VERSION=$GO_VERSION" >> $GITHUB_ENV
      - name: Get Version
        id: get_version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo $LAST_TAG | cut -d. -f1)
          MINOR=$(echo $LAST_TAG | cut -d. -f2)
          PATCH=$(echo $LAST_TAG | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEW_TAG="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "new_version=$NEW_TAG" >> $GITHUB_OUTPUT
      - name: Create Tag
        run: |
          git tag ${{ env.NEW_TAG }}
          git push origin ${{ env.NEW_TAG }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --rm-dist
        env:
          GOVERSION: ${{ env.GO_VERSION }}
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          files: |
            dist/senhub-agent_Linux_*
            dist/senhub-agent_Windows_*
            dist/senhub-agent_Darwin_*
          generate_release_notes: false
      - name: Install s3cmd
        run: |
          sudo apt-get update
          sudo apt-get install -y s3cmd
      - name: Configure s3cmd
        run: |
          echo "[default]
          access_key = ${{ secrets.OVH_S3_KEY_ID }}
          secret_key = ${{ secrets.OVH_S3_SECRET_KEY }}
          host_base = s3.rbx.io.cloud.ovh.net
          host_bucket = %(bucket)s.s3.rbx.io.cloud.ovh.net
          use_https = True" > ~/.s3cfg
      - name: Sync to OVH S3
        run: |
          # Fonctions de logging avec couleurs
          function log_info() { echo "::info::$1"; }
          function log_success() { echo "::notice::$1"; }
          function log_error() { echo "::error::$1"; }

          # Configuration du bucket
          S3_BUCKET="${{ secrets.OVH_S3_BUCKET_NAME }}"

          log_info "Démarrage de la synchronisation vers OVH S3"
          log_info "Version: ${{ env.NEW_TAG }}"

          # Sync des fichiers vers le dossier versionné
          if s3cmd sync dist/ s3://${S3_BUCKET}/${{ env.NEW_TAG }}/; then
            log_success "Synchronisation vers ${{ env.NEW_TAG }} réussie"

            # Mise à jour du dossier "latest"
            if s3cmd sync s3://${S3_BUCKET}/${{ env.NEW_TAG }}/ s3://${S3_BUCKET}/latest/; then
              log_success "Mise à jour du dossier 'latest' réussie"
            else
              log_error "Erreur lors de la mise à jour du dossier 'latest'"
              exit 1
            fi
          else
            log_error "Erreur lors de la synchronisation vers S3"
            exit 1
          fi
