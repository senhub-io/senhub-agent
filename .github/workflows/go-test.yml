name: Go-test
on:
  push:
    branches: [dev, master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.keys/**'
  pull_request:
    branches: [dev, master]
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: make build
      - name: Vet
        run: go vet ./...
      - name: Test
        run: make test
