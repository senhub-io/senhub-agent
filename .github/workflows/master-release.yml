name: Master Release
on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  create_release:
    # Only run when PR is merged, not when it's closed without merging
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get latest tag and create production version
        id: get_tag
        run: |
          # Get the latest semver beta tag (sorted by version, not by commit ancestry)
          LATEST_TAG=$(git tag --list '*.*.*-beta' | sort -V | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No beta tag found, falling back to git describe"
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0-beta")
          fi
          echo "Latest tag found: $LATEST_TAG"

          # Remove -beta suffix to create production version
          # Example: 0.1.63-beta -> 0.1.63
          PROD_TAG=${LATEST_TAG%-beta}

          echo "Production version: $PROD_TAG"
          echo "TAG=$PROD_TAG" >> $GITHUB_ENV

          # Create the production tag if it doesn't exist
          if ! git tag -l | grep -q "^$PROD_TAG$"; then
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git tag $PROD_TAG
            git push origin $PROD_TAG
            echo "Created and pushed new tag: $PROD_TAG"
          else
            echo "Tag $PROD_TAG already exists"
          fi
          
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.1'
          
      - name: Build binaries manually
        run: |
          # Create dist directory
          mkdir -p dist
          
          # Get build information
          CURRENT_COMMIT=$(git rev-parse HEAD)
          CURRENT_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.%NZ")
          GO_VERSION=$(go version | cut -d' ' -f3)
          
          # Set API URLs
          PRODUCTION_URL="https://eu-west-1.intake.senhub.io"
          DEVELOPMENT_URL="https://eu-west-1.intake-dev.senhub.io"
          
          # Set ldflags
          LDFLAGS="-s -w \
          -X 'senhub-agent.go/internal/agent/cliArgs.Version=$TAG' \
          -X 'senhub-agent.go/internal/agent/cliArgs.CommitHash=$CURRENT_COMMIT' \
          -X 'senhub-agent.go/internal/agent/cliArgs.BuildTime=$CURRENT_DATE' \
          -X 'senhub-agent.go/internal/agent/cliArgs.GoVersion=$GO_VERSION' \
          -X 'senhub-agent.go/internal/agent/cliArgs.Env=production' \
          -X 'senhub-agent.go/internal/agent/cliArgs.ProductionURL=$PRODUCTION_URL' \
          -X 'senhub-agent.go/internal/agent/cliArgs.DevelopmentURL=$DEVELOPMENT_URL'"
          
          echo "Using ldflags: $LDFLAGS"
          
          # Build for each platform
          echo "Building for Linux amd64"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/senhub-agent_linux_amd64 ./cmd/agent

          echo "Building for Linux arm64"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/senhub-agent_linux_arm64 ./cmd/agent

          echo "Building for Windows amd64"
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/senhub-agent_windows_amd64.exe ./cmd/agent

          echo "Building for macOS amd64"
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/senhub-agent_darwin_amd64 ./cmd/agent

          echo "Building for macOS arm64"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/senhub-agent_darwin_arm64 ./cmd/agent

          # ZIP the binaries
          cd dist
          zip senhub-agent_linux_amd64.zip senhub-agent_linux_amd64
          zip senhub-agent_linux_arm64.zip senhub-agent_linux_arm64
          zip senhub-agent_windows_amd64.zip senhub-agent_windows_amd64.exe
          zip senhub-agent_darwin_amd64.zip senhub-agent_darwin_amd64
          zip senhub-agent_darwin_arm64.zip senhub-agent_darwin_arm64
          cd ..
          
          # List the contents of dist
          echo "Contents of dist directory:"
          ls -la dist
          

          # Test version info in binaries
          echo "Testing version info in Linux binary:"
          chmod +x dist/senhub-agent_linux_amd64
          # La commande version peut échouer sur certains environnements, on l'ignore avec || true
          dist/senhub-agent_linux_amd64 version || true
          
          # Create metadata.json
          echo "Creating metadata.json"
          CURRENT_COMMIT=$(git rev-parse HEAD)
          CURRENT_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.%NZ")
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 $CURRENT_COMMIT^ 2>/dev/null || echo "0.0.0")
          
          echo '{
            "project_name": "senhubagent",
            "tag": "'$TAG'",
            "previous_tag": "'$PREVIOUS_TAG'",
            "version": "'$TAG'",
            "commit": "'$CURRENT_COMMIT'",
            "date": "'$CURRENT_DATE'",
            "runtime": {
              "goos": "linux",
              "goarch": "amd64"
            }
          }' > dist/metadata.json
          
          # Create releases directory if it doesn't exist
          mkdir -p dist/releases
          
          # Create or update releases.json
          echo "Creating releases.json"
          echo '[
            {
              "project_name": "senhubagent",
              "tag": "'$TAG'",
              "previous_tag": "'$PREVIOUS_TAG'",
              "version": "'$TAG'",
              "commit": "'$CURRENT_COMMIT'",
              "date": "'$CURRENT_DATE'",
              "runtime": {
                "goos": "linux",
                "goarch": "amd64"
              }
            }
          ]' > dist/releases/releases.json
          
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          files: |
            dist/*.zip
            dist/senhub-agent_linux_amd64
            dist/senhub-agent_linux_arm64
            dist/senhub-agent_windows_amd64.exe
            dist/senhub-agent_darwin_amd64
            dist/senhub-agent_darwin_arm64
            dist/metadata.json
            dist/releases/releases.json
          generate_release_notes: false

      - name: Update 'latest' tag to point to this production release
        if: success()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Delete the existing 'latest' tag locally and remotely
          git tag -d latest 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          # Create new 'latest' tag pointing to current commit
          git tag latest

          # Push the new 'latest' tag (force to overwrite if it exists)
          git push origin latest --force

          echo "✓ Tag 'latest' updated to point to ${{ env.TAG }} (commit: $(git rev-parse HEAD))"