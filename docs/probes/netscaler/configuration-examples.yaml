# NetScaler ADC Probe - Configuration Examples

# ==============================================================================
# EXAMPLE 1: Minimal Configuration (Quick Start)
# ==============================================================================
# Simplest possible configuration for testing

probes:
  - name: netscaler-test
    type: netscaler
    params:
      base_url: "https://netscaler.company.com"
      username: "monitoring-user"
      password: "secure-password"
      interval: 60

# ==============================================================================
# EXAMPLE 2: Production Configuration (Recommended)
# ==============================================================================
# Best practices for production environments

probes:
  - name: netscaler-prod
    type: netscaler
    params:
      # NetScaler Management IP/hostname
      base_url: "https://netscaler.company.com"

      # NITRO API credentials (read-only user recommended)
      username: "monitoring-user"
      password: "SecureP@ssw0rd!"

      # SSL certificate verification (always enable in production)
      insecure_skip_verify: false

      # API request timeout (increase for large deployments with 100+ vServers)
      timeout: 30

      # Metric collection interval (60s = good balance)
      interval: 60

    # Custom tags for business context
    custom_tags:
      - key: "environment"
        value: "production"
      - key: "datacenter"
        value: "dc-paris-01"
      - key: "team"
        value: "infrastructure"
      - key: "business_unit"
        value: "ecommerce"

# ==============================================================================
# EXAMPLE 3: High Availability (HA) Cluster Monitoring
# ==============================================================================
# Monitor a NetScaler HA pair with automatic failover

probes:
  - name: netscaler-ha-paris
    type: netscaler
    params:
      # Primary node (agent connects here first)
      base_url: "https://10.0.208.7"

      # Secondary node (agent fails over here if primary is down or demoted)
      secondary_url: "https://10.0.208.6"

      username: "monitoring-user"
      password: "SecureP@ssw0rd!"
      insecure_skip_verify: true   # Required when using IPs instead of hostnames
      timeout: 30
      interval: 60
    custom_tags:
      - key: "ha_cluster"
        value: "paris-cluster-01"

# Agent will automatically:
# - Connect to base_url (primary) at startup
# - Fail over to secondary_url after 3 consecutive collection errors
# - Proactively switch if connected node becomes Secondary (detected via /config/hanode)
# - Collect metrics for BOTH nodes (primary + secondary) with node-specific tags
# - Tag metrics with ha_node_id, ha_node_ip, is_local_node, data_source

