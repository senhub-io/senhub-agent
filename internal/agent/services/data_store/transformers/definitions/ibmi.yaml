# IBM i / Power Systems Probe — Format v3 (OTel-first source of truth)
#
# All metrics carry an `otel:` block. There is no canonical OTel
# semantic convention for IBM i / Power Systems (the OS is proprietary
# and not covered by opentelemetry-collector-contrib receivers), so the
# whole probe namespaces under `senhub.ibmi.*` — same pattern as Lot 4
# (veeam, citrix, netscaler) for vendor-specific systems.
#
# Naming policy:
#   - Family-prefixed name: senhub.ibmi.<family>.<measure> (cpu,
#     memory, asp, disk, job, jobs, job_queue, scheduled_job,
#     subsystem, memory_pool, output_queue, spooled_file, user_storage,
#     table, index_advisor, journal, journal_receiver, tcp, netstat,
#     http_server, hardware, user_profile, sysval, library_list,
#     license, ptf_group, watch, collector).
#   - No unit suffix in metric names (no .seconds, .bytes, .kb, .mb,
#     .ms, .percent). Unit moves to otel.unit.
#   - No .count/.total suffix. Type (counter vs gauge) carries that.
#   - Probe-side `unit:` kept intact so the OTel mapper auto-converts
#     (%→1, KB/MB→By, ms→s) per otelmapper/convert.go.
#
# Tag-to-attribute renaming maps probe cache tags to clean OTel
# attribute keys under the `ibmi.*` namespace (e.g. job_name →
# ibmi.job.name). Standard OTel attrs (network.transport) used where a
# canonical key exists.
#
# Event-conduit metrics (message_queue, history_log, audit_journal,
# msgw_job) carry otel.skip:true with reason — same pattern as
# syslog/event probes, since the relayed event isn't a meaningful
# Prometheus/OTLP metric.

probe_name: "ibmi"
friendly_name: "IBM i / Power Systems"
version: "3.0.0"

metrics:
  # ============================================================
  # System-level CPU
  # ============================================================
  - name: "ibmi.cpu.elapsed_used_percent"
    channel: "ibmi_cpu_used_percent"
    display_name: "CPU Used"
    unit: "%"
    category: "cpu"
    description: "Percentage of CPU used over the elapsed interval"
    otel:
      name: senhub.ibmi.cpu.utilization
      unit: "1"
      type: gauge

  - name: "ibmi.cpu.configured_count"
    channel: "ibmi_cpu_configured_count"
    display_name: "CPU Configured Count"
    unit: "#"
    category: "cpu"
    description: "Number of configured virtual CPUs"
    otel:
      name: senhub.ibmi.cpu.configured
      unit: "{cpu}"
      type: gauge

  - name: "ibmi.cpu.current_capacity"
    channel: "ibmi_cpu_current_capacity"
    display_name: "CPU Current Capacity"
    unit: "#"
    category: "cpu"
    description: "Current processing capacity"
    otel:
      name: senhub.ibmi.cpu.capacity
      unit: "{cpu}"
      type: gauge

  # ============================================================
  # Memory & ASP (Auxiliary Storage Pool)
  # ============================================================
  - name: "ibmi.memory.main_storage_kb"
    channel: "ibmi_memory_main_storage_kb"
    display_name: "Main Storage"
    unit: "KB"
    category: "memory"
    otel:
      name: senhub.ibmi.memory.main_storage
      unit: "By"
      type: gauge

  - name: "ibmi.asp.system_used_percent"
    channel: "ibmi_asp_system_used_percent"
    display_name: "System ASP Used"
    unit: "%"
    category: "storage"
    otel:
      name: senhub.ibmi.asp.system.utilization
      unit: "1"
      type: gauge

  - name: "ibmi.asp.used_percent"
    channel: "ibmi_asp_used_percent"
    display_name: "ASP Used ({asp_number})"
    unit: "%"
    category: "storage"
    multi_instance_labels: ["asp_number", "asp_type"]
    otel:
      name: senhub.ibmi.asp.utilization
      unit: "1"
      type: gauge
    tag_to_attribute:
      asp_number: ibmi.asp.number
      asp_type: ibmi.asp.type

  - name: "ibmi.asp.total_capacity_mb"
    channel: "ibmi_asp_total_capacity_mb"
    display_name: "ASP Total Capacity ({asp_number})"
    unit: "MB"
    category: "storage"
    multi_instance_labels: ["asp_number"]
    otel:
      name: senhub.ibmi.asp.capacity
      unit: "By"
      type: gauge
    tag_to_attribute:
      asp_number: ibmi.asp.number

  - name: "ibmi.asp.storage_threshold_percent"
    channel: "ibmi_asp_threshold_percent"
    display_name: "ASP Storage Threshold ({asp_number})"
    unit: "%"
    category: "storage"
    multi_instance_labels: ["asp_number"]
    otel:
      name: senhub.ibmi.asp.threshold
      unit: "1"
      type: gauge
    tag_to_attribute:
      asp_number: ibmi.asp.number

  # ============================================================
  # Jobs — aggregate
  # ============================================================
  - name: "ibmi.jobs.total_count"
    channel: "ibmi_jobs_total_count"
    display_name: "Jobs Total"
    unit: "#"
    category: "jobs"
    otel:
      name: senhub.ibmi.jobs.total
      unit: "{job}"
      type: gauge

  - name: "ibmi.jobs.active_total"
    channel: "ibmi_jobs_active_total"
    display_name: "Jobs Active Total"
    unit: "#"
    category: "jobs"
    otel:
      name: senhub.ibmi.jobs.active
      unit: "{job}"
      type: gauge

  - name: "ibmi.jobs.count_by_status"
    channel: "ibmi_jobs_count_by_status"
    display_name: "Jobs {job_type} / {status}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["job_type", "status"]
    otel:
      name: senhub.ibmi.jobs.by_status
      unit: "{job}"
      type: gauge
    tag_to_attribute:
      job_type: ibmi.job.type
      status: ibmi.job.status

  - name: "ibmi.jobs.count_by_subsystem"
    channel: "ibmi_jobs_count_by_subsystem"
    display_name: "Jobs in {subsystem}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["subsystem"]
    otel:
      name: senhub.ibmi.jobs.by_subsystem
      unit: "{job}"
      type: gauge
    tag_to_attribute:
      subsystem: ibmi.subsystem

  - name: "ibmi.jobs.topn_cap_hit"
    channel: "ibmi_jobs_topn_cap_hit"
    display_name: "Top-N Cap Hit"
    unit: "#"
    category: "jobs"
    description: "1 = active_job SQL hit the row cap, counts may be undercounts"
    otel:
      name: senhub.ibmi.jobs.topn_cap_hit
      unit: "1"
      type: gauge

  # ============================================================
  # Jobs — per-job detail (top-N by elapsed CPU)
  # ============================================================
  - name: "ibmi.job.elapsed_cpu_percent"
    channel: "ibmi_job_elapsed_cpu_percent"
    display_name: "CPU % — {job_name}"
    unit: "%"
    category: "jobs"
    multi_instance_labels: ["job_name", "job_user", "subsystem"]
    otel:
      name: senhub.ibmi.job.cpu.utilization
      unit: "1"
      type: gauge
    tag_to_attribute:
      job_name: ibmi.job.name
      job_user: ibmi.job.user
      subsystem: ibmi.subsystem

  - name: "ibmi.job.elapsed_cpu_ms"
    channel: "ibmi_job_elapsed_cpu_ms"
    display_name: "Elapsed CPU — {job_name}"
    unit: "ms"
    category: "jobs"
    multi_instance_labels: ["job_name", "job_user", "subsystem"]
    otel:
      name: senhub.ibmi.job.cpu.elapsed_time
      unit: "s"
      type: gauge
    tag_to_attribute:
      job_name: ibmi.job.name
      job_user: ibmi.job.user
      subsystem: ibmi.subsystem

  - name: "ibmi.job.cpu_time_ms"
    channel: "ibmi_job_cpu_time_ms"
    display_name: "Cumulative CPU — {job_name}"
    unit: "ms"
    category: "jobs"
    multi_instance_labels: ["job_name", "job_user", "subsystem"]
    otel:
      name: senhub.ibmi.job.cpu.cumulative_time
      unit: "s"
      type: counter
    tag_to_attribute:
      job_name: ibmi.job.name
      job_user: ibmi.job.user
      subsystem: ibmi.subsystem

  - name: "ibmi.job.cpu_time_ms_delta"
    channel: "ibmi_job_cpu_time_ms_delta"
    display_name: "CPU Delta — {job_name}"
    unit: "ms"
    category: "jobs"
    multi_instance_labels: ["job_name"]
    otel:
      name: senhub.ibmi.job.cpu.delta_time
      unit: "s"
      type: gauge
    tag_to_attribute:
      job_name: ibmi.job.name

  - name: "ibmi.job.cpu_time_ms_rate_per_sec"
    channel: "ibmi_job_cpu_time_ms_rate"
    display_name: "CPU Rate — {job_name}"
    unit: "ms/s"
    category: "jobs"
    multi_instance_labels: ["job_name"]
    description: "CPU milliseconds consumed per wallclock second — dimensionless ratio when divided by 1000"
    otel:
      name: senhub.ibmi.job.cpu.rate
      unit: "1"
      type: gauge
      value_scale: 0.001
    tag_to_attribute:
      job_name: ibmi.job.name

  - name: "ibmi.job.temp_storage_mb"
    channel: "ibmi_job_temp_storage_mb"
    display_name: "Temp Storage — {job_name}"
    unit: "MB"
    category: "jobs"
    multi_instance_labels: ["job_name"]
    otel:
      name: senhub.ibmi.job.temp_storage
      unit: "By"
      type: gauge
    tag_to_attribute:
      job_name: ibmi.job.name

  - name: "ibmi.job.total_disk_io"
    channel: "ibmi_job_total_disk_io"
    display_name: "Total Disk I/O — {job_name}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["job_name"]
    otel:
      name: senhub.ibmi.job.disk.io
      unit: "{operation}"
      type: counter
    tag_to_attribute:
      job_name: ibmi.job.name

  - name: "ibmi.job.elapsed_total_disk_io"
    channel: "ibmi_job_elapsed_disk_io"
    display_name: "Disk I/O (elapsed) — {job_name}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["job_name"]
    otel:
      name: senhub.ibmi.job.disk.elapsed_io
      unit: "{operation}"
      type: gauge
    tag_to_attribute:
      job_name: ibmi.job.name

  - name: "ibmi.job.elapsed_page_faults"
    channel: "ibmi_job_elapsed_page_faults"
    display_name: "Page Faults — {job_name}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["job_name"]
    otel:
      name: senhub.ibmi.job.page_faults
      unit: "{fault}"
      type: gauge
    tag_to_attribute:
      job_name: ibmi.job.name

  - name: "ibmi.job.thread_count"
    channel: "ibmi_job_thread_count"
    display_name: "Threads — {job_name}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["job_name"]
    otel:
      name: senhub.ibmi.job.threads
      unit: "{thread}"
      type: gauge
    tag_to_attribute:
      job_name: ibmi.job.name

  - name: "ibmi.job.run_priority"
    channel: "ibmi_job_run_priority"
    display_name: "Run Priority — {job_name}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["job_name"]
    otel:
      name: senhub.ibmi.job.priority
      unit: "1"
      type: gauge
    tag_to_attribute:
      job_name: ibmi.job.name

  # ============================================================
  # Job queues
  # ============================================================
  - name: "ibmi.job_queue.active_jobs"
    channel: "ibmi_jobq_active"
    display_name: "Active Jobs — {queue_name}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["queue_library", "queue_name"]
    otel:
      name: senhub.ibmi.job_queue.active
      unit: "{job}"
      type: gauge
    tag_to_attribute:
      queue_library: ibmi.queue.library
      queue_name: ibmi.queue.name

  - name: "ibmi.job_queue.held_jobs"
    channel: "ibmi_jobq_held"
    display_name: "Held Jobs — {queue_name}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["queue_library", "queue_name"]
    otel:
      name: senhub.ibmi.job_queue.held
      unit: "{job}"
      type: gauge
    tag_to_attribute:
      queue_library: ibmi.queue.library
      queue_name: ibmi.queue.name

  - name: "ibmi.job_queue.released_jobs"
    channel: "ibmi_jobq_released"
    display_name: "Released Jobs — {queue_name}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["queue_library", "queue_name"]
    otel:
      name: senhub.ibmi.job_queue.released
      unit: "{job}"
      type: gauge
    tag_to_attribute:
      queue_library: ibmi.queue.library
      queue_name: ibmi.queue.name

  - name: "ibmi.job_queue.scheduled_jobs"
    channel: "ibmi_jobq_scheduled"
    display_name: "Scheduled Jobs — {queue_name}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["queue_library", "queue_name"]
    otel:
      name: senhub.ibmi.job_queue.scheduled
      unit: "{job}"
      type: gauge
    tag_to_attribute:
      queue_library: ibmi.queue.library
      queue_name: ibmi.queue.name

  - name: "ibmi.job_queue.jobs_total"
    channel: "ibmi_jobq_jobs_total"
    display_name: "Total Jobs — {queue_name}"
    unit: "#"
    category: "jobs"
    multi_instance_labels: ["queue_library", "queue_name"]
    otel:
      name: senhub.ibmi.job_queue.depth
      unit: "{job}"
      type: gauge
    tag_to_attribute:
      queue_library: ibmi.queue.library
      queue_name: ibmi.queue.name

  - name: "ibmi.job_queue.nonempty_total"
    channel: "ibmi_jobq_nonempty_total"
    display_name: "Non-empty Job Queues"
    unit: "#"
    category: "jobs"
    otel:
      name: senhub.ibmi.job_queue.nonempty
      unit: "{queue}"
      type: gauge

  # ============================================================
  # Scheduled jobs
  # ============================================================
  - name: "ibmi.scheduled_job.total"
    channel: "ibmi_scheduled_total"
    display_name: "Scheduled Jobs"
    unit: "#"
    category: "jobs"
    otel:
      name: senhub.ibmi.scheduled_job.count
      unit: "{job}"
      type: gauge

  - name: "ibmi.scheduled_job.last_run_age_seconds"
    channel: "ibmi_scheduled_last_run_age"
    display_name: "Scheduled Last Run Age — {job_name}"
    unit: "s"
    category: "jobs"
    multi_instance_labels: ["job_name"]
    otel:
      name: senhub.ibmi.scheduled_job.last_run_age
      unit: "s"
      type: gauge
    tag_to_attribute:
      job_name: ibmi.job.name

  # ============================================================
  # Message-wait jobs (event conduit)
  # ============================================================
  - name: "ibmi.msgw_job.event"
    channel: "ibmi_msgw_event"
    display_name: "MSGW — {job_name}"
    unit: "s"
    category: "jobs"
    multi_instance_labels: ["job_name", "internal_job_id"]
    description: "Job in message wait; value = seconds stuck"
    otel:
      skip: true
      reason: "Event conduit — relayed message-wait condition, not a meaningful Prometheus metric. Future: OTLP log export in V2."

  # ============================================================
  # Subsystems
  # ============================================================
  - name: "ibmi.subsystem.active_jobs"
    channel: "ibmi_subsystem_active_jobs"
    display_name: "Active Jobs in {subsystem}"
    unit: "#"
    category: "workload"
    multi_instance_labels: ["subsystem"]
    otel:
      name: senhub.ibmi.subsystem.active_jobs
      unit: "{job}"
      type: gauge
    tag_to_attribute:
      subsystem: ibmi.subsystem

  # ============================================================
  # Memory pools
  # ============================================================
  - name: "ibmi.memory_pool.defined_size_mb"
    channel: "ibmi_pool_defined_size_mb"
    display_name: "Pool Size — {pool_name}"
    unit: "MB"
    category: "memory"
    multi_instance_labels: ["pool_id", "pool_name"]
    otel:
      name: senhub.ibmi.memory_pool.size
      unit: "By"
      type: gauge
    tag_to_attribute:
      pool_id: ibmi.pool.id
      pool_name: ibmi.pool.name

  - name: "ibmi.memory_pool.current_threads"
    channel: "ibmi_pool_current_threads"
    display_name: "Pool Threads — {pool_name}"
    unit: "#"
    category: "memory"
    multi_instance_labels: ["pool_id", "pool_name"]
    otel:
      name: senhub.ibmi.memory_pool.threads
      unit: "{thread}"
      type: gauge
    tag_to_attribute:
      pool_id: ibmi.pool.id
      pool_name: ibmi.pool.name

  - name: "ibmi.memory_pool.ineligible_threads"
    channel: "ibmi_pool_ineligible_threads"
    display_name: "Pool Ineligible — {pool_name}"
    unit: "#"
    category: "memory"
    multi_instance_labels: ["pool_id", "pool_name"]
    otel:
      name: senhub.ibmi.memory_pool.ineligible_threads
      unit: "{thread}"
      type: gauge
    tag_to_attribute:
      pool_id: ibmi.pool.id
      pool_name: ibmi.pool.name

  # ============================================================
  # Disk
  # ============================================================
  - name: "ibmi.disk.percent_busy"
    channel: "ibmi_disk_percent_busy"
    display_name: "Disk Busy — unit {unit_number}"
    unit: "%"
    category: "storage"
    multi_instance_labels: ["unit_number", "device_name"]
    otel:
      name: senhub.ibmi.disk.utilization
      unit: "1"
      type: gauge
    tag_to_attribute:
      unit_number: ibmi.disk.unit
      device_name: ibmi.disk.device

  - name: "ibmi.disk.data_read_bytes"
    channel: "ibmi_disk_read_bytes"
    display_name: "Disk Read — unit {unit_number}"
    unit: "B"
    category: "storage"
    multi_instance_labels: ["unit_number"]
    otel:
      name: senhub.ibmi.disk.read
      unit: "By"
      type: counter
    tag_to_attribute:
      unit_number: ibmi.disk.unit

  - name: "ibmi.disk.data_written_bytes"
    channel: "ibmi_disk_write_bytes"
    display_name: "Disk Write — unit {unit_number}"
    unit: "B"
    category: "storage"
    multi_instance_labels: ["unit_number"]
    otel:
      name: senhub.ibmi.disk.write
      unit: "By"
      type: counter
    tag_to_attribute:
      unit_number: ibmi.disk.unit

  - name: "ibmi.disk.read_requests"
    channel: "ibmi_disk_read_requests"
    display_name: "Disk Read Requests — unit {unit_number}"
    unit: "#"
    category: "storage"
    multi_instance_labels: ["unit_number"]
    otel:
      name: senhub.ibmi.disk.operations
      unit: "{operation}"
      type: counter
      attributes:
        disk.io.direction: read
    tag_to_attribute:
      unit_number: ibmi.disk.unit

  - name: "ibmi.disk.write_requests"
    channel: "ibmi_disk_write_requests"
    display_name: "Disk Write Requests — unit {unit_number}"
    unit: "#"
    category: "storage"
    multi_instance_labels: ["unit_number"]
    otel:
      name: senhub.ibmi.disk.operations
      unit: "{operation}"
      type: counter
      attributes:
        disk.io.direction: write
    tag_to_attribute:
      unit_number: ibmi.disk.unit

  - name: "ibmi.disk.capacity_bytes"
    channel: "ibmi_disk_capacity"
    display_name: "Disk Capacity — unit {unit_number}"
    unit: "B"
    category: "storage"
    multi_instance_labels: ["unit_number"]
    otel:
      name: senhub.ibmi.disk.capacity
      unit: "By"
      type: gauge
    tag_to_attribute:
      unit_number: ibmi.disk.unit

  - name: "ibmi.disk.available_gb"
    channel: "ibmi_disk_available"
    display_name: "Disk Available — unit {unit_number}"
    unit: "GB"
    category: "storage"
    multi_instance_labels: ["unit_number"]
    otel:
      name: senhub.ibmi.disk.available
      unit: "By"
      type: gauge
    tag_to_attribute:
      unit_number: ibmi.disk.unit

  - name: "ibmi.disk.percent_used"
    channel: "ibmi_disk_percent_used"
    display_name: "Disk Used — unit {unit_number}"
    unit: "%"
    category: "storage"
    multi_instance_labels: ["unit_number"]
    otel:
      name: senhub.ibmi.disk.space.utilization
      unit: "1"
      type: gauge
    tag_to_attribute:
      unit_number: ibmi.disk.unit

  - name: "ibmi.disk.units_total"
    channel: "ibmi_disk_units"
    display_name: "Disk Units"
    unit: "#"
    category: "storage"
    otel:
      name: senhub.ibmi.disk.units
      unit: "{unit}"
      type: gauge

  # ============================================================
  # Output queues & spool
  # ============================================================
  - name: "ibmi.output_queue.files_count"
    channel: "ibmi_outq_files"
    display_name: "Spool Files — {queue_name}"
    unit: "#"
    category: "spool"
    multi_instance_labels: ["queue_library", "queue_name"]
    otel:
      name: senhub.ibmi.output_queue.files
      unit: "{file}"
      type: gauge
    tag_to_attribute:
      queue_library: ibmi.queue.library
      queue_name: ibmi.queue.name

  - name: "ibmi.output_queue.spooled_files_total"
    channel: "ibmi_outq_spooled_total"
    display_name: "Spooled Files Total"
    unit: "#"
    category: "spool"
    otel:
      name: senhub.ibmi.output_queue.spooled_files
      unit: "{file}"
      type: gauge

  - name: "ibmi.spooled_file.total"
    channel: "ibmi_spool_total"
    display_name: "Spooled Files"
    unit: "#"
    category: "spool"
    otel:
      name: senhub.ibmi.spooled_file.count
      unit: "{file}"
      type: gauge

  - name: "ibmi.spooled_file.oldest_age_seconds"
    channel: "ibmi_spool_oldest_age"
    display_name: "Oldest Spool Age"
    unit: "s"
    category: "spool"
    otel:
      name: senhub.ibmi.spooled_file.oldest_age
      unit: "s"
      type: gauge

  # ============================================================
  # User storage
  # ============================================================
  - name: "ibmi.user_storage.used_kb"
    channel: "ibmi_user_storage_used"
    display_name: "User Storage — {user}"
    unit: "KB"
    category: "storage"
    multi_instance_labels: ["user", "asp"]
    otel:
      name: senhub.ibmi.user_storage.used
      unit: "By"
      type: gauge
    tag_to_attribute:
      user: ibmi.user.name
      asp: ibmi.asp.number

  - name: "ibmi.user_storage.quota_kb"
    channel: "ibmi_user_storage_quota"
    display_name: "User Quota — {user}"
    unit: "KB"
    category: "storage"
    multi_instance_labels: ["user", "asp"]
    otel:
      name: senhub.ibmi.user_storage.quota
      unit: "By"
      type: gauge
    tag_to_attribute:
      user: ibmi.user.name
      asp: ibmi.asp.number

