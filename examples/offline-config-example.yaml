# ===== CONFIGURATION NOTES =====

# Access URLs (replace {agentkey} with your actual agent key):
# - Dashboard: http://localhost:8080/web/{agentkey}/dashboard
# - API Explorer: http://localhost:8080/web/{agentkey}/explorer
# - Admin Panel: http://localhost:8080/web/{agentkey}/admin
# - Health Check: http://localhost:8080/health

# API Endpoints:
# - PRTG Format: http://localhost:8080/api/{agentkey}/prtg/metrics/{probe}
# - Nagios Format: http://localhost:8080/api/{agentkey}/nagios/check/{check_name}
# - SenHub Format: http://localhost:8080/api/{agentkey}/senhub/metrics/{probe}
# - Prometheus Format: http://localhost:8080/api/{agentkey}/prometheus/metrics

# Security Notes:
# - Agent key serves as API authentication token
# - HTTP mode binds to localhost only (127.0.0.1)
# - HTTPS mode can bind to all interfaces (0.0.0.0) for remote access
# - Self-signed certificates will show browser warnings (normal behavior)
# - Use custom certificates for production deployments

# Performance Notes:
# - Default probe intervals are optimized for balanced monitoring
# - Increase intervals for high-load systems or reduce monitoring overhead
# - Cache TTL is 5 minutes for all metrics
# - Web interface updates in real-time

# Troubleshooting:
# - Check agent status: ./agent status
# - View logs: ./agent run --offline --verbose
# - Test APIs: curl http://localhost:8080/health
# - Debug specific modules: ./agent run --offline --debug-modules strategy.http,cache