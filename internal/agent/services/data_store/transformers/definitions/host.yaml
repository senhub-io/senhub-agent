# Host System Metrics Definitions
# Compatible with senhub-sensor-host-agent PowerShell connector

probe_name: "host"
version: "1.0.0"

metrics:
  # CPU Metrics
  - name: "cpu_usage_total"
    channel: "cpu_usage"
    display_name: "CPU Total Usage"
    unit: "%"
    description: "Total CPU utilization percentage"
    
  - name: "cpu_core_usage"
    channel: "cpu_core_usage"
    display_name: "CPU Core {instance} Usage"
    unit: "%"
    multi_instance_labels: ["instance"]
    description: "CPU usage percentage per core"
    
  - name: "cpu_load1"
    channel: "cpu_load1"
    display_name: "CPU Load Average 1min"
    unit: "#"
    description: "System load average over 1 minute"
    
  - name: "cpu_load5"
    channel: "cpu_load5"
    display_name: "CPU Load Average 5min"
    unit: "#"
    description: "System load average over 5 minutes"
    
  - name: "cpu_load15"
    channel: "cpu_load15"
    display_name: "CPU Load Average 15min"
    unit: "#"
    description: "System load average over 15 minutes"

  # Memory Metrics
  - name: "memory_total"
    channel: "memory_total"
    display_name: "Memory Total"
    unit: "Bytes"
    description: "Total amount of physical memory"
    
  - name: "memory_used"
    channel: "memory_used"
    display_name: "Memory Used"
    unit: "Bytes"
    description: "Amount of used physical memory"
    
  - name: "memory_used_percent"
    channel: "memory_used_percent"
    display_name: "Memory Usage"
    unit: "%"
    description: "Percentage of used physical memory"
    
  - name: "memory_available"
    channel: "memory_available"
    display_name: "Memory Available"
    unit: "Bytes"
    description: "Amount of available memory"
    
  - name: "memory_free"
    channel: "memory_free"
    display_name: "Memory Free"
    unit: "Bytes"
    description: "Amount of free physical memory"
    
  - name: "memory_cached"
    channel: "memory_cached"
    display_name: "Memory Cached"
    unit: "Bytes"
    description: "Memory used for file system cache"
    
  - name: "memory_buffers"
    channel: "memory_buffers"
    display_name: "Memory Buffers"
    unit: "Bytes"
    description: "Memory used for buffers"

  # Swap Metrics
  - name: "swap_total"
    channel: "swap_total"
    display_name: "Swap Total"
    unit: "Bytes"
    description: "Total amount of swap space"
    
  - name: "swap_used"
    channel: "swap_used"
    display_name: "Swap Used"
    unit: "Bytes"
    description: "Amount of used swap space"
    
  - name: "swap_used_percent"
    channel: "swap_used_percent"
    display_name: "Swap Usage"
    unit: "%"
    description: "Percentage of used swap space"
    
  - name: "swap_free"
    channel: "swap_free"
    display_name: "Swap Free"
    unit: "Bytes"
    description: "Amount of free swap space"

  # Disk Metrics
  - name: "disk_total"
    channel: "disk_total"
    display_name: "Disk {device} Total"
    unit: "Bytes"
    multi_instance_labels: ["device", "mountpoint"]
    description: "Total disk space"
    
  - name: "disk_used"
    channel: "disk_used"
    display_name: "Disk {device} Used"
    unit: "Bytes"
    multi_instance_labels: ["device", "mountpoint"]
    description: "Used disk space"
    
  - name: "disk_used_percent"
    channel: "disk_used_percent"
    display_name: "Disk {device} Usage"
    unit: "%"
    multi_instance_labels: ["device", "mountpoint"]
    description: "Percentage of used disk space"
    
  - name: "disk_free"
    channel: "disk_free"
    display_name: "Disk {device} Free"
    unit: "Bytes"
    multi_instance_labels: ["device", "mountpoint"]
    description: "Amount of free disk space"
    
  # Real CPU metrics from Windows Performance Counters
  - name: "processor_time"
    channel: "processor_time"
    display_name: "CPU {instance} Usage"
    unit: "%"
    multi_instance_labels: ["instance"]
    description: "CPU usage percentage per processor instance"
    
  - name: "user_time"
    channel: "user_time"
    display_name: "CPU {instance} User Time"
    unit: "%"
    multi_instance_labels: ["instance"]
    description: "CPU user mode time percentage"
    
  - name: "privileged_time"
    channel: "privileged_time"
    display_name: "CPU {instance} Privileged Time"
    unit: "%"
    multi_instance_labels: ["instance"]
    description: "CPU privileged mode time percentage"
    
  - name: "interrupt_time"
    channel: "interrupt_time"
    display_name: "CPU {instance} Interrupt Time"
    unit: "%"
    multi_instance_labels: ["instance"]
    description: "CPU interrupt time percentage"
    
  - name: "dpc_time"
    channel: "dpc_time"
    display_name: "CPU {instance} DPC Time"
    unit: "%"
    multi_instance_labels: ["instance"]
    description: "CPU DPC (Deferred Procedure Call) time percentage"

  # Real Logical Disk Metrics (from Performance Counters)
  - name: "disk_free_bytes"
    channel: "disk_free_bytes"
    display_name: "Disk {drive} Free Space"
    unit: "Bytes"
    multi_instance_labels: ["drive"]
    description: "Free disk space in bytes"
    
  - name: "disk_free_percent"
    channel: "disk_free_percent"
    display_name: "Disk {drive} Free Percent"
    unit: "%"
    multi_instance_labels: ["drive"]
    description: "Free disk space percentage"
    
  - name: "disk_read_bytes_sec"
    channel: "disk_read_bytes_sec"
    display_name: "Disk {drive} Read Rate"
    unit: "Bytes/s"
    multi_instance_labels: ["drive"]
    description: "Disk read rate in bytes per second"
    
  - name: "disk_write_bytes_sec"
    channel: "disk_write_bytes_sec"
    display_name: "Disk {drive} Write Rate"
    unit: "Bytes/s"
    multi_instance_labels: ["drive"]
    description: "Disk write rate in bytes per second"
    
  - name: "disk_reads_sec"
    channel: "disk_reads_sec"
    display_name: "Disk {drive} Read Operations"
    unit: "ops/s"
    multi_instance_labels: ["drive"]
    description: "Disk read operations per second"
    
  - name: "disk_writes_sec"
    channel: "disk_writes_sec"
    display_name: "Disk {drive} Write Operations"
    unit: "ops/s"
    multi_instance_labels: ["drive"]
    description: "Disk write operations per second"

  # Real Network Metrics
  - name: "bytes_received"
    channel: "bytes_received"
    display_name: "Network {interface} Bytes Received"
    unit: "Bytes/s"
    multi_instance_labels: ["interface"]
    description: "Network bytes received per second"
    
  - name: "bytes_sent"
    channel: "bytes_sent"
    display_name: "Network {interface} Bytes Sent"
    unit: "Bytes/s"
    multi_instance_labels: ["interface"]
    description: "Network bytes sent per second"
    
  - name: "packets_received"
    channel: "packets_received"
    display_name: "Network {interface} Packets Received"
    unit: "Pkts/s"
    multi_instance_labels: ["interface"]
    description: "Network packets received per second"
    
  - name: "packets_sent"
    channel: "packets_sent"
    display_name: "Network {interface} Packets Sent"
    unit: "Pkts/s"
    multi_instance_labels: ["interface"]
    description: "Network packets sent per second"

  # Logical Disk Metrics (legacy naming)
  - name: "logicaldisk_total"
    channel: "logicaldisk_total"
    display_name: "Disk {drive} Total"
    unit: "Bytes"
    multi_instance_labels: ["drive"]
    description: "Total logical disk space"
    
  - name: "logicaldisk_used"
    channel: "logicaldisk_used"
    display_name: "Disk {drive} Used"
    unit: "Bytes"
    multi_instance_labels: ["drive"]
    description: "Used logical disk space"
    
  - name: "logicaldisk_used_percent"
    channel: "logicaldisk_used_percent"
    display_name: "Disk {drive} Usage"
    unit: "%"
    multi_instance_labels: ["drive"]
    description: "Percentage of used logical disk space"
    
  - name: "logicaldisk_free_space"
    channel: "logicaldisk_free_space"
    display_name: "Disk {drive} Free"
    unit: "Bytes"
    multi_instance_labels: ["drive"]
    description: "Free disk space"
    
  - name: "disk_read_bytes"
    channel: "disk_read_bytes"
    display_name: "Disk {device} Read"
    unit: "Bytes/s"
    multi_instance_labels: ["device"]
    description: "Disk read rate in bytes per second"
    
  - name: "disk_write_bytes"
    channel: "disk_write_bytes"
    display_name: "Disk {device} Write"
    unit: "Bytes/s"
    multi_instance_labels: ["device"]
    description: "Disk write rate in bytes per second"
    
  - name: "disk_read_ops"
    channel: "disk_read_ops"
    display_name: "Disk {device} Read Ops"
    unit: "ops/s"
    multi_instance_labels: ["device"]
    description: "Disk read operations per second"
    
  - name: "disk_write_ops"
    channel: "disk_write_ops"
    display_name: "Disk {device} Write Ops"
    unit: "ops/s"
    multi_instance_labels: ["device"]
    description: "Disk write operations per second"

  # Network Metrics
  - name: "network_bytes_sent"
    channel: "network_bytes_sent"
    display_name: "Network {interface} Sent"
    unit: "Bytes/s"
    multi_instance_labels: ["interface"]
    description: "Network bytes sent per second"
    
  - name: "network_bytes_recv"
    channel: "network_bytes_recv"
    display_name: "Network {interface} Received"
    unit: "Bytes/s"
    multi_instance_labels: ["interface"]
    description: "Network bytes received per second"
    
  - name: "network_packets_sent"
    channel: "network_packets_sent"
    display_name: "Network {interface} Packets Sent"
    unit: "Pkts/s"
    multi_instance_labels: ["interface"]
    description: "Network packets sent per second"
    
  - name: "network_packets_recv"
    channel: "network_packets_recv"
    display_name: "Network {interface} Packets Received"
    unit: "Pkts/s"
    multi_instance_labels: ["interface"]
    description: "Network packets received per second"
    
  - name: "network_errors_in"
    channel: "network_errors_in"
    display_name: "Network {interface} Input Errors"
    unit: "Pkts/s"
    multi_instance_labels: ["interface"]
    description: "Network input errors per second"
    
  - name: "network_errors_out"
    channel: "network_errors_out"
    display_name: "Network {interface} Output Errors"
    unit: "Pkts/s"
    multi_instance_labels: ["interface"]
    description: "Network output errors per second"

  # WiFi Metrics
  - name: "wifi_signal_strength"
    channel: "wifi_signal_strength"
    display_name: "WiFi Signal Strength"
    unit: "%"
    description: "WiFi signal strength percentage"