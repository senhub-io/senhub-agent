name: PR Release
on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  release:
    # Only run when PR is merged, not when it's closed without merging
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.0'
      - name: Get Go Version
        id: go_version
        run: |
          GO_VERSION=$(go version | cut -d' ' -f3)
          echo "GO_VERSION=$GO_VERSION" >> $GITHUB_ENV
      # We look for the latest tag that was pushed to the repo
      # The workflow assumes the developer has created and pushed a tag before creating the PR
      - name: Find Latest Tag
        id: find_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          # Skip if tag contains beta
          if [[ $LATEST_TAG == *"beta"* ]]; then
            echo "Latest tag is a beta tag, cannot use for PR release"
            exit 1
          fi
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GOVERSION: ${{ env.GO_VERSION }}
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.LATEST_TAG }}
          name: Release ${{ env.LATEST_TAG }}
          files: |
            dist/senhub-agent_linux_*
            dist/senhub-agent_windows_*
            dist/senhub-agent_darwin_*
            dist/metadata.json
          generate_release_notes: false