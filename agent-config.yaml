# Agent configuration
agent:
  key: "7c0ffb11-8cfb-4a56-8f8e-d6181c74e8d7"
  mode: offline
  generated: true

# Auto-update configuration (disabled by default in offline mode)
auto_update:
  enabled: false      # Enable/disable automatic updates
  url: "https://eu-west-1.intake.senhub.io/releases"        # Update server URL

# Cache configuration
cache:
  retention_minutes: 5  # Cache retention time in minutes

# Local storage with web interface
storage:
  - name: http
    params:
      port: 8080
      bind_address: "127.0.0.1"
      endpoints: ["prtg", "web", "nagios"]


# Active probes (default system monitoring)
probes:
  # ===== ACTIVE PROBES =====
  
  # CPU monitoring - 30s interval
  - name: cpu
    params:
      interval: 30
      
  # Memory monitoring - 30s interval  
  - name: memory
    params:
      interval: 30
      
  # Network monitoring - 60s interval (less frequent)
  - name: network
    params:
      interval: 60
      
  # Disk monitoring - 30s interval
  - name: logicaldisk
    params:
      interval: 30

