name: Dev Beta Release
on:
  push:
    tags:
      - '*.*.*'

jobs:
  check_branch:
    runs-on: ubuntu-latest
    outputs:
      is_dev: ${{ steps.check.outputs.is_dev }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if tag is on dev branch
        id: check
        run: |
          git fetch --all
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})
          echo "Tag commit: $TAG_COMMIT"
          DEV_BRANCH=$(git branch -r --contains $TAG_COMMIT | grep "origin/dev" || echo "")
          if [[ -n "$DEV_BRANCH" ]]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
            echo "Tag is on dev branch"
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "Tag is not on dev branch"
          fi

  beta_release:
    needs: check_branch
    if: needs.check_branch.outputs.is_dev == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.0'
      - name: Create Beta Tag
        id: create_beta_tag
        run: |
          # Get the tag name from the event
          TAG=${GITHUB_REF#refs/tags/}
          echo "TAG=$TAG" >> $GITHUB_ENV
          
          # Create beta tag
          BETA_TAG="${TAG}-beta"
          echo "BETA_TAG=$BETA_TAG" >> $GITHUB_ENV
          
          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Create and push beta tag
          git tag $BETA_TAG
          git push origin $BETA_TAG
          
          echo "Created and pushed beta tag: $BETA_TAG"
      - name: Download goreleaser
        run: |
          curl -sfL https://goreleaser.com/static/run | bash
      - name: Run GoReleaser with Beta Tag
        run: |
          ./bin/goreleaser release --clean --skip-validate --rm-dist
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GORELEASER_CURRENT_TAG: ${{ env.BETA_TAG }}
      - name: Create Beta Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.BETA_TAG }}
          name: Beta Release ${{ env.BETA_TAG }}
          files: |
            dist/senhub-agent_linux_*
            dist/senhub-agent_windows_*
            dist/senhub-agent_darwin_*
            dist/metadata.json
          generate_release_notes: false
          prerelease: true