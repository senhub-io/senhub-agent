# SenHub Agent Configuration with Citrix Probe
# Complete example for monitoring Citrix Virtual Apps and Desktops
#
# Since 0.2.x the default install layout is multi-file:
#   agent.yaml + probes.d/*.yaml + strategies.d/*.yaml
# The single-file form below (agent + storage + probes in one document)
# still loads and is fully supported for existing installs.
#
# NOTE: Per-component config format (recommended since 0.1.87).
# Each component (director, delivery_controller, license_server) has its own
# auth block. Auth method is auto-detected: NTLM for Director, Basic for DDC/License.

config_version: 3

agent:
  key: "your-agent-key-here"

# Data storage strategies
storage:
  - name: http
    params:
      port: 8080
      bind_address: "0.0.0.0"
      endpoints: ["prtg", "senhub", "web", "nagios"]
      cache:
        retention_minutes: 45

# Monitoring probes configuration
probes:
  # Citrix Virtual Apps and Desktops monitoring
  - name: citrix
    type: citrix
    params:
      interval: 120           # Collection interval (2 minutes recommended)
      timeout: 30             # Request timeout (seconds)

      # Debug mode: extract identifiers for CVAD vs OData mapping analysis
      debug_identifiers: false

      # Retry configuration for reliability
      retry:
        max_attempts: 3
        backoff_factor: 2.0

      # Director/OData API (REQUIRED)
      director:
        url: "https://citrix-director.company.com"
        verify_ssl: true
        auth:
          username: "DOMAIN\\svc-monitoring"
          password: ${secret:citrix.director_password}   # auto-sealed on install

  # System monitoring probes (recommended for complete coverage)
  - name: cpu
    type: cpu
    params:
      interval: 30

  - name: memory
    type: memory
    params:
      interval: 30

  - name: network
    type: network
    params:
      interval: 60

  - name: logicaldisk
    type: logicaldisk
    params:
      interval: 30

