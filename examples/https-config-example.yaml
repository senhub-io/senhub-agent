# ===== MULTI-INTERFACE CONFIGURATION =====
# Perfect for: Servers with multiple network interfaces, DMZ deployment

agent:
  key: "multi-interface-agent-key-44444"
  mode: offline
  generated: false

storage:
  # Internal interface (management network)
  - name: http
    params:
      port: 8443
      bind_address: "10.0.1.100"                # Management network
      endpoints: ["senhub", "web"]              # Full access
      
      tls:
        enabled: true
        mode: "auto"
        auto_cert:
          common_name: "agent-mgmt.internal"
          san_hosts: ["agent-mgmt.internal", "10.0.1.100"]

# Note: For multiple HTTP strategies, you would need multiple agent instances
# or use a reverse proxy to handle different interfaces

probes:
  - name: cpu
    params: {interval: 30}
  - name: memory
    params: {interval: 30}
  - name: network
    params: {interval: 60}
  - name: logicaldisk
    params: {interval: 30}

# Access: https://10.0.1.100:8443/web/{agentkey}/dashboard (management network)

---

# ===== CERTIFICATE MANAGEMENT NOTES =====

# Auto-generated certificates:
# - Location: ./certs/agent-cert.pem, ./certs/agent-key.pem
# - Permissions: 644 for cert, 600 for key
# - Renewal: Automatic when < 30 days to expiry
# - Browser warnings: Normal for self-signed certificates

# Custom certificates:
# - Formats: PEM format required
# - Key types: RSA (2048+ bits) or ECDSA (P-256, P-384)
# - Chain: Include intermediate certificates in cert file
# - Renewal: External process required (certbot, manual, etc.)

# Testing certificates:
# - View details: openssl x509 -in cert.pem -text -noout
# - Test connection: openssl s_client -connect localhost:8443
# - Verify chain: openssl verify -CAfile ca.pem cert.pem

# Security recommendations:
# - Use TLS 1.3 for modern environments
# - Use TLS 1.2 minimum for compatibility
# - Avoid SSLv3, TLS 1.0, TLS 1.1
# - Implement proper certificate monitoring
# - Use strong cipher suites
# - Consider HSTS headers for web browsers