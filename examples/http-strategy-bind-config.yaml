# Configuration examples for HTTP Strategy bind address

# Example 1: Bind to all interfaces (default behavior)
storage:
  - type: "http"
    config:
      port: 8080
      bind_address: "0.0.0.0"  # Listen on all interfaces

# Example 2: Bind to loopback only (localhost access only)
storage:
  - type: "http"
    config:
      port: 8080
      bind_address: "127.0.0.1"  # Listen on loopback only

# Example 3: Bind to specific network interface
storage:
  - type: "http"
    config:
      port: 8080
      bind_address: "192.168.1.100"  # Listen on specific IP address

# Example 4: Multiple storage strategies with different bind addresses
storage:
  - type: "http"
    config:
      port: 8080
      bind_address: "127.0.0.1"  # Internal monitoring
  - type: "http"
    config:
      port: 8081
      bind_address: "192.168.1.100"  # External monitoring

# Example 5: Combined with custom naming configuration
storage:
  - type: "http"
    config:
      port: 8080
      bind_address: "127.0.0.1"
      naming:
        redfish: "friendly"
        host: "prtg_standard"
        otel: "technical"