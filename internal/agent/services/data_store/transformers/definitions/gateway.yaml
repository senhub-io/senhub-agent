# Gateway and Network Connectivity Metrics Definitions
# Compatible with network connectivity monitoring

probe_name: "gateway"
version: "1.0.0"

metrics:
  # Basic Gateway Connectivity
  - name: "averageLatency"
    channel: "gateway_average_latency"
    display_name: "Gateway Average Latency"
    unit: "ms"
    description: "Average round-trip latency to default gateway"
    category: "latency"

  - name: "packetLoss"
    channel: "gateway_packet_loss"
    display_name: "Gateway Packet Loss"
    unit: "%"
    description: "Packet loss percentage to default gateway"
    category: "connectivity"

  - name: "minLatency"
    channel: "gateway_min_latency"
    display_name: "Gateway Minimum Latency"
    unit: "ms"
    description: "Minimum round-trip latency to default gateway"
    category: "latency"

  - name: "maxLatency"
    channel: "gateway_max_latency"
    display_name: "Gateway Maximum Latency"
    unit: "ms"
    description: "Maximum round-trip latency to default gateway"
    category: "latency"

  - name: "availability"
    channel: "gateway_availability"
    display_name: "Gateway Availability"
    unit: "%"
    description: "Gateway availability percentage over measurement period"
    category: "connectivity"

  # Extended Network Connectivity
  - name: "pingTime"
    channel: "ping_time"
    display_name: "Ping Time to {target}"
    unit: "ms"
    multi_instance_labels: ["target", "host"]
    description: "Ping response time to specific network targets"
    category: "connectivity"

  - name: "pingSuccess"
    channel: "ping_success"
    display_name: "Ping Success to {target}"
    unit: "%"
    multi_instance_labels: ["target", "host"]
    description: "Ping success rate to specific network targets"
    category: "connectivity"

  # DNS Performance
  - name: "dnsResolutionTime"
    channel: "dns_resolution_time"
    display_name: "DNS Resolution Time"
    unit: "ms"
    description: "Time to resolve DNS queries"
    category: "dns"

  - name: "dnsResolutionSuccess"
    channel: "dns_resolution_success"
    display_name: "DNS Resolution Success"
    unit: "%"
    description: "Success rate of DNS resolution attempts"
    category: "dns"

  # Network Interface Monitoring
  - name: "interfaceStatus"
    channel: "interface_status"
    display_name: "Interface {interface} Status"
    unit: "#"
    multi_instance_labels: ["interface"]
    description: "Network interface operational status (up/down)"
    category: "interface"

  - name: "linkSpeed"
    channel: "link_speed"
    display_name: "Interface {interface} Link Speed"
    unit: "Mbps"
    multi_instance_labels: ["interface"]
    description: "Network interface link speed in Mbps"
    category: "interface"

  # WiFi Specific Metrics
  - name: "wifi_signal_strength"
    channel: "wifi_signal_strength"
    display_name: "WiFi Signal Strength"
    unit: "%"
    description: "WiFi signal strength percentage"
    category: "wifi"

  - name: "wifi_signal_quality"
    channel: "wifi_signal_quality"
    display_name: "WiFi Signal Quality"
    unit: "%"
    description: "WiFi signal quality percentage"
    category: "wifi"

  - name: "wifi_noise_level"
    channel: "wifi_noise_level"
    display_name: "WiFi Noise Level"
    unit: "dBm"
    description: "WiFi background noise level in dBm"
    category: "wifi"

  # Bandwidth Monitoring
  - name: "bandwidthUtilization"
    channel: "bandwidth_utilization"
    display_name: "Bandwidth Utilization"
    unit: "%"
    description: "Overall network bandwidth utilization percentage"
    category: "bandwidth"

  - name: "downloadSpeed"
    channel: "download_speed"
    display_name: "Download Speed"
    unit: "Mbps"
    description: "Measured download speed in Mbps"
    category: "bandwidth"

  - name: "uploadSpeed"
    channel: "upload_speed"
    display_name: "Upload Speed"
    unit: "Mbps"
    description: "Measured upload speed in Mbps"
    category: "bandwidth"

  # Route and Connectivity Analysis
  - name: "hopCount"
    channel: "hop_count"
    display_name: "Hop Count to {target}"
    unit: "#"
    multi_instance_labels: ["target"]
    description: "Number of network hops to reach target"
    category: "routing"

  - name: "routeLatency"
    channel: "route_latency"
    display_name: "Route Latency to {target}"
    unit: "ms"
    multi_instance_labels: ["target", "hop_number"]
    description: "Latency at specific hop in route to target"
    category: "routing"

tag_metadata:
  target:
    type: resource
    label: "Target Host"
    linked_categories: ["connectivity", "routing"]
  interface:
    type: resource
    label: "Network Interface"
    linked_categories: ["interface"]