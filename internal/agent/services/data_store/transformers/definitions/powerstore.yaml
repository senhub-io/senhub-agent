probe_name: "powerstore"
friendly_name: "Dell PowerStore"
version: "3.0.0"

# Format v3 — OTel-first source of truth.
# No OTel semconv for storage arrays — all metrics under senhub.powerstore.*
# extensions (same footing as senhub.veeam.*). hw.* is reserved for host
# hardware components, not array-level aggregates.
# See senhub-semantic-conventions §4.19.

metrics:
  # ═════════════════════════════════════════════════════════════════════════
  # CLUSTER — reachability + config state
  # ═════════════════════════════════════════════════════════════════════════
  - name: "powerstore_up"
    channel: "up"
    display_name: "Array Reachable"
    unit: "#"
    category: "cluster"
    multi_instance_labels: ["cluster"]
    description: "1 when the PowerStore management API answered this cycle, else 0"
    lookup: "senhub.powerstore.up"
    otel:
      name: senhub.powerstore.up
      unit: "1"
      type: gauge

  - name: "powerstore_cluster_state"
    channel: "cluster_state"
    display_name: "Cluster State"
    unit: "#"
    category: "cluster"
    multi_instance_labels: ["cluster"]
    description: "Cluster configuration state (Configured=2, Unconfigured=1, other=0)"
    lookup: "senhub.powerstore.cluster.state"
    otel:
      name: senhub.powerstore.cluster.state
      unit: "1"
      type: gauge
    tag_to_attribute:
      cluster_state: senhub.powerstore.cluster.config_state

  # ═════════════════════════════════════════════════════════════════════════
  # HARDWARE — healthy vs faulted component counts (collapsed via state attr)
  # ═════════════════════════════════════════════════════════════════════════
  - name: "powerstore_hardware_healthy"
    channel: "hardware_healthy"
    display_name: "Hardware Healthy"
    unit: "#"
    category: "hardware"
    multi_instance_labels: ["cluster"]
    description: "Number of hardware components in the Healthy lifecycle state"
    otel:
      name: senhub.powerstore.hardware.components
      unit: "{component}"
      type: gauge
      attributes:
        senhub.powerstore.hardware.state: healthy

  - name: "powerstore_hardware_faulted"
    channel: "hardware_faulted"
    display_name: "Hardware Faulted"
    unit: "#"
    category: "hardware"
    multi_instance_labels: ["cluster"]
    description: "Number of hardware components in a fault lifecycle state (not Healthy/Empty/Initializing)"
    otel:
      name: senhub.powerstore.hardware.components
      unit: "{component}"
      type: gauge
      attributes:
        senhub.powerstore.hardware.state: faulted

  # ─────────────────────────────────────────────────────────────────────────
  # PER-DRIVE — one series per drive (tag: drive)
  # ─────────────────────────────────────────────────────────────────────────
  - name: "powerstore_drive_state"
    channel: "drive_state"
    display_name: "Drive {drive} State"
    unit: "#"
    category: "hardware"
    multi_instance_labels: ["cluster", "drive"]
    description: "Drive lifecycle state (Healthy=1, otherwise 0)"
    otel:
      name: senhub.powerstore.drive.state
      unit: "1"
      type: gauge
    tag_to_attribute:
      drive: senhub.powerstore.drive.name

  # ─────────────────────────────────────────────────────────────────────────
  # PER-APPLIANCE — lifecycle state (tag: appliance)
  # ─────────────────────────────────────────────────────────────────────────
  - name: "powerstore_appliance_state"
    channel: "appliance_state"
    display_name: "Appliance {appliance} State"
    unit: "#"
    category: "hardware"
    multi_instance_labels: ["cluster", "appliance"]
    description: "Appliance lifecycle state (Healthy=1, otherwise 0)"
    otel:
      name: senhub.powerstore.appliance.state
      unit: "1"
      type: gauge
    tag_to_attribute:
      appliance: senhub.powerstore.appliance.name

  # ═════════════════════════════════════════════════════════════════════════
  # CAPACITY — physical/logical usage + data reduction
  # ═════════════════════════════════════════════════════════════════════════
  - name: "powerstore_capacity_physical_used"
    channel: "capacity_physical_used"
    display_name: "Physical Used"
    unit: "Bytes"
    category: "capacity"
    multi_instance_labels: ["cluster"]
    description: "Physical space used on the array"
    otel:
      name: senhub.powerstore.capacity.physical
      unit: By
      type: gauge
      attributes:
        senhub.powerstore.capacity.state: used

  - name: "powerstore_capacity_physical_total"
    channel: "capacity_physical_total"
    display_name: "Physical Total"
    unit: "Bytes"
    category: "capacity"
    multi_instance_labels: ["cluster"]
    description: "Total physical capacity of the array"
    otel:
      name: senhub.powerstore.capacity.physical
      unit: By
      type: gauge
      attributes:
        senhub.powerstore.capacity.state: total

  - name: "powerstore_capacity_used_ratio"
    channel: "capacity_used_ratio"
    display_name: "Physical Used Ratio"
    unit: "%"
    category: "capacity"
    multi_instance_labels: ["cluster"]
    description: "Percentage of physical capacity used (0-100; exported as a 0..1 ratio)"
    otel:
      name: senhub.powerstore.capacity.used_ratio
      unit: "1"
      type: gauge

  - name: "powerstore_capacity_logical_used"
    channel: "capacity_logical_used"
    display_name: "Logical Used"
    unit: "Bytes"
    category: "capacity"
    multi_instance_labels: ["cluster"]
    description: "Logical (thin-provisioned) space used before data reduction"
    otel:
      name: senhub.powerstore.capacity.logical
      unit: By
      type: gauge
      attributes:
        senhub.powerstore.capacity.state: used

  - name: "powerstore_data_reduction_ratio"
    channel: "data_reduction_ratio"
    display_name: "Data Reduction Ratio"
    unit: "#"
    category: "capacity"
    multi_instance_labels: ["cluster"]
    description: "Data reduction ratio (logical:physical), e.g. 1.49 = 1.49:1"
    otel:
      name: senhub.powerstore.data_reduction_ratio
      unit: "1"
      type: gauge

  - name: "powerstore_efficiency_ratio"
    channel: "efficiency_ratio"
    display_name: "Overall Efficiency Ratio"
    unit: "#"
    category: "capacity"
    multi_instance_labels: ["cluster"]
    description: "Overall storage efficiency ratio (thin + dedup + compression + snapshots)"
    otel:
      name: senhub.powerstore.efficiency_ratio
      unit: "1"
      type: gauge

  - name: "powerstore_capacity_logical_provisioned"
    channel: "capacity_logical_provisioned"
    display_name: "Logical Provisioned"
    unit: "Bytes"
    category: "capacity"
    multi_instance_labels: ["cluster"]
    description: "Logical capacity provisioned to hosts (thin)"
    otel:
      name: senhub.powerstore.capacity.logical
      unit: By
      type: gauge
      attributes:
        senhub.powerstore.capacity.state: provisioned

  # ─────────────────────────────────────────────────────────────────────────
  # PER-APPLIANCE CAPACITY — one series per appliance (tag: appliance)
  # ─────────────────────────────────────────────────────────────────────────
  - name: "powerstore_appliance_physical_used"
    channel: "appliance_physical_used"
    display_name: "{appliance} Physical Used"
    unit: "Bytes"
    category: "capacity"
    multi_instance_labels: ["cluster", "appliance"]
    description: "Physical space used on the appliance"
    otel:
      name: senhub.powerstore.appliance.capacity.physical
      unit: By
      type: gauge
      attributes:
        senhub.powerstore.capacity.state: used
    tag_to_attribute:
      appliance: senhub.powerstore.appliance.name

  - name: "powerstore_appliance_physical_total"
    channel: "appliance_physical_total"
    display_name: "{appliance} Physical Total"
    unit: "Bytes"
    category: "capacity"
    multi_instance_labels: ["cluster", "appliance"]
    description: "Total physical capacity of the appliance"
    otel:
      name: senhub.powerstore.appliance.capacity.physical
      unit: By
      type: gauge
      attributes:
        senhub.powerstore.capacity.state: total
    tag_to_attribute:
      appliance: senhub.powerstore.appliance.name

  - name: "powerstore_appliance_logical_used"
    channel: "appliance_logical_used"
    display_name: "{appliance} Logical Used"
    unit: "Bytes"
    category: "capacity"
    multi_instance_labels: ["cluster", "appliance"]
    description: "Logical (thin) space used on the appliance before data reduction"
    otel:
      name: senhub.powerstore.appliance.capacity.logical
      unit: By
      type: gauge
      attributes:
        senhub.powerstore.capacity.state: used
    tag_to_attribute:
      appliance: senhub.powerstore.appliance.name

  # ═════════════════════════════════════════════════════════════════════════
  # PERFORMANCE — IOPS / bandwidth / latency (collapsed via operation attr)
  # ═════════════════════════════════════════════════════════════════════════
  - name: "powerstore_iops_read"
    channel: "iops_read"
    display_name: "Read IOPS"
    unit: "#"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Average read IOPS over the interval"
    otel:
      name: senhub.powerstore.iops
      unit: "{operation}/s"
      type: gauge
      attributes:
        senhub.powerstore.operation: read

  - name: "powerstore_iops_write"
    channel: "iops_write"
    display_name: "Write IOPS"
    unit: "#"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Average write IOPS over the interval"
    otel:
      name: senhub.powerstore.iops
      unit: "{operation}/s"
      type: gauge
      attributes:
        senhub.powerstore.operation: write

  - name: "powerstore_iops_total"
    channel: "iops_total"
    display_name: "Total IOPS"
    unit: "#"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Average total IOPS over the interval"
    otel:
      name: senhub.powerstore.iops
      unit: "{operation}/s"
      type: gauge
      attributes:
        senhub.powerstore.operation: total

  - name: "powerstore_bandwidth_read"
    channel: "bandwidth_read"
    display_name: "Read Bandwidth"
    unit: "Bytes/s"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Average read bandwidth over the interval"
    otel:
      name: senhub.powerstore.bandwidth
      unit: By/s
      type: gauge
      attributes:
        senhub.powerstore.operation: read

  - name: "powerstore_bandwidth_write"
    channel: "bandwidth_write"
    display_name: "Write Bandwidth"
    unit: "Bytes/s"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Average write bandwidth over the interval"
    otel:
      name: senhub.powerstore.bandwidth
      unit: By/s
      type: gauge
      attributes:
        senhub.powerstore.operation: write

  - name: "powerstore_bandwidth_total"
    channel: "bandwidth_total"
    display_name: "Total Bandwidth"
    unit: "Bytes/s"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Average total bandwidth over the interval"
    otel:
      name: senhub.powerstore.bandwidth
      unit: By/s
      type: gauge
      attributes:
        senhub.powerstore.operation: total

  - name: "powerstore_latency_read"
    channel: "latency_read"
    display_name: "Read Latency"
    unit: "µs"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Average read latency over the interval (microseconds)"
    otel:
      name: senhub.powerstore.latency
      unit: us
      type: gauge
      attributes:
        senhub.powerstore.operation: read

  - name: "powerstore_latency_write"
    channel: "latency_write"
    display_name: "Write Latency"
    unit: "µs"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Average write latency over the interval (microseconds)"
    otel:
      name: senhub.powerstore.latency
      unit: us
      type: gauge
      attributes:
        senhub.powerstore.operation: write

  - name: "powerstore_latency_total"
    channel: "latency_total"
    display_name: "Latency"
    unit: "µs"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Average overall latency over the interval (microseconds)"
    otel:
      name: senhub.powerstore.latency
      unit: us
      type: gauge
      attributes:
        senhub.powerstore.operation: total

  - name: "powerstore_io_size"
    channel: "io_size"
    display_name: "Average IO Size"
    unit: "Bytes"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Average IO size over the interval"
    otel:
      name: senhub.powerstore.io_size
      unit: By
      type: gauge

  - name: "powerstore_cpu_utilization"
    channel: "cpu_utilization"
    display_name: "CPU Workload Utilization"
    unit: "%"
    category: "performance"
    multi_instance_labels: ["cluster"]
    description: "Array IO-workload CPU utilization, appliance-level (percent; exported as a 0..1 ratio)"
    otel:
      name: senhub.powerstore.cpu.utilization
      unit: "1"
      type: gauge

  # ─────────────────────────────────────────────────────────────────────────
  # PER-APPLIANCE PERFORMANCE — one series per appliance (tag: appliance)
  # ─────────────────────────────────────────────────────────────────────────
  - name: "powerstore_appliance_iops_read"
    channel: "appliance_iops_read"
    display_name: "{appliance} Read IOPS"
    unit: "#"
    category: "performance"
    multi_instance_labels: ["cluster", "appliance"]
    description: "Average read IOPS on the appliance over the interval"
    otel:
      name: senhub.powerstore.appliance.iops
      unit: "{operation}/s"
      type: gauge
      attributes:
        senhub.powerstore.operation: read
    tag_to_attribute:
      appliance: senhub.powerstore.appliance.name

  - name: "powerstore_appliance_iops_write"
    channel: "appliance_iops_write"
    display_name: "{appliance} Write IOPS"
    unit: "#"
    category: "performance"
    multi_instance_labels: ["cluster", "appliance"]
    description: "Average write IOPS on the appliance over the interval"
    otel:
      name: senhub.powerstore.appliance.iops
      unit: "{operation}/s"
      type: gauge
      attributes:
        senhub.powerstore.operation: write
    tag_to_attribute:
      appliance: senhub.powerstore.appliance.name

  - name: "powerstore_appliance_iops_total"
    channel: "appliance_iops_total"
    display_name: "{appliance} Total IOPS"
    unit: "#"
    category: "performance"
    multi_instance_labels: ["cluster", "appliance"]
    description: "Average total IOPS on the appliance over the interval"
    otel:
      name: senhub.powerstore.appliance.iops
      unit: "{operation}/s"
      type: gauge
      attributes:
        senhub.powerstore.operation: total
    tag_to_attribute:
      appliance: senhub.powerstore.appliance.name

  - name: "powerstore_appliance_bandwidth_total"
    channel: "appliance_bandwidth_total"
    display_name: "{appliance} Total Bandwidth"
    unit: "Bytes/s"
    category: "performance"
    multi_instance_labels: ["cluster", "appliance"]
    description: "Average total bandwidth on the appliance over the interval"
    otel:
      name: senhub.powerstore.appliance.bandwidth
      unit: By/s
      type: gauge
      attributes:
        senhub.powerstore.operation: total
    tag_to_attribute:
      appliance: senhub.powerstore.appliance.name

  - name: "powerstore_appliance_latency_total"
    channel: "appliance_latency_total"
    display_name: "{appliance} Latency"
    unit: "µs"
    category: "performance"
    multi_instance_labels: ["cluster", "appliance"]
    description: "Average overall latency on the appliance over the interval (microseconds)"
    otel:
      name: senhub.powerstore.appliance.latency
      unit: us
      type: gauge
      attributes:
        senhub.powerstore.operation: total
    tag_to_attribute:
      appliance: senhub.powerstore.appliance.name

  - name: "powerstore_appliance_cpu_utilization"
    channel: "appliance_cpu_utilization"
    display_name: "{appliance} CPU Utilization"
    unit: "%"
    category: "performance"
    multi_instance_labels: ["cluster", "appliance"]
    description: "Appliance IO-workload CPU utilization (percent; exported as a 0..1 ratio)"
    otel:
      name: senhub.powerstore.appliance.cpu.utilization
      unit: "1"
      type: gauge
    tag_to_attribute:
      appliance: senhub.powerstore.appliance.name

  # ─────────────────────────────────────────────────────────────────────────
  # PER-NODE PERFORMANCE — one series per node (tag: node)
  # ─────────────────────────────────────────────────────────────────────────
  - name: "powerstore_node_cpu_utilization"
    channel: "node_cpu_utilization"
    display_name: "Node {node} CPU Utilization"
    unit: "%"
    category: "performance"
    multi_instance_labels: ["cluster", "node"]
    description: "Node IO-workload CPU utilization (percent; exported as a 0..1 ratio)"
    otel:
      name: senhub.powerstore.node.cpu.utilization
      unit: "1"
      type: gauge
    tag_to_attribute:
      node: senhub.powerstore.node.name

  - name: "powerstore_node_iops_total"
    channel: "node_iops_total"
    display_name: "Node {node} Total IOPS"
    unit: "#"
    category: "performance"
    multi_instance_labels: ["cluster", "node"]
    description: "Average total IOPS on the node over the interval"
    otel:
      name: senhub.powerstore.node.iops
      unit: "{operation}/s"
      type: gauge
      attributes:
        senhub.powerstore.operation: total
    tag_to_attribute:
      node: senhub.powerstore.node.name

  # ═════════════════════════════════════════════════════════════════════════
  # REPLICATION
  # ═════════════════════════════════════════════════════════════════════════
  - name: "powerstore_replication_sessions"
    channel: "replication_sessions"
    display_name: "Replication Sessions"
    unit: "#"
    category: "replication"
    multi_instance_labels: ["cluster"]
    description: "Number of replication sessions (0 when replication is not configured)"
    otel:
      name: senhub.powerstore.replication.sessions
      unit: "{session}"
      type: gauge

  # ─────────────────────────────────────────────────────────────────────────
  # PER-SESSION REPLICATION — one series per session (tag: session)
  # ─────────────────────────────────────────────────────────────────────────
  - name: "powerstore_replication_state"
    channel: "replication_state"
    display_name: "Replication {session} State"
    unit: "#"
    category: "replication"
    multi_instance_labels: ["cluster", "session"]
    description: "Replication session state (OK=2, transitional=1, error=0)"
    otel:
      name: senhub.powerstore.replication.state
      unit: "1"
      type: gauge
    tag_to_attribute:
      session: senhub.powerstore.replication.session_id

  # ═════════════════════════════════════════════════════════════════════════
  # VOLUMES — total + not-ready counts
  # ═════════════════════════════════════════════════════════════════════════
  - name: "powerstore_volumes_total"
    channel: "volumes_total"
    display_name: "Volumes Total"
    unit: "#"
    category: "volumes"
    multi_instance_labels: ["cluster"]
    description: "Total number of provisioned volumes"
    otel:
      name: senhub.powerstore.volumes
      unit: "{volume}"
      type: gauge

  - name: "powerstore_volumes_not_ready"
    channel: "volumes_not_ready"
    display_name: "Volumes Not Ready"
    unit: "#"
    category: "volumes"
    multi_instance_labels: ["cluster"]
    description: "Number of volumes not in the Ready state"
    otel:
      name: senhub.powerstore.volumes.not_ready
      unit: "{volume}"
      type: gauge

  # ─────────────────────────────────────────────────────────────────────────
  # PER-VOLUME — one series per volume (tag: volume)
  # ─────────────────────────────────────────────────────────────────────────
  - name: "powerstore_volume_state"
    channel: "volume_state"
    display_name: "{volume} State"
    unit: "#"
    category: "volumes"
    multi_instance_labels: ["cluster", "volume"]
    description: "Volume operational state (Ready=1, otherwise 0)"
    otel:
      name: senhub.powerstore.volume.state
      unit: "1"
      type: gauge
    tag_to_attribute:
      volume: senhub.powerstore.volume.name

  - name: "powerstore_volume_logical_used"
    channel: "volume_logical_used"
    display_name: "{volume} Logical Used"
    unit: "Bytes"
    category: "volumes"
    multi_instance_labels: ["cluster", "volume"]
    description: "Logical data written to the volume before data reduction"
    otel:
      name: senhub.powerstore.volume.logical_used
      unit: By
      type: gauge
    tag_to_attribute:
      volume: senhub.powerstore.volume.name

  - name: "powerstore_volume_size"
    channel: "volume_size"
    display_name: "{volume} Provisioned Size"
    unit: "Bytes"
    category: "volumes"
    multi_instance_labels: ["cluster", "volume"]
    description: "Provisioned (thin) size of the volume"
    otel:
      name: senhub.powerstore.volume.size
      unit: By
      type: gauge
    tag_to_attribute:
      volume: senhub.powerstore.volume.name

  # ═════════════════════════════════════════════════════════════════════════
  # ALERTS — active alert count per severity
  # ═════════════════════════════════════════════════════════════════════════
  - name: "powerstore_alerts_active"
    channel: "alerts_active"
    display_name: "Active Alerts ({severity})"
    unit: "#"
    category: "alerts"
    multi_instance_labels: ["cluster", "severity"]
    description: "Number of active (uncleared) alerts by severity"
    otel:
      name: senhub.powerstore.alerts.active
      unit: "{alert}"
      type: gauge
    tag_to_attribute:
      severity: senhub.powerstore.alert.severity

# ═══════════════════════════════════════════════════════════════════════════
# TAG METADATA — declares which tags are filterable in the Web UI / PRTG.
# A tag is only surfaced as a filter (HandleInfoTags) when it has an entry
# here. metric_type carries the metric's category; severity qualifies alerts.
# ═══════════════════════════════════════════════════════════════════════════
tag_metadata:
  metric_type:
    type: category
    label: "Metric Type"
    value_labels:
      cluster: "Cluster"
      hardware: "Hardware"
      volumes: "Volumes"
      alerts: "Alerts"
      capacity: "Capacity"
      performance: "Performance"
      replication: "Replication"
  severity:
    type: resource
    label: "Alert Severity"
    value_labels:
      Critical: "Critical"
      Major: "Major"
      Minor: "Minor"
      Info: "Info"
    linked_categories: ["alerts"]
  volume:
    type: resource
    label: "Volume"
    linked_categories: ["volumes"]
  appliance:
    type: resource
    label: "Appliance"
    linked_categories: ["capacity", "performance", "hardware"]
  node:
    type: resource
    label: "Node"
    linked_categories: ["performance"]
  drive:
    type: resource
    label: "Drive"
    linked_categories: ["hardware"]
  session:
    type: resource
    label: "Replication Session"
    linked_categories: ["replication"]
