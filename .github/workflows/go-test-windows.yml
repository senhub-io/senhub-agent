name: Go-test-windows
on:
  pull_request:
    # Windows runners bill at 2x. Windows-specific code is runtime-validated on
    # a real host (bbcloud) and packaged by the windows-msi workflow, so CI
    # Windows tests run ONLY on PRs to master (the release gate), not on every
    # feature PR to dev.
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
env:
  SENHUB_KEY: "test-key"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Test with the Go CLI
        run: make test

      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          ENV: production
        run: make build

      - name: Test Windows Service
        shell: powershell
        run: |
          if (Test-Path -Path ".\scripts\test_windows_service.ps1") {
            .\scripts\test_windows_service.ps1
          } else {
            Write-Host "Service test script not found, skipping"
          }
