name: Go-test
on:
  pull_request:
    branches: [dev, master]
    paths-ignore:
      - 'docs/**'
      - '*.md'

# Cancel an in-progress run when the same PR is pushed again — no point paying
# for a run that a newer commit has already superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux is the primary CI gate and runs on every PR (race detector +
  # govulncheck + boot smoke below also run here). It is the cheapest runner
  # (1x billing).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: make build
      - name: Vet
        run: go vet ./...
      - name: Test
        run: make test

  # Race detector runs on linux only. The configuration package was
  # excluded here while it carried 4 documented race flakes; their
  # root cause (lock-free reads of the live config state) was fixed
  # in #268 — the package is back in and validated with 100
  # consecutive clean -race runs.
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
      - name: Test with race detector
        run: go test -race ./...

  # Boot smoke: builds the agent binary, exec's `version` + parses
  # every shipped free-tier example config via `config check`. Catches
  # the kind of bring-up regression that unit tests can't see — linker
  # errors, config-schema-breakage, platform-gate drift.
  boot-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
      - name: Boot smoke
        run: make boot-smoke

  # govulncheck flags known CVEs against the resolved dependency graph
  # (direct + transitive). Fails the pipeline on any finding so that
  # the dependency upgrade is part of the PR that introduced it,
  # rather than a separate maintenance task.
  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
