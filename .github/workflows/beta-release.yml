name: Beta Release
on:
  push:
    branches: [ dev ]
    tags-ignore:
      - '*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.0'
      - name: Get Go Version
        id: go_version
        run: |
          GO_VERSION=$(go version | cut -d' ' -f3)
          echo "GO_VERSION=$GO_VERSION" >> $GITHUB_ENV
      - name: Get Version from Package
        id: get_version
        run: |
          # Get the version directly from the git describe command
          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "Using existing tag: $CURRENT_TAG"
          
          # Check if tag already ends with -beta
          if [[ $CURRENT_TAG == *-beta ]]; then
            # Tag already has -beta, increment the patch version
            BASE_VERSION=${CURRENT_TAG%-beta}
            if [[ $BASE_VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR=${BASH_REMATCH[1]}
              MINOR=${BASH_REMATCH[2]}
              PATCH=${BASH_REMATCH[3]}
              NEW_PATCH=$((PATCH + 1))
              NEW_TAG="${MAJOR}.${MINOR}.${NEW_PATCH}-beta"
            else
              # Fallback if version format is unexpected
              NEW_TAG="${CURRENT_TAG}-new"
            fi
          else
            # Tag doesn't have -beta, add it
            NEW_TAG="${CURRENT_TAG}-beta"
          fi
          
          echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV
          echo "beta_tag=$NEW_TAG" >> $GITHUB_ENV
          echo "New beta tag will be: $NEW_TAG"
      - name: Create and push beta tag
        run: |
          git tag ${{ env.beta_tag }}
          git push origin ${{ env.beta_tag }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip-validate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GOVERSION: ${{ env.GO_VERSION }}
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.beta_tag }}
          name: Beta Release ${{ env.beta_tag }}
          files: |
            dist/senhub-agent_linux_*
            dist/senhub-agent_windows_*
            dist/senhub-agent_darwin_*
            dist/metadata.json
          generate_release_notes: false
          prerelease: true
