# SenHub Agent - Offline Mode Configuration Example
# This file demonstrates all available configuration options for offline mode

# Agent configuration
agent:
  key: "offline-hostname-1625097600-a1b2c3d4"  # Auto-generated unique key
  mode: offline                                 # Operating mode
  generated: true                               # Indicates auto-generated key

# Storage strategies - define how and where to send metrics
storage:
  # HTTP Strategy - Local web server and API endpoints
  - name: http
    params:
      port: 8080                                # HTTP port (use 8443 for HTTPS)
      bind_address: "127.0.0.1"                 # "127.0.0.1" for localhost, "0.0.0.0" for all interfaces
      endpoints: ["prtg", "senhub", "web", "nagios"]  # Available API formats
      
      # TLS/HTTPS Configuration (optional)
      tls:
        enabled: false                          # Enable HTTPS
        mode: "auto"                            # "auto" (self-signed), "provided" (custom certs), "disabled"
        
        # Auto-generated certificate settings (mode: "auto")
        auto_cert:
          organization: "SenHub Agent"
          common_name: "localhost"
          san_hosts:                            # Subject Alternative Names
            - "localhost"
            - "127.0.0.1"
            - "agent.company.com"               # Add your hostnames here
            - "192.168.1.100"                   # Add your IP addresses here
          validity_days: 365                    # Certificate validity period
          key_size: 2048                        # RSA key size
        
        # Custom certificate settings (mode: "provided")
        cert_file: "/etc/ssl/certs/agent.pem"  # Path to certificate file
        key_file: "/etc/ssl/private/agent.key" # Path to private key file
        
        # Security settings
        min_tls_version: "1.2"                 # Minimum TLS version ("1.2" or "1.3")
        cipher_suites: []                       # Empty = secure defaults

# Monitoring probes - define what to monitor
probes:
  # ===== ACTIVE PROBES (ENABLED BY DEFAULT) =====
  
  # CPU monitoring - processor utilization and performance
  - name: cpu
    params:
      interval: 30                              # Collection interval in seconds
      
  # Memory monitoring - RAM usage and swap metrics
  - name: memory
    params:
      interval: 30                              # Collection interval in seconds
      
  # Network monitoring - interface statistics and throughput
  - name: network
    params:
      interval: 60                              # Collection interval in seconds (less frequent)
      
  # Disk monitoring - space utilization and I/O metrics
  - name: logicaldisk
    params:
      interval: 30                              # Collection interval in seconds

  # ===== ADDITIONAL PROBES (UNCOMMENT TO ENABLE) =====

  # # WiFi signal strength monitoring (auto-detects WiFi availability)
  # - name: wifi_signal_strength
