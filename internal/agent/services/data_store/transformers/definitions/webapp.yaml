# Web Application Metrics Definitions
# Compatible with senhub-sensor-web-agent PowerShell connector

probe_name: "webapp"
version: "1.0.0"

metrics:
  # WiFi Signal Strength (inherited from host connectivity)
  - name: "wifi_signal_strength"
    channel: "wifi_signal_strength"
    display_name: "WiFi Signal Strength"
    unit: "%"
    description: "WiFi signal strength percentage"
    category: "connectivity"

  # Gateway Metrics (network connectivity)
  - name: "averageLatency"
    channel: "gateway_average_latency"
    display_name: "Gateway Average Latency"
    unit: "ms"
    description: "Average latency to gateway"
    category: "connectivity"
    tag_filter:
      url: null  # No URL tag means gateway metric
      
  - name: "packetLoss"
    channel: "gateway_packetloss"
    display_name: "Gateway Packet Loss"
    unit: "%"
    description: "Packet loss percentage to gateway"
    category: "connectivity"
    tag_filter:
      url: null  # No URL tag means gateway metric

  # WebApp Specific Metrics (filtered by URL)
  - name: "averageLatency"
    channel: "webapp_average_latency"
    display_name: "WebApp Average Latency"
    unit: "ms"
    description: "Average latency to web application"
    category: "performance"
    tag_filter:
      url: "{webapp_url}"  # Filtered by specific webapp URL

  - name: "packetLoss"
    channel: "webapp_packetloss"
    display_name: "WebApp Packet Loss"
    unit: "%"
    description: "Packet loss percentage to web application"
    category: "performance"
    tag_filter:
      url: "{webapp_url}"  # Filtered by specific webapp URL

  - name: "connecttime"
    channel: "webapp_connect_time"
    display_name: "WebApp Connect Time"
    unit: "ms"
    description: "Connection establishment time to web application"
    category: "performance"
    tag_filter:
      url: "{webapp_url}"  # Filtered by specific webapp URL

  - name: "dnstime"
    channel: "webapp_dns_time"
    display_name: "WebApp DNS Resolution Time"
    unit: "ms"
    description: "DNS resolution time for web application"
    category: "performance"
    tag_filter:
      url: "{webapp_url}"  # Filtered by specific webapp URL

  - name: "tlstime"
    channel: "webapp_tls_time"
    display_name: "WebApp TLS Handshake Time"
    unit: "ms"
    description: "TLS handshake time for web application"
    category: "performance"
    tag_filter:
      url: "{webapp_url}"  # Filtered by specific webapp URL

  - name: "total_time"
    channel: "webapp_total_time"
    display_name: "WebApp Total Load Time"
    unit: "ms"
    description: "Total page load time for web application"
    category: "performance"
    tag_filter:
      url: "{webapp_url}"  # Filtered by specific webapp URL

  - name: "ttfb"
    channel: "webapp_time_to_first_byte"
    display_name: "WebApp Time to First Byte"
    unit: "ms"
    description: "Time to first byte for web application"
    category: "performance"
    tag_filter:
      url: "{webapp_url}"  # Filtered by specific webapp URL

  # Generic HTTP Response Metrics
  - name: "http_response_time"
    channel: "http_response_time"
    display_name: "HTTP Response Time"
    unit: "ms"
    description: "HTTP response time"
    category: "availability"
    multi_instance_labels: ["url"]

  - name: "http_availability"
    channel: "http_availability"
    display_name: "HTTP Availability"
    unit: "%"
    description: "HTTP service availability percentage"
    category: "availability"
    multi_instance_labels: ["url"]

tag_metadata:
  url:
    type: resource
    label: "Web Application URL"
    linked_categories: ["performance", "availability"]
  # System tags (injected by framework)
  host:
    type: resource
    label: "Host"
  os:
    type: resource
    label: "Operating System"
  platform:
    type: resource
    label: "Platform"
  probe_name:
    type: resource
    label: "Probe Name"
  probe_type:
    type: resource
    label: "Probe Type"

# Configuration parameters for PowerShell connector compatibility
configuration:
  required_parameters:
    - "WebAppUrl"    # The specific web application URL to monitor
  
  parameter_mapping:
    webapp_url: "WebAppUrl"  # Maps {webapp_url} template to PowerShell parameter