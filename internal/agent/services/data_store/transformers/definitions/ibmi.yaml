    multi_instance_labels: ["category", "status"]

  - name: "ibmi.hardware_resource.total"
    channel: "ibmi_hw_total"
    display_name: "Hardware Resources Total"
    unit: "#"
    category: "hardware"

  - name: "ibmi.hardware_resource.non_operational_total"
    channel: "ibmi_hw_non_operational"
    display_name: "Non-operational HW"
    unit: "#"
    category: "hardware"
    description: "Resources in any non-OPERATIONAL status"

  - name: "ibmi.user_profile.total"
    channel: "ibmi_users_total"
    display_name: "User Profiles Total"
    unit: "#"
    category: "security"

  - name: "ibmi.user_profile.count_by_status"
    channel: "ibmi_users_count_by_status"
    display_name: "Users — {status}"
    unit: "#"
    category: "security"
    multi_instance_labels: ["status"]

  - name: "ibmi.user_profile.count_by_class"
    channel: "ibmi_users_count_by_class"
    display_name: "Users — class {user_class}"
    unit: "#"
    category: "security"
    multi_instance_labels: ["user_class"]

  - name: "ibmi.user_profile.failed_signon_total"
    channel: "ibmi_users_failed_signon"
    display_name: "Users with Failed Signons"
    unit: "#"
    category: "security"

  - name: "ibmi.sysval.security_level"
    channel: "ibmi_sysval_security_level"
