probe_name: "netscaler"
friendly_name: "Citrix Netscaler ADC"
multi_instance_labels: ["vserver", "service", "servicegroup", "certname", "partition", "interface", "csvserver", "cspolicy", "gslbvserver", "gslbsite", "gslbservice", "authvserver", "vpnvserver"]

metrics:
  # System-level Metrics
  - name: "netscaler.system.cpu.usage.percent"
    channel: "system.cpu.usage"
    display_name: "System CPU Usage"
    unit: "%"
    category: "system"
    description: "Percentage of CPU resources consumed by the NetScaler appliance"

  - name: "netscaler.system.cpu.mgmt.usage.percent"
    channel: "system.cpu.mgmt.usage"
    display_name: "System Management CPU Usage"
    unit: "%"
    category: "system"
    description: "CPU usage of the management plane (NSPPE excluded)"

  - name: "netscaler.system.memory.usage.percent"
    channel: "system.memory.usage"
    display_name: "System Memory Usage"
    unit: "%"
    category: "system"
    description: "Percentage of memory used by the NetScaler appliance"

  - name: "netscaler.system.network.rx.mbits_per_sec"
    channel: "system.network.rx"
    display_name: "System Network Receive Rate"
    unit: "Mbits/s"
    category: "system"
    description: "Aggregate network receive throughput across all interfaces"

  - name: "netscaler.system.network.tx.mbits_per_sec"
    channel: "system.network.tx"
    display_name: "System Network Transmit Rate"
    unit: "Mbits/s"
    category: "system"
    description: "Aggregate network transmit throughput across all interfaces"

  - name: "netscaler.system.http.requests.rate"
    channel: "system.http.requests"
    display_name: "System HTTP Requests Rate"
    unit: "req/s"
    category: "system"
    description: "Rate of HTTP requests received by the appliance"

  - name: "netscaler.system.http.responses.rate"
    channel: "system.http.responses"
    display_name: "System HTTP Responses Rate"
    unit: "resp/s"
    category: "system"
    description: "Rate of HTTP responses sent by the appliance"

  - name: "netscaler.system.tcp.client.connections.current"
    channel: "system.tcp.client.connections"
    display_name: "System TCP Client Connections"
    unit: "#"
    category: "system"
    description: "Current number of client-side TCP connections"

  - name: "netscaler.system.tcp.server.connections.current"
    channel: "system.tcp.server.connections"
    display_name: "System TCP Server Connections"
    unit: "#"
    category: "system"
    description: "Current number of server-side TCP connections"

  # Netscaler Global Metrics
  - name: "netscaler.ns.throughput.total.mbits_per_sec"
    channel: "ns.throughput.total"
    display_name: "NS Total Throughput"
    unit: "Mbits/s"
    category: "network"
    description: "Total network throughput (RX + TX) of the NetScaler"

  - name: "netscaler.ns.http.throughput.mbits_per_sec"
    channel: "ns.http.throughput"
    display_name: "NS HTTP Throughput"
    unit: "Mbits/s"
    category: "network"
    description: "HTTP-only throughput of the NetScaler"

  # SSL Metrics
  - name: "netscaler.ssl.transactions.rate"
    channel: "ssl.transactions.rate"
    display_name: "SSL Transactions Rate"
    unit: "tx/s"
    category: "security"
    description: "Rate of SSL/TLS transactions processed"

  - name: "netscaler.ssl.sessions.total"
    channel: "ssl.sessions.total"
    display_name: "SSL Sessions Total"
    unit: "#"
    category: "security"
    description: "Total number of active SSL sessions"

  # Load Balancer Virtual Server Metrics
  - name: "netscaler.lbvserver.state"
    channel: "lbvserver.state"
    display_name: "VServer State ({vserver})"
    unit: "#"
    multi_instance_labels: ["vserver"]
    lookup: "netscaler.lbvserver.state"
    category: "load_balancing"
    description: "Operational state of the LB virtual server"

  - name: "netscaler.lbvserver.requests.rate"
    channel: "lbvserver.requests.rate"
    display_name: "VServer Requests Rate ({vserver})"
    unit: "req/s"
    multi_instance_labels: ["vserver"]
    category: "load_balancing"
    description: "Rate of requests hitting the virtual server"

  - name: "netscaler.lbvserver.connections.current"
    channel: "lbvserver.connections.current"
    display_name: "VServer Current Connections ({vserver})"
    unit: "#"
    multi_instance_labels: ["vserver"]
    category: "load_balancing"
    description: "Number of active connections on the virtual server"

  - name: "netscaler.lbvserver.throughput.rx.bytes_per_sec"
    channel: "lbvserver.throughput.rx.bytes_per_sec"
    display_name: "VServer Received Throughput ({vserver})"
    unit: "bytes/s"
    multi_instance_labels: ["vserver"]
    category: "load_balancing"
    description: "Inbound throughput to the virtual server"

  - name: "netscaler.lbvserver.throughput.tx.bytes_per_sec"
    channel: "lbvserver.throughput.tx.bytes_per_sec"
    display_name: "VServer Transmitted Throughput ({vserver})"
    unit: "bytes/s"
    multi_instance_labels: ["vserver"]
    category: "load_balancing"
    description: "Outbound throughput from the virtual server"

  # Service Metrics
  - name: "netscaler.service.state"
    channel: "service.state"
    display_name: "Service State ({service})"
    unit: "#"
    multi_instance_labels: ["service"]
    lookup: "netscaler.service.state"
    category: "services"
    description: "Operational state of the service"

  - name: "netscaler.service.throughput.bytes_per_sec"
    channel: "service.throughput.bytes_per_sec"
    display_name: "Service Throughput ({service})"
    unit: "bytes/s"
    multi_instance_labels: ["service"]
    category: "services"
    description: "Data throughput of the service"

  - name: "netscaler.service.transactions.active"
    channel: "service.transactions.active"
    display_name: "Service Active Transactions ({service})"
    unit: "#"
    multi_instance_labels: ["service"]
    category: "services"
    description: "Number of active transactions on the service"

  # Service Group Metrics
  - name: "netscaler.servicegroup.state"
    lookup: "netscaler.servicegroup.state"
    channel: "servicegroup.state"
    display_name: "Service Group State ({servicegroup})"
    unit: "#"
    multi_instance_labels: ["servicegroup"]
    category: "services"
    description: "Operational state of the service group"

  - name: "netscaler.servicegroup.requests.rate"
    channel: "servicegroup.requests.rate"
    display_name: "Service Group Requests Rate ({servicegroup})"
    unit: "req/s"
    multi_instance_labels: ["servicegroup"]
    category: "services"
    description: "Rate of requests handled by the service group"

  - name: "netscaler.servicegroup.responses.rate"
    channel: "servicegroup.responses.rate"
    display_name: "Service Group Responses Rate ({servicegroup})"
    unit: "resp/s"
    multi_instance_labels: ["servicegroup"]
    category: "services"
    description: "Rate of responses returned by the service group"

  - name: "netscaler.servicegroup.throughput.bytes_per_sec"
    channel: "servicegroup.throughput.bytes_per_sec"
    display_name: "Service Group Throughput ({servicegroup})"
    unit: "Bytes/s"
    multi_instance_labels: ["servicegroup"]
    category: "services"
    description: "Data throughput of the service group"

  - name: "netscaler.servicegroup.connections.current"
    channel: "servicegroup.connections.current"
    display_name: "Service Group Current Connections ({servicegroup})"
    unit: "#"
    multi_instance_labels: ["servicegroup"]
    category: "services"
    description: "Number of active connections on the service group"

  - name: "netscaler.servicegroup.members.active"
    channel: "servicegroup.members.active"
    display_name: "Service Group Active Members ({servicegroup})"
    unit: "#"
    multi_instance_labels: ["servicegroup"]
    category: "services"
    description: "Number of healthy members serving traffic"

  # SSL Certificate Metrics
  - name: "netscaler.ssl.certificate.days_to_expiration"
    channel: "ssl.certificate.days_to_expiration"
    display_name: "SSL Certificate Days to Expiration ({certname})"
    unit: "days"
    multi_instance_labels: ["certname"]
    category: "ssl_certificates"
    description: "Days until SSL certificate expires (negative if expired)"

  - name: "netscaler.ssl.certificate.status"
    channel: "ssl.certificate.status"
    display_name: "SSL Certificate Status ({certname})"
    unit: "#"
    multi_instance_labels: ["certname"]
    lookup: "netscaler.ssl.certificate.status"
    category: "ssl_certificates"
    description: "Certificate status: 1=valid, 0=expired"

  # High Availability (HA) Metrics
  - name: "netscaler.ha.state"
    channel: "ha.state"
    display_name: "HA State ({ha_node_ip})"
    unit: "#"
    multi_instance_labels: ["ha_node_id", "ha_node_ip"]
    lookup: "netscaler.ha.state"
    category: "high_availability"
    description: "HA role: 2=PRIMARY, 1=SECONDARY, 0=UNKNOWN (per node)"

  - name: "netscaler.ha.node.state"
    channel: "ha.node.state"
    display_name: "HA Node Operational State ({ha_node_ip})"
    unit: "#"
    multi_instance_labels: ["ha_node_id", "ha_node_ip"]
    lookup: "netscaler.ha.node.state"
    category: "high_availability"
    description: "Node operational state: 1=UP, 0=DOWN (per node)"

  - name: "netscaler.ha.sync_status"
    channel: "ha.sync_status"
    display_name: "HA Sync Status ({ha_node_ip})"
    unit: "#"
    multi_instance_labels: ["ha_node_id", "ha_node_ip"]
    lookup: "netscaler.ha.sync_status"
    category: "high_availability"
    description: "HA sync status: 1=success, 0=failed (per node)"

  - name: "netscaler.ha.sync_failures"
    channel: "ha.sync_failures"
    display_name: "HA Sync Failures ({ha_node_ip})"
    unit: "#"
    multi_instance_labels: ["ha_node_id", "ha_node_ip"]
    category: "high_availability"
    description: "Number of HA synchronization failures (per node)"

  - name: "netscaler.ha.propagation_timeouts"
    channel: "ha.propagation_timeouts"
    display_name: "HA Propagation Timeouts"
    unit: "#"
    category: "high_availability"
    description: "Number of times configuration propagation timed out"

  - name: "netscaler.ha.heartbeat.rx.packets"
    channel: "ha.heartbeat.rx.packets"
    display_name: "HA Heartbeat RX Packets"
    unit: "#"
    category: "high_availability"
    description: "Total heartbeat packets received from peer node"

  - name: "netscaler.ha.heartbeat.rx.rate"
    channel: "ha.heartbeat.rx.rate"
    display_name: "HA Heartbeat RX Rate"
    unit: "Custom"
    custom_unit: "pkts/s"
    category: "high_availability"
    description: "Heartbeat packets receive rate (packets/sec)"

  - name: "netscaler.ha.heartbeat.tx.packets"
    channel: "ha.heartbeat.tx.packets"
    display_name: "HA Heartbeat TX Packets"
    unit: "#"
    category: "high_availability"
    description: "Total heartbeat packets transmitted to peer node"

  - name: "netscaler.ha.heartbeat.tx.rate"
    channel: "ha.heartbeat.tx.rate"
    display_name: "HA Heartbeat TX Rate"
    unit: "Custom"
    custom_unit: "pkts/s"
    category: "high_availability"
    description: "Heartbeat packets transmit rate (packets/sec)"

  # Disk Usage Metrics
  - name: "netscaler.disk.percent_used"
    channel: "disk.percent_used"
    display_name: "Disk Usage ({partition})"
    unit: "%"
    multi_instance_labels: ["partition"]
    category: "disk"
    description: "Disk partition usage percentage"

  - name: "netscaler.disk.used_kb"
    channel: "disk.used_kb"
    display_name: "Disk Used ({partition})"
    unit: "KB"
    multi_instance_labels: ["partition"]
    category: "disk"
    description: "Disk space used in kilobytes"

  - name: "netscaler.disk.available_kb"
    channel: "disk.available_kb"
    display_name: "Disk Available ({partition})"
    unit: "KB"
    multi_instance_labels: ["partition"]
    category: "disk"
    description: "Disk space available in kilobytes"

  # Phase 2: Advanced Load Balancer Metrics
  - name: "netscaler.lbvserver.spillovers.total"
    channel: "lbvserver.spillovers.total"
    display_name: "VServer Spillovers Total ({vserver})"
    unit: "#"
    multi_instance_labels: ["vserver"]
    category: "load_balancing"
    description: "Total spillovers to backup vServer (saturation indicator)"

  - name: "netscaler.lbvserver.connections.established"
    channel: "lbvserver.connections.established"
    display_name: "VServer Established Connections ({vserver})"
    unit: "#"
    multi_instance_labels: ["vserver"]
    category: "load_balancing"
    description: "Established connections for capacity planning"

  - name: "netscaler.lbvserver.hits.total"
    channel: "lbvserver.hits.total"
    display_name: "VServer Total Hits ({vserver})"
    unit: "#"
    multi_instance_labels: ["vserver"]
    category: "load_balancing"
    description: "Total hits for request distribution analysis"

  # Phase 2: Advanced Service Metrics
  - name: "netscaler.service.surge_queue_length"
    channel: "service.surge_queue_length"
    display_name: "Service Surge Queue Length ({service})"
    unit: "#"
    multi_instance_labels: ["service"]
    category: "services"
    description: "Surge queue length (backend saturation indicator)"

  # Phase 2: Advanced Service Group Metrics
  - name: "netscaler.servicegroup.members.inactive"
    channel: "servicegroup.members.inactive"
    display_name: "Service Group Inactive Members ({servicegroup})"
    unit: "#"
    multi_instance_labels: ["servicegroup"]
    category: "services"
    description: "Number of inactive members in service group"

  - name: "netscaler.servicegroup.surge_queue_length"
    channel: "servicegroup.surge_queue_length"
    display_name: "Service Group Surge Queue Length ({servicegroup})"
    unit: "#"
    multi_instance_labels: ["servicegroup"]
    category: "services"
    description: "Surge queue length (backend saturation indicator)"

  # Phase 2: Packets Per Second Metrics
  - name: "netscaler.system.network.rx.packets_per_sec"
    channel: "system.network.rx.packets_per_sec"
    display_name: "System RX Packets Per Second"
    unit: "pps"
    category: "system"
    description: "Receive packets per second"

  - name: "netscaler.system.network.tx.packets_per_sec"
    channel: "system.network.tx.packets_per_sec"
    display_name: "System TX Packets Per Second"
    unit: "pps"
    category: "system"
    description: "Transmit packets per second"

  - name: "netscaler.system.network.rx.packets.total"
    channel: "system.network.rx.packets.total"
    display_name: "System RX Packets Total"
    unit: "#"
    category: "system"
    description: "Total packets received (counter)"

  - name: "netscaler.system.network.tx.packets.total"
    channel: "system.network.tx.packets.total"
    display_name: "System TX Packets Total"
    unit: "#"
    category: "system"
    description: "Total packets sent (counter)"

  # Phase 2: Network Interface Metrics
  - name: "netscaler.interface.state"
    lookup: "netscaler.interface.state"
    channel: "interface.state"
    display_name: "Interface State ({interface})"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "network"
    description: "Interface state: 1=UP, 0=DOWN"

  - name: "netscaler.interface.rx.bytes.total"
    channel: "interface.rx.bytes.total"
    display_name: "Interface RX Bytes Total ({interface})"
    unit: "bytes"
    multi_instance_labels: ["interface"]
    category: "network"
    description: "Total bytes received on the interface"

  - name: "netscaler.interface.tx.bytes.total"
    channel: "interface.tx.bytes.total"
    display_name: "Interface TX Bytes Total ({interface})"
    unit: "bytes"
    multi_instance_labels: ["interface"]
    category: "network"
    description: "Total bytes transmitted on the interface"

  - name: "netscaler.interface.rx.mbits_per_sec"
    channel: "interface.rx.mbits_per_sec"
    display_name: "Interface RX Rate ({interface})"
    unit: "Mbits/s"
    multi_instance_labels: ["interface"]
    category: "network"
    description: "Receive throughput rate of the interface"

  - name: "netscaler.interface.tx.mbits_per_sec"
    channel: "interface.tx.mbits_per_sec"
    display_name: "Interface TX Rate ({interface})"
    unit: "Mbits/s"
    multi_instance_labels: ["interface"]
    category: "network"
    description: "Transmit throughput rate of the interface"

  - name: "netscaler.interface.rx.errors.total"
    channel: "interface.rx.errors.total"
    display_name: "Interface RX Errors ({interface})"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "network"
    description: "Total receive errors on the interface"

  - name: "netscaler.interface.tx.errors.total"
    channel: "interface.tx.errors.total"
    display_name: "Interface TX Errors ({interface})"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "network"
    description: "Total transmit errors on the interface"

  - name: "netscaler.interface.rx.drops.total"
    channel: "interface.rx.drops.total"
    display_name: "Interface RX Drops ({interface})"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "network"
    description: "Total inbound packets dropped on the interface"

  - name: "netscaler.interface.tx.drops.total"
    channel: "interface.tx.drops.total"
    display_name: "Interface TX Drops ({interface})"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "network"
    description: "Total outbound packets dropped on the interface"

  - name: "netscaler.interface.link_speed_mbps"
    channel: "interface.link_speed_mbps"
    display_name: "Interface Link Speed ({interface})"
    unit: "Mbps"
    multi_instance_labels: ["interface"]
    category: "network"
    description: "Negotiated link speed of the interface"

  # Phase 3: Content Switching Metrics
  - name: "netscaler.cs.vserver.state"
    lookup: "netscaler.csvserver.state"
    channel: "cs.vserver.state"
    display_name: "CS VServer State ({csvserver})"
    unit: "#"
    multi_instance_labels: ["csvserver"]
    category: "content_switching"
    description: "Content Switching vServer state: UP=7, DOWN=1, etc."

  - name: "netscaler.cs.vserver.hits.total"
    channel: "cs.vserver.hits.total"
    display_name: "CS VServer Hits Total ({csvserver})"
    unit: "#"
    multi_instance_labels: ["csvserver"]
    category: "content_switching"
    description: "Total hits on the content switching virtual server"

  - name: "netscaler.cs.vserver.requests.rate"
    channel: "cs.vserver.requests.rate"
    display_name: "CS VServer Requests Rate ({csvserver})"
    unit: "req/s"
    multi_instance_labels: ["csvserver"]
    category: "content_switching"
    description: "Rate of requests handled by the CS virtual server"

  - name: "netscaler.cs.vserver.connections.current"
    channel: "cs.vserver.connections.current"
    display_name: "CS VServer Current Connections ({csvserver})"
    unit: "#"
    multi_instance_labels: ["csvserver"]
    category: "content_switching"
    description: "Number of active connections on the CS virtual server"

  - name: "netscaler.cs.policy.hits.total"
    channel: "cs.policy.hits.total"
    display_name: "CS Policy Hits Total ({cspolicy})"
    unit: "#"
    multi_instance_labels: ["cspolicy"]
    category: "content_switching"
    description: "Total times the content switching policy was matched"

  - name: "netscaler.cs.policy.undefine_hits.total"
    channel: "cs.policy.undefine_hits.total"
    display_name: "CS Policy Undefine Hits ({cspolicy})"
    unit: "#"
    multi_instance_labels: ["cspolicy"]
    category: "content_switching"
    description: "Rules not matched"

  # Phase 3: GSLB Metrics
  - name: "netscaler.gslb.vserver.state"
    lookup: "netscaler.gslbvserver.state"
    channel: "gslb.vserver.state"
    display_name: "GSLB VServer State ({gslbvserver})"
    unit: "#"
    multi_instance_labels: ["gslbvserver"]
    category: "gslb"
    description: "GSLB vServer state: UP=7, DOWN=1, etc."

  - name: "netscaler.gslb.vserver.hits.total"
    channel: "gslb.vserver.hits.total"
    display_name: "GSLB VServer Hits Total ({gslbvserver})"
    unit: "#"
    multi_instance_labels: ["gslbvserver"]
    category: "gslb"
    description: "Total DNS requests resolved by the GSLB virtual server"

  - name: "netscaler.gslb.vserver.requests.rate"
    channel: "gslb.vserver.requests.rate"
    display_name: "GSLB VServer Requests Rate ({gslbvserver})"
    unit: "req/s"
    multi_instance_labels: ["gslbvserver"]
    category: "gslb"
    description: "Rate of DNS requests handled by the GSLB virtual server"

  - name: "netscaler.gslb.vserver.persistence.records"
    channel: "gslb.vserver.persistence.records"
    display_name: "GSLB VServer Persistence Records ({gslbvserver})"
    unit: "#"
    multi_instance_labels: ["gslbvserver"]
    category: "gslb"
    description: "Number of active persistence records for site affinity"

  - name: "netscaler.gslb.site.state"
    channel: "gslb.site.state"
    display_name: "GSLB Site State ({gslbsite})"
    unit: "#"
    multi_instance_labels: ["gslbsite"]
    category: "gslb"
    description: "GSLB site state: 1=UP/ACTIVE, 0=DOWN"

  - name: "netscaler.gslb.site.network_rtt_microseconds"
    channel: "gslb.site.network_rtt_microseconds"
    display_name: "GSLB Site Network RTT ({gslbsite})"
    unit: "μs"
    multi_instance_labels: ["gslbsite"]
    category: "gslb"
    description: "Network round-trip time in microseconds"

  - name: "netscaler.gslb.site.connections.current"
    channel: "gslb.site.connections.current"
    display_name: "GSLB Site Current Connections ({gslbsite})"
    unit: "#"
    multi_instance_labels: ["gslbsite"]
    category: "gslb"
    description: "Number of active connections at the GSLB site"

  - name: "netscaler.gslb.service.state"
    channel: "gslb.service.state"
    display_name: "GSLB Service State ({gslbservice})"
    unit: "#"
    multi_instance_labels: ["gslbservice"]
    category: "gslb"
    description: "GSLB service state: 1=UP, 0=DOWN"

  - name: "netscaler.gslb.service.hits.total"
    channel: "gslb.service.hits.total"
    display_name: "GSLB Service Hits Total ({gslbservice})"
    unit: "#"
    multi_instance_labels: ["gslbservice"]
    category: "gslb"
    description: "Total requests directed to the GSLB service"

  - name: "netscaler.gslb.service.connections.current"
    channel: "gslb.service.connections.current"
    display_name: "GSLB Service Current Connections ({gslbservice})"
    unit: "#"
    multi_instance_labels: ["gslbservice"]
    category: "gslb"
    description: "Number of active connections on the GSLB service"

  # Phase 3: Cache Metrics
  - name: "netscaler.cache.hit_ratio_percent"
    channel: "cache.hit_ratio_percent"
    display_name: "Cache Hit Ratio"
    unit: "%"
    category: "cache"
    description: "Cache hit ratio percentage"

  - name: "netscaler.cache.objects.count"
    channel: "cache.objects.count"
    display_name: "Cache Objects Count"
    unit: "#"
    category: "cache"
    description: "Number of objects in cache"

  - name: "netscaler.cache.memory.used_kb"
    channel: "cache.memory.used_kb"
    display_name: "Cache Memory Used"
    unit: "KB"
    category: "cache"
    description: "Cache memory used in kilobytes"

  - name: "netscaler.cache.hits.total"
    channel: "cache.hits.total"
    display_name: "Cache Hits Total"
    unit: "#"
    category: "cache"
    description: "Total number of cache hits"

  - name: "netscaler.cache.misses.total"
    channel: "cache.misses.total"
    display_name: "Cache Misses Total"
    unit: "#"
    category: "cache"
    description: "Total number of cache misses"

  # Phase 3: Compression Metrics
  - name: "netscaler.compression.ratio"
    channel: "compression.ratio"
    display_name: "Compression Ratio"
    unit: "#"
    category: "compression"
    description: "Compression ratio"

  - name: "netscaler.compression.bytes.compressed.total"
    channel: "compression.bytes.compressed.total"
    display_name: "Compressed Bytes Total"
    unit: "bytes"
    category: "compression"
