probe_name: "mysql"
friendly_name: "MySQL / MariaDB"
version: "1.0.0"

# OTel-first source of truth.
# system.db.* is a SenHub semantic-conventions extension (no
# stable OTel semconv exists for relational databases yet); for
# the family of stat-statements / bloat metrics we use the
# senhub.db.postgres.* / senhub.db.mysql.* namespace.

metrics:
  # ═════════════════════════════════════════════════════════════════════════
  # OVERVIEW
  # ═════════════════════════════════════════════════════════════════════════
  - name: "db_up"
    channel: "db_up"
    display_name: "Database Up"
    unit: "#"
    category: "overview"
    description: "1 if the agent's most recent ping reached the server"
    lookup: "senhub.db.up"
    otel:
      name: system.db.up
      unit: "1"
      type: updowncounter

  - name: "db_uptime_seconds"
    channel: "db_uptime"
    display_name: "Uptime"
    unit: "s"
    category: "overview"
    description: "Seconds since the engine started"
    otel:
      name: system.db.uptime.seconds
      unit: "s"
      type: gauge

  - name: "db_version_info"
    channel: "db_version"
    display_name: "Version"
    unit: "#"
    category: "overview"
    description: "Always 1; engine version carried as label"
    otel:
      name: system.db.version.info
      unit: "1"
      type: gauge
    tag_to_attribute:
      version: senhub.db.version

  - name: "db_connections_utilization"
    channel: "db_connections_utilization"
    display_name: "Connections Used %"
    unit: "%"
    category: "overview"
    description: "active + idle / max — primary saturation alarm"
    otel:
      name: system.db.connections.utilization
      unit: "1"
      type: gauge

  - name: "db_replication_role"
    channel: "db_replication_role"
    display_name: "Replication Role"
    unit: "#"
    category: "overview"
    description: "0=standalone, 1=primary, 2=replica"
    lookup: "senhub.db.replication.role"
    otel:
      name: system.db.replication.role
      unit: "1"
      type: updowncounter

  - name: "db_replication_health"
    channel: "db_replication_health"
    display_name: "Replication Health"
    unit: "#"
    category: "overview"
    description: "Composite: io_running AND sql_running AND lag<threshold. Standalone reports 1."
    lookup: "senhub.db.replication.health"
    otel:
      name: system.db.replication.health
      unit: "1"
      type: updowncounter

  # ═════════════════════════════════════════════════════════════════════════
  # CONNECTIONS
  # ═════════════════════════════════════════════════════════════════════════
  - name: "db_connections_active"
    channel: "db_connections_active"
    display_name: "Connections Active"
    unit: "#"
    category: "connections"
    description: "Sessions currently running a query"
    otel:
      name: system.db.connections.active
      unit: "{connection}"
      type: gauge

  - name: "db_connections_idle"
    channel: "db_connections_idle"
    display_name: "Connections Idle"
    unit: "#"
    category: "connections"
    description: "Sessions connected but doing nothing"
    otel:
      name: system.db.connections.idle
      unit: "{connection}"
      type: gauge

  - name: "db_connections_max"
    channel: "db_connections_max"
    display_name: "Connections Max"
    unit: "#"
    category: "connections"
    description: "Engine cap before refusals"
    otel:
      name: system.db.connections.max
      unit: "{connection}"
      type: gauge

  - name: "db_connections_aborted"
    channel: "db_connections_aborted"
    display_name: "Connections Aborted"
    unit: "#"
    category: "connections"
    description: "Auth failures + protocol errors (cumulative)"
    otel:
      name: system.db.connections.aborted
      unit: "{connection}"
      type: counter

  - name: "db_connections_refused"
    channel: "db_connections_refused"
    display_name: "Connections Refused"
    unit: "#"
    category: "connections"
    description: "Out-of-slots events — capacity alarm"
    otel:
      name: system.db.connections.refused
      unit: "{connection}"
      type: counter

  # ═════════════════════════════════════════════════════════════════════════
  # THROUGHPUT
  # ═════════════════════════════════════════════════════════════════════════
  - name: "db_queries_count"
    channel: "db_queries_count"
    display_name: "Queries"
    unit: "#"
    category: "throughput"
    description: "Total statements (rate = QPS)"
    otel:
      name: system.db.queries.count
      unit: "{query}"
      type: counter

  - name: "db_transactions_committed"
    channel: "db_transactions_committed"
    display_name: "Transactions Committed"
    unit: "#"
    category: "throughput"
    description: "Successful commits"
    otel:
      name: system.db.transactions.committed
      unit: "{txn}"
      type: counter

  - name: "db_transactions_rolled_back"
    channel: "db_transactions_rolled_back"
    display_name: "Transactions Rolled Back"
    unit: "#"
    category: "throughput"
    description: "Rollbacks — app errors or deadlocks"
    otel:
      name: system.db.transactions.rolled_back
      unit: "{txn}"
      type: counter

  - name: "db_mysql_slow_queries_count"
    channel: "db_slow_queries"
    display_name: "Slow Queries"
    unit: "#"
    category: "throughput"
    description: "Queries crossing long_query_time threshold"
    otel:
      name: senhub.db.mysql.slow_queries.count
      unit: "{query}"
      type: counter

  - name: "db_mysql_command_count"
    channel: "db_mysql_command_count_{command}"
    display_name: "Commands ({command})"
    unit: "#"
    category: "throughput"
    multi_instance_labels: ["command"]
    description: "Per-verb command count (select/insert/update/delete/replace)"
    otel:
      name: senhub.db.mysql.command.count
      unit: "{op}"
      type: counter
    tag_to_attribute:
      command: senhub.db.mysql.command

  - name: "db_mysql_tmp_tables_disk_ratio"
    channel: "db_tmp_tables_disk_ratio"
    display_name: "Tmp Tables to Disk %"
    unit: "%"
    category: "throughput"
    description: "Created_tmp_disk_tables / total — >25% = tuning needed"
    otel:
      name: senhub.db.mysql.tmp_tables.disk.ratio
      unit: "1"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # REPLICATION
  # ═════════════════════════════════════════════════════════════════════════
  - name: "db_replication_lag_seconds"
    channel: "db_replication_lag"
    display_name: "Replication Lag"
    unit: "s"
    category: "replication"
    description: "Seconds_Behind_Source / Master (replica side)"
    otel:
      name: system.db.replication.lag.seconds
      unit: "s"
      type: gauge

  - name: "db_replication_io_running"
    channel: "db_replication_io_running"
    display_name: "Replication IO Thread"
    unit: "#"
    category: "replication"
    description: "1 = IO thread Yes; 0 = stopped"
    otel:
      name: system.db.replication.io_running
      unit: "1"
      type: updowncounter

  - name: "db_replication_sql_running"
    channel: "db_replication_sql_running"
    display_name: "Replication SQL Thread"
    unit: "#"
    category: "replication"
    description: "1 = SQL thread Yes; 0 = stopped"
    otel:
      name: system.db.replication.sql_running
      unit: "1"
      type: updowncounter

  - name: "db_replication_replicas_connected"
    channel: "db_replication_replicas"
    display_name: "Replicas Connected"
    unit: "#"
    category: "replication"
    description: "Downstream replicas attached (primary side)"
    otel:
      name: system.db.replication.replicas.connected
      unit: "{replica}"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # CACHE
  # ═════════════════════════════════════════════════════════════════════════
  - name: "db_buffer_hit_ratio"
    channel: "db_buffer_hit_ratio"
    display_name: "Buffer Hit Ratio"
    unit: "%"
    category: "cache"
    description: "InnoDB buffer pool hit ratio — <99% = under-provisioned RAM"
    otel:
      name: system.db.buffer.hit_ratio
      unit: "1"
      type: gauge

  - name: "db_buffer_utilization"
    channel: "db_buffer_utilization"
    display_name: "Buffer Utilization"
    unit: "%"
    category: "cache"
    description: "InnoDB buffer pool pages_data / pages_total"
    otel:
      name: system.db.buffer.utilization
      unit: "1"
      type: gauge

  - name: "db_buffer_dirty_pages"
    channel: "db_buffer_dirty_pages"
    display_name: "Buffer Dirty Pages"
    unit: "#"
    category: "cache"
    description: "Pressure on the checkpointer"
    otel:
      name: system.db.buffer.dirty.pages
      unit: "{page}"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # LOCKS
  # ═════════════════════════════════════════════════════════════════════════
  - name: "db_locks_deadlocks"
    channel: "db_locks_deadlocks"
    display_name: "Deadlocks"
    unit: "#"
    category: "locks"
    description: "App-level deadlock count — should be near zero"
    otel:
      name: system.db.locks.deadlocks
      unit: "{event}"
      type: counter

  - name: "db_locks_waiting"
    channel: "db_locks_waiting"
    display_name: "Locks Waiting"
    unit: "#"
    category: "locks"
    description: "Sessions currently blocked"
    otel:
      name: system.db.locks.waiting
      unit: "{lock}"
      type: gauge

  - name: "db_locks_row_lock_time_avg_ms"
    channel: "db_row_lock_time"
    display_name: "Row Lock Time Avg"
    unit: "ms"
    category: "locks"
    description: "Innodb_row_lock_time_avg — contention proxy"
    otel:
      name: system.db.locks.row_lock_time.avg_ms
      unit: "ms"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # IO
  # ═════════════════════════════════════════════════════════════════════════
  - name: "db_io_read_bytes"
    channel: "db_io_read"
    display_name: "IO Read"
    unit: "Bytes"
    category: "io"
    description: "InnoDB engine-side bytes read"
    otel:
      name: system.db.io.read.bytes
      unit: "By"
      type: counter

  - name: "db_io_write_bytes"
    channel: "db_io_write"
    display_name: "IO Write"
    unit: "Bytes"
    category: "io"
    description: "InnoDB engine-side bytes written"
    otel:
      name: system.db.io.write.bytes
      unit: "By"
      type: counter

  # ═════════════════════════════════════════════════════════════════════════
  # STORAGE
  # ═════════════════════════════════════════════════════════════════════════
  - name: "db_size_bytes"
    channel: "db_size"
    display_name: "Database Size"
    unit: "Bytes"
    category: "storage"
    description: "Sum of data_length+index_length across non-system schemas"
    otel:
      name: system.db.size.bytes
      unit: "By"
      type: gauge

  - name: "db_tables_count"
    channel: "db_tables_count"
    display_name: "Tables Count"
    unit: "#"
    category: "storage"
    description: "User tables across non-system schemas"
    otel:
      name: system.db.tables.count
      unit: "{table}"
      type: gauge

tag_metadata:
  metric_type:
    type: category
    label: "Metric Category"
    value_labels:
      overview: "Overview"
      connections: "Connections"
      throughput: "Throughput"
      replication: "Replication"
      cache: "Buffer / Cache"
      locks: "Locks"
      io: "IO"
      storage: "Storage"
  engine:
    type: resource
    label: "Engine"
  instance:
    type: resource
    label: "Instance"
  environment:
    type: resource
    label: "Environment"
  role:
    type: resource
    label: "Replication Role"
    linked_categories: ["overview", "replication"]
  command:
    type: resource
    label: "MySQL Command"
    linked_categories: ["throughput"]
  version:
    type: resource
    label: "Version"
    linked_categories: ["overview"]
