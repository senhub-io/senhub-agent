version: "2.0.0"
description: "Optimized Nagios checks configuration - utilizes all available metrics"

checks:
  # System Health - Overall system monitoring with key metrics
  - name: "system_health"
    description: "Overall system health check"
    metrics:
      - channel: "cpu_usage_total"
        aggregation: "average"
        warning: "80"
        critical: "90"
        unit: "%"
        description: "Average CPU usage across all cores"
      - channel: "memory_used_percent"
        aggregation: "max"
        warning: "85"
        critical: "95"
        unit: "%"
        description: "Memory usage percentage"
      - channel: "cpu_load1"
        warning: "4"
        critical: "8"
        unit: "c"
        description: "1-minute load average"

  # CPU Detailed Monitoring - All CPU metrics
  - name: "cpu_detailed"
    description: "Comprehensive CPU monitoring"
    probe_filter: "cpu"
    metrics:
      - channel: "cpu_usage_total"
        warning: "80"
        critical: "90"
        unit: "%"
      - channel: "cpu_system"
        warning: "30"
        critical: "50"
        unit: "%"
        description: "CPU time spent in system mode"
      - channel: "cpu_user"
        warning: "70"
        critical: "85"
        unit: "%"
        description: "CPU time spent in user mode"
      - channel: "cpu_iowait"
        warning: "20"
        critical: "40"
        unit: "%"
        description: "CPU time waiting for I/O"
      - channel: "cpu_load1"
        warning: "4"
        critical: "8"
        unit: "c"
      - channel: "cpu_load5"
        warning: "3"
        critical: "6"
        unit: "c"
      - channel: "cpu_load15"
        warning: "2"
        critical: "4"
        unit: "c"

  # CPU Cores Individual - All 8 cores on this Mac
  - name: "cpu_cores"
    description: "Monitor each CPU core individually"
    probe_filter: "cpu"
    tag_filters:
      - key: "core"
        values: ["0", "1", "2", "3", "4", "5", "6", "7"]
        operator: "in"
    metrics:
      - channel: "cpu_core_usage"
        aggregation: "none"
        warning: "80"
        critical: "90"
        unit: "%"
        tag_context: "core"
        tag_specific_thresholds:
          - tags: {"core": "0"}
            warning: "70"
            critical: "85"

  # Memory Comprehensive
  - name: "memory_detailed"
    description: "Detailed memory usage monitoring"
    probe_filter: "memory"
    metrics:
      - channel: "memory_used_percent"
        warning: "85"
        critical: "95"
        unit: "%"
      - channel: "memory_available"
        warning: "1000000000"
        critical: "500000000"
        unit: "Bytes"
        invert: true
      - channel: "memory_free"
        warning: "500000000"
        critical: "250000000"
        unit: "Bytes"
        invert: true
      - channel: "swap_used_percent"
        warning: "50"
        critical: "80"
        unit: "%"
      - channel: "memory_cached"
        warning: "0"
        critical: "0"
        unit: "Bytes"
        description: "Cached memory"

  # Network Interfaces - Real macOS interfaces
  - name: "network_detailed"
    description: "Network interfaces monitoring with real interface names"
    probe_filter: "network"
    tag_filters:
      - key: "interface"
        values: ["utun4", "en3"]
        operator: "in"
    metrics:
      - channel: "bytes_sent"
        aggregation: "sum"
        warning: "100000000"
        critical: "500000000"
        unit: "Bytes"
        tag_context: "interface"
      - channel: "bytes_received"
        aggregation: "sum"
        warning: "100000000"
        critical: "500000000"
        unit: "Bytes"
        tag_context: "interface"
      - channel: "packets_sent"
        aggregation: "sum"
        warning: "1000000"
        critical: "5000000"
        unit: "#"
        tag_context: "interface"
      - channel: "packets_received"
        aggregation: "sum"
        warning: "1000000"
        critical: "5000000"
        unit: "#"
        tag_context: "interface"
      - channel: "errors_sent"
        aggregation: "sum"
        warning: "100"
        critical: "1000"
        unit: "#"
        tag_context: "interface"
      - channel: "errors_received"
        aggregation: "sum"
        warning: "100"
        critical: "1000"
        unit: "#"
        tag_context: "interface"

  # Network Health Summary - Aggregated view
  - name: "network_health"
    description: "Network health summary"
    probe_filter: "network"
    metrics:
      - channel: "bytes_sent"
        aggregation: "sum"
        warning: "1000000000"
        critical: "2000000000"
        unit: "Bytes"
      - channel: "bytes_received"
        aggregation: "sum"
        warning: "1000000000"
        critical: "2000000000"
        unit: "Bytes"
      - channel: "errors_sent"
        aggregation: "sum"
        warning: "10"
        critical: "100"
        unit: "#"
      - channel: "errors_received"
        aggregation: "sum"
        warning: "10"
        critical: "100"
        unit: "#"

  # Gateway Connectivity
  - name: "gateway"
    description: "Network gateway connectivity"
    probe_filter: "ping_gateway"
    metrics:
      - channel: "averageLatency"
        warning: "100"
        critical: "500"
        unit: "ms"
      - channel: "packetLoss"
        warning: "5"
        critical: "10"
        unit: "%"

  # Web Application Health
  - name: "webapp"
    description: "Web application health monitoring"
    probe_filter: "ping_webapp"
    metrics:
      - channel: "averageLatency"
        aggregation: "average"
        warning: "2000"
        critical: "5000"
        unit: "ms"
        tag_context: "url"
      - channel: "packetLoss"
        warning: "1"
        critical: "5"
        unit: "%"
        description: "Packet loss percentage"

  # Load WebApp Monitoring (real metrics from cache)
  - name: "webapp_load"
    description: "Web application performance monitoring"
    probe_filter: "load_webapp"
    metrics:
      - channel: "total_time"
        warning: "5000"
        critical: "10000"
        unit: "ms"
        description: "Total request time"
      - channel: "ttfb"
        warning: "2000"
        critical: "5000"
        unit: "ms"
        description: "Time to first byte"
      - channel: "connecttime"
        warning: "1000"
        critical: "3000"
        unit: "ms"
        description: "Connection establishment time"
      - channel: "dnstime"
        warning: "500"
        critical: "2000"
        unit: "ms"
        description: "DNS resolution time"
      - channel: "tlstime"
        warning: "1000"
        critical: "3000"
        unit: "ms"
        description: "TLS handshake time"