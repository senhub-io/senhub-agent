probe_name: "cpu"
friendly_name: "CPU Metrics"
version: "3.0.0"
host_level: true

# Format v3 — OTel-first source of truth:
#   otel:              semantic convention (source of truth)
#   tag_to_attribute:  mapping of cache tag names → OTel attribute names
# Retro-compat fields (channel, display_name, category, multi_instance_labels, description) unchanged.

metrics:
  # ─────────────────────────────────────────────────────────────────────────
  # CPU time cumulative (Linux/Unix — /proc/stat counters)
  # OTel: system.cpu.time (counter, seconds) with cpu.mode attribute
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cpu_user"
    channel: "cpu_user_time"
    display_name: "CPU User"
    unit: "s"
    category: "time_breakdown"
    description: "Time spent running user-space processes"
    otel:
      name: system.cpu.time
      unit: s
      type: counter
      attributes:
        cpu.mode: user

  - name: "cpu_system"
    channel: "cpu_system_time"
    display_name: "CPU System"
    unit: "s"
    category: "time_breakdown"
    description: "Time spent running kernel-space operations"
    otel:
      name: system.cpu.time
      unit: s
      type: counter
      attributes:
        cpu.mode: system

  - name: "cpu_idle"
    channel: "cpu_idle_time"
    display_name: "CPU Idle"
    unit: "s"
    category: "time_breakdown"
    description: "Time spent idle with no pending work"
    otel:
      name: system.cpu.time
      unit: s
      type: counter
      attributes:
        cpu.mode: idle

  - name: "cpu_nice"
    channel: "cpu_nice_time"
    display_name: "CPU Nice"
    unit: "s"
    category: "time_breakdown"
    description: "Time spent running low-priority user-space processes"
    otel:
      name: system.cpu.time
      unit: s
      type: counter
      attributes:
        cpu.mode: nice

  - name: "cpu_iowait"
    channel: "cpu_iowait_time"
    display_name: "CPU IO Wait"
    unit: "s"
    category: "time_breakdown"
    description: "Time spent waiting for I/O operations to complete"
    otel:
      name: system.cpu.time
      unit: s
      type: counter
      attributes:
        cpu.mode: iowait

  - name: "cpu_irq"
    channel: "cpu_irq_time"
    display_name: "CPU Irq"
    unit: "s"
    category: "time_breakdown"
    description: "Time spent handling hardware interrupts"
    otel:
      name: system.cpu.time
      unit: s
      type: counter
      attributes:
        cpu.mode: interrupt

  - name: "cpu_softirq"
    channel: "cpu_softirq_time"
    display_name: "CPU Softirq"
    unit: "s"
    category: "time_breakdown"
    description: "Time spent handling software interrupts"
    otel:
      name: system.cpu.time
      unit: s
      type: counter
      attributes:
        cpu.mode: softirq

  - name: "cpu_steal"
    channel: "cpu_steal_time"
    display_name: "CPU Steal"
    unit: "s"
    category: "time_breakdown"
    description: "Time stolen by the hypervisor for other virtual machines"
    otel:
      name: system.cpu.time
      unit: s
      type: counter
      attributes:
        cpu.mode: steal

  # ─────────────────────────────────────────────────────────────────────────
  # CPU utilization (cross-platform — instantaneous %)
  # OTel: system.cpu.utilization (gauge, ratio) — mapper converts % → 0-1
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cpu_usage_total"
    channel: "cpu_usage_total"
    display_name: "CPU Total Usage"
    unit: "%"
    category: "usage"
    description: "Overall CPU utilization across all cores"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge

  # Per-core CPU Usage (cross-platform)
  - name: "cpu_core_usage"
    channel: "cpu_core_usage"
    display_name: "CPU Core {core} Usage"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["core"]
    description: "CPU usage percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
    tag_to_attribute:
      core: cpu.logical_number

  - name: "cpu_core_user"
    channel: "cpu_core_user"
    display_name: "CPU Core {core} User"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["core"]
    description: "CPU user time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: user
    tag_to_attribute:
      core: cpu.logical_number

  - name: "cpu_core_system"
    channel: "cpu_core_system"
    display_name: "CPU Core {core} System"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["core"]
    description: "CPU system time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: system
    tag_to_attribute:
      core: cpu.logical_number

  - name: "cpu_core_irq"
    channel: "cpu_core_irq"
    display_name: "CPU Core {core} IRQ"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["core"]
    description: "CPU interrupt time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: interrupt
    tag_to_attribute:
      core: cpu.logical_number

  - name: "cpu_core_softirq"
    channel: "cpu_core_softirq"
    display_name: "CPU Core {core} SoftIRQ"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["core"]
    description: "CPU soft interrupt time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: softirq
    tag_to_attribute:
      core: cpu.logical_number

  # ─────────────────────────────────────────────────────────────────────────
  # Windows-specific per-core CPU metrics (Perfmon)
  # Mapped to OTel system.cpu.utilization with cpu.mode attribute
  # Windows "privileged" harmonized to OTel "system" (see semantic-conventions §4.1)
  # ─────────────────────────────────────────────────────────────────────────
  - name: "processor_time"
    channel: "processor_time"
    display_name: "CPU {instance} Usage"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["instance", "core"]
    description: "CPU processor time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
    tag_to_attribute:
      core: cpu.logical_number
      instance: senhub.cpu.perfmon_instance

  - name: "user_time"
    channel: "cpu_user_time_percent"
    display_name: "CPU {instance} User Time"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["instance", "core"]
    description: "CPU user time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: user
    tag_to_attribute:
      core: cpu.logical_number
      instance: senhub.cpu.perfmon_instance

  - name: "privileged_time"
    channel: "cpu_privileged_time"
    display_name: "CPU {instance} Privileged Time"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["instance", "core"]
    description: "CPU privileged (kernel) time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: system          # harmonized from Windows "privileged"
    tag_to_attribute:
      core: cpu.logical_number
      instance: senhub.cpu.perfmon_instance

  - name: "interrupt_time"
    channel: "cpu_interrupt_time"
    display_name: "CPU {instance} Interrupt Time"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["instance", "core"]
    description: "CPU interrupt time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: interrupt
    tag_to_attribute:
      core: cpu.logical_number
      instance: senhub.cpu.perfmon_instance

  - name: "dpc_time"
    channel: "cpu_dpc_time"
    display_name: "CPU {instance} DPC Time"
    unit: "%"
    category: "per_core"
    multi_instance_labels: ["instance", "core"]
    description: "CPU Deferred Procedure Call time percentage per core"
    otel:
      name: system.cpu.utilization
      unit: "1"
      type: gauge
      attributes:
        cpu.mode: dpc             # extension — aligned with windows_exporter mode values
    tag_to_attribute:
      core: cpu.logical_number
      instance: senhub.cpu.perfmon_instance

  # ─────────────────────────────────────────────────────────────────────────
  # Windows system-wide DPC/IRQ rates and queue length
  # Extensions senhub.system.cpu.* — see semantic-conventions §4.1.3
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cpu_dpc_rate"
    channel: "cpu_dpc_rate"
    display_name: "CPU DPC Rate"
    unit: "#"
    category: "system_counters"
    description: "Deferred Procedure Calls per second"
    otel:
      name: senhub.system.cpu.dpcs_per_second
      unit: "1/s"
      type: gauge

  - name: "cpu_dpc_queued"
    channel: "cpu_dpc_queued"
    display_name: "CPU DPC Queued"
    unit: "/s"
    category: "system_counters"
    description: "DPCs queued per second"
    otel:
      name: senhub.system.cpu.dpcs_queued_per_second
      unit: "1/s"
      type: gauge

  - name: "cpu_interrupts"
    channel: "cpu_interrupts"
    display_name: "CPU Interrupts"
    unit: "/s"
    category: "system_counters"
    description: "CPU interrupts per second"
    otel:
      name: senhub.system.cpu.interrupts_per_second
      unit: "1/s"
      type: gauge

  - name: "cpu_queue_length"
    channel: "cpu_queue_length"
    display_name: "CPU Queue Length"
    unit: "#"
    category: "system_counters"
    description: "Number of threads waiting in the processor queue"
    otel:
      name: senhub.system.cpu.queue_length
      unit: "{thread}"
      type: gauge

  # Legacy per-core Windows counters (same semantic as above with core label)
  - name: "dpc_rate"
    channel: "cpu_dpc_rate"
    display_name: "CPU {instance} DPC Rate"
    unit: "#"
    category: "system_counters"
    multi_instance_labels: ["instance", "core"]
    description: "Deferred Procedure Calls per second per core"
    otel:
      name: senhub.system.cpu.dpcs_per_second
      unit: "1/s"
      type: gauge
    tag_to_attribute:
      core: cpu.logical_number
      instance: senhub.cpu.perfmon_instance

  - name: "dpc_queued"
    channel: "cpu_dpc_queued"
    display_name: "CPU {instance} DPC Queued"
    unit: "/s"
    category: "system_counters"
    multi_instance_labels: ["instance", "core"]
    description: "DPCs queued per second per core"
    otel:
      name: senhub.system.cpu.dpcs_queued_per_second
      unit: "1/s"
      type: gauge
    tag_to_attribute:
      core: cpu.logical_number
      instance: senhub.cpu.perfmon_instance

  - name: "interrupt_sec"
    channel: "cpu_interrupt_rate"
    display_name: "CPU {instance} Interrupt Rate"
    unit: "/s"
    category: "system_counters"
    multi_instance_labels: ["instance", "core"]
    description: "Interrupts per second per core"
    otel:
      name: senhub.system.cpu.interrupts_per_second
      unit: "1/s"
      type: gauge
    tag_to_attribute:
      core: cpu.logical_number
      instance: senhub.cpu.perfmon_instance

  - name: "processor_queue_length"
    channel: "cpu_queue_length"
    display_name: "Processor Queue Length"
    unit: "#"
    category: "system_counters"
    description: "Number of threads waiting in the processor queue"
    otel:
      name: senhub.system.cpu.queue_length
      unit: "{thread}"
      type: gauge

  # ─────────────────────────────────────────────────────────────────────────
  # Load Average (Linux/Unix) — OTEP 0119 OS-prefixed convention
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cpu_load1"
    channel: "cpu_load_1min"
    display_name: "CPU Load Average 1min"
    unit: "#"
    category: "load_average"
    description: "Average number of processes in the run queue over the last 1 minute"
    otel:
      name: system.linux.cpu.load_1m
      unit: "{thread}"
      type: gauge

  - name: "cpu_load5"
    channel: "cpu_load_5min"
    display_name: "CPU Load Average 5min"
    unit: "#"
    category: "load_average"
    description: "Average number of processes in the run queue over the last 5 minutes"
    otel:
      name: system.linux.cpu.load_5m
      unit: "{thread}"
      type: gauge

  - name: "cpu_load15"
    channel: "cpu_load_15min"
    display_name: "CPU Load Average 15min"
    unit: "#"
    category: "load_average"
    description: "Average number of processes in the run queue over the last 15 minutes"
    otel:
      name: system.linux.cpu.load_15m
      unit: "{thread}"
      type: gauge

  # ─────────────────────────────────────────────────────────────────────────
  # Process count — cross-OS gauge of all processes on the host.
  # Maps to OTel `system.processes.count` per OTel system semconv.
  # Used by the SenHub Linux/Windows host dashboards' "running
  # processes" panel.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "cpu_processes_total"
    channel: "processes_total"
    display_name: "Processes Total"
    unit: "#"
    category: "processes"
    description: "Total number of processes on the host."
    otel:
      name: system.processes.count
      unit: "{process}"
      type: gauge

tag_metadata:
  core:
    type: resource
    label: "CPU Core"
  instance:
    type: resource
    label: "CPU Instance"
  # System tags (injected by framework)
  host:
    type: resource
    label: "Host"
  os:
    type: resource
    label: "Operating System"
  platform:
    type: resource
    label: "Platform"
  probe_name:
    type: resource
    label: "Probe Name"
  probe_type:
    type: resource
    label: "Probe Type"
