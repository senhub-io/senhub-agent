probe_name: "postgresql"
friendly_name: "PostgreSQL"
version: "2.0.0"

# OTel-first transformer (format v3, lot 5 — databases).
#
# Source canonique : OTel Collector contrib postgresqlreceiver
# (https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/postgresqlreceiver).
# Quand le receiver contrib expose la métrique, on suit son nom et ses attributs
# tel quel (drop-in interop avec Grafana, New Relic, etc.). Quand il ne l'expose
# pas, extension sous `senhub.db.*` (cross-engine) ou `senhub.db.postgresql.*`
# (postgres-specific). Voir docs/developer-guide/otel/senhub-semantic-conventions.md §4.13.
#
# Notes d'asymétrie volontaire avec mysql :
# - Transactions : on suit `postgresql.commits` / `postgresql.rollbacks` (deux
#   métriques séparées, canon contrib) ; mysql utilise `senhub.db.mysql.transaction.count{state=…}`
#   parce que le contrib mysql n'a pas de métrique transaction.
# - Backends : `postgresql.backends{state=…}` au lieu de `mysql.threads{kind=…}`,
#   attribut nommé `state` (canon contrib) et non `kind`.

metrics:
  # ═════════════════════════════════════════════════════════════════════════
  # OVERVIEW
  # ═════════════════════════════════════════════════════════════════════════
  - name: "senhub.db.up"
    channel: "db_up"
    display_name: "Database Up"
    unit: "#"
    category: "overview"
    description: "1 if the agent's most recent ping reached the server, 0 otherwise"
    lookup: "senhub.db.up"
    otel:
      name: senhub.db.up
      unit: "1"
      type: gauge

  - name: "senhub.db.postgresql.uptime"
    channel: "pg_uptime"
    display_name: "Uptime"
    unit: "s"
    category: "overview"
    description: "Seconds since postmaster start (now() - pg_postmaster_start_time()). Contrib postgresqlreceiver n'expose pas l'uptime — extension."
    otel:
      name: senhub.db.postgresql.uptime
      unit: "s"
      type: gauge

  - name: "senhub.db.version.info"
    channel: "db_version"
    display_name: "Version"
    unit: "#"
    category: "overview"
    description: "Engine version banner — value=1, version string carried in attribute db.system.version"
    otel:
      name: senhub.db.version.info
      unit: "1"
      type: gauge
    tag_to_attribute:
      version: db.system.version

  # ═════════════════════════════════════════════════════════════════════════
  # CONNECTIONS — backends per state, max, utilization
  # ═════════════════════════════════════════════════════════════════════════
  - name: "postgresql.backends.active"
    channel: "pg_backends_active"
    display_name: "Backends Active"
    unit: "#"
    category: "connections"
    description: "Backends with state='active' (currently executing a query)"
    otel:
      name: postgresql.backends
      unit: "{backend}"
      type: gauge
      attributes:
        state: active

  - name: "postgresql.backends.idle"
    channel: "pg_backends_idle"
    display_name: "Backends Idle"
    unit: "#"
    category: "connections"
    description: "Backends with state='idle' (waiting for next command)"
    otel:
      name: postgresql.backends
      unit: "{backend}"
      type: gauge
      attributes:
        state: idle

  - name: "postgresql.backends.idle_in_transaction"
    channel: "pg_backends_idle_in_transaction"
    display_name: "Idle in Transaction"
    unit: "#"
    category: "connections"
    description: "Backends with state='idle in transaction' — long-running ones leak locks; alert if growing"
    otel:
      name: postgresql.backends
      unit: "{backend}"
      type: gauge
      attributes:
        state: idle_in_transaction

  - name: "postgresql.connection.max"
    channel: "pg_connection_max"
    display_name: "Connections Max"
    unit: "#"
    category: "connections"
    description: "max_connections GUC (instantaneous cap)"
    otel:
      name: postgresql.connection.max
      unit: "{connection}"
      type: gauge

  - name: "senhub.db.connection.utilization"
    channel: "db_connection_utilization"
    display_name: "Connections Used %"
    unit: "%"
    category: "connections"
    description: "(active + idle + idle_in_transaction) / max_connections, ratio"
    otel:
      name: senhub.db.connection.utilization
      unit: "1"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # THROUGHPUT — commits and rollbacks (contrib canon)
  # ═════════════════════════════════════════════════════════════════════════
  - name: "postgresql.commits"
    channel: "pg_commits"
    display_name: "Transactions Committed"
    unit: "#"
    category: "throughput"
    description: "Cumulative commits across all databases (pg_stat_database.xact_commit sum)"
    otel:
      name: postgresql.commits
      unit: "{transaction}"
      type: counter

  - name: "postgresql.rollbacks"
    channel: "pg_rollbacks"
    display_name: "Transactions Rolled Back"
    unit: "#"
    category: "throughput"
    description: "Cumulative rollbacks across all databases (pg_stat_database.xact_rollback sum)"
    otel:
      name: postgresql.rollbacks
      unit: "{transaction}"
      type: counter

  # NOTE: db_queries_count (somme commits+rollbacks) supprimée — redondante avec
  # postgresql.commits + postgresql.rollbacks. Les dashboards additionnent via PromQL si besoin.

  # ═════════════════════════════════════════════════════════════════════════
  # CACHE — hit ratio
  # ═════════════════════════════════════════════════════════════════════════
  - name: "senhub.db.postgresql.buffer.hit_ratio"
    channel: "pg_buffer_hit_ratio"
    display_name: "Buffer Hit Ratio"
    unit: "%"
    category: "cache"
    description: "blks_hit / (blks_hit + blks_read) over pg_stat_database. Dashboards 'santé' veulent le ratio dérivé — contrib n'expose que les compteurs bruts."
    otel:
      name: senhub.db.postgresql.buffer.hit_ratio
      unit: "1"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # LOCKS — deadlocks (contrib), waiting + long_running_xact (extensions)
  # ═════════════════════════════════════════════════════════════════════════
  - name: "postgresql.deadlocks"
    channel: "pg_deadlocks"
    display_name: "Deadlocks"
    unit: "#"
    category: "locks"
    description: "Cumulative deadlocks detected (pg_stat_database.deadlocks)"
    otel:
      name: postgresql.deadlocks
      unit: "{deadlock}"
      type: counter

  - name: "senhub.db.postgresql.lock.waiting"
    channel: "pg_lock_waiting"
    display_name: "Locks Waiting"
    unit: "#"
    category: "locks"
    description: "Instantaneous count of granted=false rows in pg_locks"
    otel:
      name: senhub.db.postgresql.lock.waiting
      unit: "{lock}"
      type: gauge

  - name: "senhub.db.postgresql.long_running_xact"
    channel: "pg_long_running_xact"
    display_name: "Long-Running Transaction Age"
    unit: "s"
    category: "locks"
    description: "Age in seconds of the oldest active transaction (max(now() - xact_start) over pg_stat_activity where state IN ('active','idle in transaction'))"
    otel:
      name: senhub.db.postgresql.long_running_xact
      unit: "s"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # STORAGE — db size, table count
  # ═════════════════════════════════════════════════════════════════════════
  - name: "postgresql.db_size"
    channel: "pg_db_size"
    display_name: "Database Size"
    unit: "B"
    category: "storage"
    description: "Sum of pg_database_size() over all non-template databases"
    otel:
      name: postgresql.db_size
      unit: "By"
      type: gauge

  - name: "postgresql.table.count"
    channel: "pg_table_count"
    display_name: "Tables Count"
    unit: "#"
    category: "storage"
    description: "Count of relations across user schemas (pg_class where relkind='r')"
    otel:
      name: postgresql.table.count
      unit: "{table}"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # ARCHIVER — failures, freshness (conditional on archive_mode)
  # ═════════════════════════════════════════════════════════════════════════
  - name: "senhub.db.postgresql.archiver.failed"
    channel: "pg_archiver_failed"
    display_name: "Archiver Failures"
    unit: "#"
    category: "archiver"
    description: "Cumulative WAL archiver failures (pg_stat_archiver.failed_count)"
    otel:
      name: senhub.db.postgresql.archiver.failed
      unit: "{failure}"
      type: counter

  - name: "senhub.db.postgresql.archiver.last_archived.age"
    channel: "pg_archiver_last_archived_age"
    display_name: "Last Archived WAL Age"
    unit: "s"
    category: "archiver"
    description: "Seconds since last_archived_time. Only emitted when archive_mode is enabled."
    otel:
      name: senhub.db.postgresql.archiver.last_archived.age
      unit: "s"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # REPLICATION — role (expand), composite health, replicas, lag, io thread
  # ═════════════════════════════════════════════════════════════════════════
  - name: "senhub.db.replication.role"
    channel: "db_replication_role"
    display_name: "Replication Role"
    unit: "#"
    category: "replication"
    description: "Detected replication role of this instance"
    lookup: "senhub.db.replication.role"
    otel:
      name: senhub.db.replication.role
      unit: "1"
      type: gauge
      expand:
        attribute: role
        mapping:
          standalone: 0
          primary: 1
          replica: 2

  - name: "senhub.db.replication.health"
    channel: "db_replication_health"
    display_name: "Replication Health"
    unit: "#"
    category: "replication"
    description: "Composite gauge: 1 if replication looks healthy (or instance is standalone), 0 if degraded"
    otel:
      name: senhub.db.replication.health
      unit: "1"
      type: gauge

  - name: "senhub.db.replication.replicas.connected"
    channel: "db_replication_replicas_connected"
    display_name: "Replicas Connected"
    unit: "#"
    category: "replication"
    description: "On primary: number of streaming replicas connected (pg_stat_replication count)"
    otel:
      name: senhub.db.replication.replicas.connected
      unit: "{replica}"
      type: gauge

  - name: "postgresql.wal.lag"
    channel: "pg_wal_lag"
    display_name: "Replication Lag"
    unit: "s"
    category: "replication"
    description: "On replica: replay lag in seconds (now() - pg_last_xact_replay_timestamp()). Attribute operation=replay (contrib canon)."
    otel:
      name: postgresql.wal.lag
      unit: "s"
      type: gauge
      attributes:
        operation: replay

  - name: "senhub.db.postgresql.replica.io.running"
    channel: "pg_replica_io_running"
    display_name: "Replica IO Running"
    unit: "#"
    category: "replication"
    description: "On replica: 1 if WAL receiver is connected (pg_stat_wal_receiver.status='streaming'), 0 otherwise"
    otel:
      name: senhub.db.postgresql.replica.io.running
      unit: "1"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # DIFFERENTIATORS — bloat (per-table, opt-in)
  # ═════════════════════════════════════════════════════════════════════════
  - name: "senhub.db.postgresql.bloat.ratio"
    channel: "pg_bloat_ratio_{schema}_{table}"
    display_name: "Table Bloat Ratio ({schema}.{table})"
    unit: "%"
    multi_instance_labels: ["schema", "table"]
    category: "bloat"
    description: "Estimated bloat ratio per table (heuristic from pg_class stats). Schema is part of the channel key so public.orders and staging.orders never collide."
    otel:
      name: senhub.db.postgresql.bloat.ratio
      unit: "1"
      type: gauge
    tag_to_attribute:
      schema: db.schema.name
      table: db.table.name

  - name: "senhub.db.postgresql.bloat.size"
    channel: "pg_bloat_size_{schema}_{table}"
    display_name: "Table Bloat Size ({schema}.{table})"
    unit: "B"
    multi_instance_labels: ["schema", "table"]
    category: "bloat"
    description: "Estimated bloat in bytes per table."
    otel:
      name: senhub.db.postgresql.bloat.size
      unit: "By"
      type: gauge
    tag_to_attribute:
      schema: db.schema.name
      table: db.table.name

  # ═════════════════════════════════════════════════════════════════════════
  # DIFFERENTIATORS — pg_stat_statements (opt-in, requires extension)
  # ═════════════════════════════════════════════════════════════════════════
  - name: "senhub.db.postgresql.statement.calls"
    channel: "pg_statement_calls"
    display_name: "Statement Calls"
    unit: "#"
    category: "stat_statements"
    description: "Total number of statements executed across all entries in pg_stat_statements"
    otel:
      name: senhub.db.postgresql.statement.calls
      unit: "{call}"
      type: counter

  - name: "senhub.db.postgresql.statement.exec_time.mean"
    channel: "pg_statement_exec_time_mean"
    display_name: "Statement Exec Time Mean"
    unit: "ms"
    category: "stat_statements"
    description: "Mean execution time across pg_stat_statements entries. Source in ms — converted to seconds for OTel (mapper ÷ 1000)."
    otel:
      name: senhub.db.postgresql.statement.exec_time.mean
      unit: "s"
      type: gauge

  # ═════════════════════════════════════════════════════════════════════════
  # PER-DATABASE (opt-in, cardinality-bounded)
  # ═════════════════════════════════════════════════════════════════════════
  - name: "postgresql.db_size.per_database"
    channel: "pg_db_size_per_database_{database}"
    display_name: "Database Size ({database})"
    unit: "B"
    multi_instance_labels: ["database"]
    category: "storage"
    description: "Size of an individual database (opt-in via per_database flag)"
    otel:
      name: postgresql.db_size
      unit: "By"
      type: gauge
    tag_to_attribute:
      database: db.namespace

  # ═════════════════════════════════════════════════════════════════════════
  # PER-TABLE (opt-in, cardinality-bounded)
  # ═════════════════════════════════════════════════════════════════════════
  - name: "postgresql.table.size"
    channel: "pg_table_size_{database}_{table}"
    display_name: "Table Size ({database}.{table})"
    unit: "B"
    multi_instance_labels: ["database", "table"]
    category: "storage"
    description: "Size of an individual table (opt-in via per_table flag, contrib canon)"
    otel:
      name: postgresql.table.size
      unit: "By"
      type: gauge
    tag_to_attribute:
      database: db.namespace
      table: db.table.name
