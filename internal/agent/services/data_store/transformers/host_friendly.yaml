# Host Metrics Friendly Naming Patterns for PRTG
patterns:
  # CPU metrics
  "cpu_usage_total": "CPU Usage"
  "cpu_system": "CPU System Time"
  "cpu_user": "CPU User Time"
  "cpu_idle": "CPU Idle Time"
  "cpu_nice": "CPU Nice Time"
  "cpu_iowait": "CPU I/O Wait"
  "cpu_irq": "CPU IRQ Time"
  "cpu_softirq": "CPU Soft IRQ Time"
  "cpu_steal": "CPU Steal Time"
  "cpu_load1": "CPU Load - 1 minute"
  "cpu_load5": "CPU Load - 5 minutes" 
  "cpu_load15": "CPU Load - 15 minutes"
  "cpu_core_usage": "CPU Core {core} Usage"
  
  # Memory metrics
  "memory_used_percent": "Memory Usage"
  "memory_available_percent": "Memory Available"
  "memory_total": "Memory Total"
  "memory_available": "Memory Available"
  "memory_used": "Memory Used"
  "memory_free": "Memory Free"
  "memory_cached": "Memory Cached"
  "memory_buffers": "Memory Buffers"
  "swap_total": "Swap Total"
  "swap_used": "Swap Used"
  "swap_free": "Swap Free"
  "swap_used_percent": "Swap Usage"
  
  # Filesystem metrics
  "fs_total_bytes": "Filesystem Total Space"
  "fs_free_bytes": "Filesystem Free Space"
  "fs_used_bytes": "Filesystem Used Space"
  "fs_available_bytes": "Filesystem Available Space"
  "fs_used_percent": "Filesystem Usage"
  "fs_inodes_total": "Filesystem Total Inodes"
  "fs_inodes_free": "Filesystem Free Inodes"
  "fs_inodes_used": "Filesystem Used Inodes"
  "fs_inodes_used_percent": "Filesystem Inode Usage"
  
  # Network metrics
  "bytes_sent": "Network Bytes Sent/sec"
  "bytes_received": "Network Bytes Received/sec"
  "packets_sent": "Network Packets Sent/sec"
  "packets_received": "Network Packets Received/sec"
  "errors_sent": "Network Errors Sent/sec"
  "errors_received": "Network Errors Received/sec"
  "discards_sent": "Network Discards Sent/sec"
  "discards_received": "Network Discards Received/sec"
  
  # System metrics
  "system.uptime_seconds": "System Uptime"
  "system.processes_total": "Total Processes"
  "system.processes_running": "Running Processes"
  "system.processes_sleeping": "Sleeping Processes"

# Unit mappings
units:
  percentage: "%"
  bytes: "Bytes"
  seconds: "s"
  count: "#"
  load: ""
  iops: "IOPS"
  bps: "Bytes/s"
  mbps: "Mbps"