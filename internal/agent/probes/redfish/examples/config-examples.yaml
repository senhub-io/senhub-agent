# Cisco UCS configuration example 
cisco_config:
  probes:
    redfish:
      enabled: true
      endpoint: "https://ucs-server.example.com"
      username: "admin"
      password: "cisco-password"
      interval: 300
      collections:
        - system
        - thermal
        - power

# Multiple Redfish servers configuration example
multi_server_config:
  probes:
    redfish_dell:  # Custom probe name suffix to differentiate servers
      probe_type: redfish  # Specify the actual probe type
      enabled: true
      endpoint: "https://dell-server.example.com/redfish"
      username: "root"
      password: "calvin"
      interval: 300
      verify_ssl: false
    
    redfish_hpe:
      probe_type: redfish
      enabled: true
      endpoint: "https://hpe-server.example.com"
      username: "admin"
      password: "password123"
      interval: 600
      verify_ssl: true
      
    redfish_lenovo:
      probe_type: redfish
      enabled: true
      endpoint: "https://lenovo-server.example.com"
      username: "USERID" 
      password: "PASSW0RD"
      interval: 300