name: Native Runner Build

# Compiles the JT400 bridge runner to a self-contained per-OS/arch
# native binary via GraalVM native-image, so the ibmi probe runs
# without a JRE on the host. Two trigger modes:
#
#   workflow_dispatch — manual; useful when iterating on build args
#                       or refreshing the bundled binaries between
#                       releases.
#   workflow_call     — invoked by dev-beta-release.yml and
#                       master-release.yml to attach the binaries
#                       as release assets.
#
# Each job uploads its artifact via actions/upload-artifact@v4. The
# caller workflow downloads them with actions/download-artifact@v4
# and feeds them into the release-files list.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      # One target failing must not cancel the others. Each platform
      # has its own GraalVM quirks; we want to see every failure to
      # iterate on the build args, not learn about them one at a time.
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runs_on: ubuntu-latest
            artifact: jt400runner-linux-amd64
            classpath_sep: ':'
          - target: linux-arm64
            runs_on: ubuntu-24.04-arm
            artifact: jt400runner-linux-arm64
            classpath_sep: ':'
          - target: darwin-amd64
            runs_on: macos-13
            artifact: jt400runner-darwin-amd64
            classpath_sep: ':'
          - target: darwin-arm64
            runs_on: macos-14
            artifact: jt400runner-darwin-arm64
            classpath_sep: ':'
          - target: windows-amd64
            runs_on: windows-latest
            artifact: jt400runner-windows-amd64.exe
            classpath_sep: ';'
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native-image
        shell: bash
        working-directory: internal/agent/probes/ibmi/bridge
        env:
          CP_SEP: ${{ matrix.classpath_sep }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          # Classpath needs both jt400.jar (the IBM toolbox) and the
          # directory containing Jt400Runner.class (the entry point).
          # $CP_SEP is ';' on Windows, ':' elsewhere.
          CP="jt400.jar${CP_SEP}."
          # --no-fallback : refuse a runtime that needs a JVM — the
          #                 whole point of native-image is to be
          #                 self-contained.
          # -O2           : release-build optimisation level.
          # -H:+ReportExceptionStackTraces : keep traces visible on
          #                 build failure or runtime crash.
          native-image \
            -cp "$CP" \
            --no-fallback \
            -O2 \
            -H:+UnlockExperimentalVMOptions \
            -H:+ReportExceptionStackTraces \
            -o "$ARTIFACT" \
            Jt400Runner

      - name: Smoke check (binary starts and exits on missing creds)
        shell: bash
        working-directory: internal/agent/probes/ibmi/bridge
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          # The runner exits with code 2 when PUB400_USER/PASSWORD
          # are missing — confirming the binary launched, parsed env,
          # decided to bail. Crash codes (segfault, abort) would
          # surface as 130+ on Unix or 0xC0000xxx on Windows.
          set +e
          ./"$ARTIFACT" </dev/null
          rc=$?
          echo "exit code: $rc"
          if [ "$rc" -ne 2 ] && [ "$rc" -ne 1 ]; then
            echo "unexpected exit code from smoke check"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: internal/agent/probes/ibmi/bridge/${{ matrix.artifact }}
          retention-days: 14
          if-no-files-found: error
