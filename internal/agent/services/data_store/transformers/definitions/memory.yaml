probe_name: "memory"
friendly_name: "Memory Metrics"
version: "3.0.0"
host_level: true
multi_instance_labels: []

# Format v3 — OTel-first source of truth:
#   otel:              semantic convention (source of truth)
#   tag_to_attribute:  mapping of cache tag names → OTel attribute names
# Retro-compat fields (channel, display_name, category, description) unchanged.

metrics:
  # ─────────────────────────────────────────────────────────────────────────
  # Total RAM installed (Windows)
  # OTel: system.memory.limit (UpDownCounter, bytes)
  # ─────────────────────────────────────────────────────────────────────────
  - name: "memory_total"
    channel: "memory_total"
    display_name: "Memory Total"
    unit: "bytes"
    category: "capacity"
    description: "Total physical memory installed on the system"
    otel:
      name: system.memory.limit
      unit: By
      type: updowncounter

  # ─────────────────────────────────────────────────────────────────────────
  # RAM usage by state (cross-platform, bytes)
  # OTel: system.memory.usage (UpDownCounter, By) with system.memory.state
  # OTel official state values: buffers, cached, free, used
  # Extensions for Windows: committed, modified, nonpaged_pool, paged_pool
  # Harmonization: Windows "available" → state=free
  # ─────────────────────────────────────────────────────────────────────────

  # --- Windows-specific bytes ---
  - name: "memory_available"
    channel: "memory_available"
    display_name: "Memory Available"
    unit: "bytes"
    category: "capacity"
    description: "Amount of physical memory immediately available for allocation"
    otel:
      name: system.memory.usage
      unit: By
      type: updowncounter
      attributes:
        system.memory.state: free      # harmonized from Windows "available"

  - name: "memory_committed"
    channel: "memory_committed"
    display_name: "Memory Committed"
    unit: "bytes"
    category: "capacity"
    description: "Amount of virtual memory that has been committed by the memory manager"
    otel:
      name: system.memory.usage
      unit: By
      type: updowncounter
      attributes:
        system.memory.state: committed   # extension — Windows-specific

  - name: "memory_modified_page_list"
    channel: "memory_modified_page_list"
    display_name: "Memory Modified Page List"
    unit: "bytes"
    category: "capacity"
    description: "Amount of memory whose contents have been modified but not yet written to disk"
    otel:
      name: system.memory.usage
      unit: By
      type: updowncounter
      attributes:
        system.memory.state: modified    # extension — Windows-specific

  - name: "memory_nonpaged_pool"
    channel: "memory_nonpaged_pool"
    display_name: "Memory Nonpaged Pool"
    unit: "bytes"
    category: "capacity"
    description: "Amount of kernel memory that cannot be paged out to disk"
    otel:
      name: system.memory.usage
      unit: By
      type: updowncounter
      attributes:
        system.memory.state: nonpaged_pool   # extension — Windows-specific

  - name: "memory_paged_pool"
    channel: "memory_paged_pool"
    display_name: "Memory Paged Pool"
    unit: "bytes"
    category: "capacity"
    description: "Amount of kernel memory that can be paged out to disk"
    otel:
      name: system.memory.usage
      unit: By
      type: updowncounter
      attributes:
        system.memory.state: paged_pool      # extension — Windows-specific

  - name: "memory_cache"
    channel: "memory_cache"
    display_name: "Memory Cache"
    unit: "bytes"
    category: "capacity"
    description: "Amount of physical memory used by the system file cache"
    otel:
      name: system.memory.usage
      unit: By
      type: updowncounter
      attributes:
        system.memory.state: cached          # Windows file cache → OTel "cached"

  # --- Linux bytes ---
  - name: "memory_used"
    channel: "memory_used"
    display_name: "Memory Used"
    unit: "bytes"
    category: "capacity"
    description: "Amount of physical memory currently in use by the system and applications"
    otel:
      name: system.memory.usage
      unit: By
      type: updowncounter
      attributes:
        system.memory.state: used

  - name: "memory_free"
    channel: "memory_free"
    display_name: "Memory Free"
    unit: "bytes"
    category: "capacity"
    description: "Amount of physical memory not being used at all"
    otel:
      name: system.memory.usage
      unit: By
      type: updowncounter
      attributes:
        system.memory.state: free

  - name: "memory_cached"
    channel: "memory_cached"
    display_name: "Memory Cached"
    unit: "bytes"
    category: "capacity"
    description: "Amount of physical memory used for caching file data and metadata"
    otel:
      name: system.memory.usage
      unit: By
      type: updowncounter
      attributes:
        system.memory.state: cached

  - name: "memory_buffers"
    channel: "memory_buffers"
    display_name: "Memory Buffers"
    unit: "bytes"
    category: "capacity"
    description: "Amount of physical memory used for kernel buffer cache"
    otel:
      name: system.memory.usage
      unit: By
      type: updowncounter
      attributes:
        system.memory.state: buffers

  # ─────────────────────────────────────────────────────────────────────────
  # Memory utilization (cross-platform, %)
  # OTel: system.memory.utilization (Gauge, ratio)
  # Mapper converts 0-100 → 0-1
  # ─────────────────────────────────────────────────────────────────────────
  - name: "memory_used_percent"
    channel: "memory_usage"
    display_name: "Memory Usage"
    unit: "%"
    category: "usage"
    description: "Percentage of total physical memory currently in use"
    otel:
      name: system.memory.utilization
      unit: "1"
      type: gauge

  # ─────────────────────────────────────────────────────────────────────────
  # Windows paging rates (instantaneous /s from Perfmon)
  # Extensions senhub.system.paging.*_per_second
  # See senhub-semantic-conventions §4.2.2
  # ─────────────────────────────────────────────────────────────────────────
  - name: "memory_page_faults"
    channel: "memory_page_faults"
    display_name: "Memory Page Faults"
    unit: "#"
    category: "paging"
    description: "Rate of page faults per second including both hard and soft faults"
    otel:
      name: senhub.system.paging.faults_per_second
      unit: "1/s"
      type: gauge

  - name: "memory_pages_input"
    channel: "memory_pages_input"
    display_name: "Memory Pages Input"
    unit: "#"
    category: "paging"
    description: "Rate of pages read from disk per second to resolve hard page faults"
    otel:
      name: senhub.system.paging.operations_per_second
      unit: "1/s"
      type: gauge
      attributes:
        direction: in

  - name: "memory_pages_output"
    channel: "memory_pages_output"
    display_name: "Memory Pages Output"
    unit: "#"
    category: "paging"
    description: "Rate of pages written to disk per second to free physical memory"
    otel:
      name: senhub.system.paging.operations_per_second
      unit: "1/s"
      type: gauge
      attributes:
        direction: out

  # ─────────────────────────────────────────────────────────────────────────
  # Pagefile utilization (%)
  # OTel: system.paging.utilization (OTEP 0119 draft) for current usage
  # Extension senhub.system.paging.utilization_peak for peak value
  # ─────────────────────────────────────────────────────────────────────────
  - name: "pagefile_usage"
    channel: "pagefile_usage"
    display_name: "Pagefile Usage"
    unit: "%"
    category: "paging"
    description: "Percentage of the system pagefile currently in use"
    otel:
      name: system.paging.utilization
      unit: "1"
      type: gauge
      attributes:
        system.paging.state: used

  - name: "pagefile_usage_peak"
    channel: "pagefile_usage_peak"
    display_name: "Pagefile Usage Peak"
    unit: "%"
    category: "paging"
    description: "Peak percentage of the system pagefile used since last reboot"
    otel:
      name: senhub.system.paging.utilization_peak
      unit: "1"
      type: gauge

  # ─────────────────────────────────────────────────────────────────────────
  # Swap usage (Linux) — the Linux counterpart of the Windows pagefile.
  # OTel models swap as "paging"; swap_used/swap_free collapse onto
  # system.paging.usage via system.paging.state, mirroring pagefile_usage.
  # swap_total has no OTel paging equivalent → senhub.system.paging.limit
  # extension, mirroring system.memory.limit for RAM.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "swap_total"
    channel: "swap_total"
    display_name: "Swap Total"
    unit: "bytes"
    category: "paging"
    description: "Total swap space configured on the system"
    otel:
      name: senhub.system.paging.limit
      unit: By
      type: updowncounter

  - name: "swap_used"
    channel: "swap_used"
    display_name: "Swap Used"
    unit: "bytes"
    category: "paging"
    description: "Amount of swap space currently in use"
    otel:
      name: system.paging.usage
      unit: By
      type: updowncounter
      attributes:
        system.paging.state: used

  - name: "swap_free"
    channel: "swap_free"
    display_name: "Swap Free"
    unit: "bytes"
    category: "paging"
    description: "Amount of swap space not in use"
    otel:
      name: system.paging.usage
      unit: By
      type: updowncounter
      attributes:
        system.paging.state: free

  - name: "swap_used_percent"
    channel: "swap_usage"
    display_name: "Swap Usage"
    unit: "%"
    category: "paging"
    description: "Percentage of total swap space currently in use"
    otel:
      name: system.paging.utilization
      unit: "1"
      type: gauge
      attributes:
        system.paging.state: used

tag_metadata:
  # System tags (injected by framework)
  host:
    type: resource
    label: "Host"
  os:
    type: resource
    label: "Operating System"
  platform:
    type: resource
    label: "Platform"
  probe_name:
    type: resource
    label: "Probe Name"
  probe_type:
    type: resource
    label: "Probe Type"
