version: 2

# Keeps the SHA-pinned GitHub Actions current. Actions are pinned to a
# full commit SHA in the workflows for supply-chain safety; without an
# updater those pins freeze on a vulnerable version. Dependabot reads the
# trailing "# vX.Y.Z" comment, bumps the SHA, and refreshes the comment.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      actions:
        patterns:
          - "*"
