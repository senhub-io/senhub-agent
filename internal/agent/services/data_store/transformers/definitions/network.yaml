probe_name: "network"
friendly_name: "Network Interface"
version: "3.0.0"
host_level: true
multi_instance_labels: ["interface"]

# Format v3 — OTel-first source of truth:
#   otel:              semantic convention (source of truth)
#   tag_to_attribute:  mapping of cache tag names → OTel attribute names
# Retro-compat fields (channel, display_name, category, description) unchanged.
# 100% OTel native — no senhub.* extensions.

metrics:
  # ─────────────────────────────────────────────────────────────────────────
  # Throughput (bytes per second, instantaneous rate)
  # OTel: system.network.io (Gauge, By/s) with network.io.direction
  #
  # NOTE: deviation from OTel semconv (which defines system.network.io as a
  # cumulative counter in By). Our probe emits the per-second rate computed
  # since the last poll — what Windows perfmon natively gives us, and what
  # PRTG/Nagios consumers expect. Exposing this as a gauge in By/s is the
  # honest description of what the agent measures.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "bytes_sent"
    channel: "network_bytes_sent"
    display_name: "Network {interface} Bytes Sent"
    unit: "bytes"
    multi_instance_labels: ["interface"]
    category: "throughput"
    description: "Bytes per second transmitted on the network interface"
    otel:
      name: system.network.io
      unit: By/s
      type: gauge
      attributes:
        network.io.direction: transmit
    tag_to_attribute:
      interface: network.interface.name

  - name: "bytes_received"
    channel: "network_bytes_received"
    display_name: "Network {interface} Bytes Received"
    unit: "bytes"
    multi_instance_labels: ["interface"]
    category: "throughput"
    description: "Bytes per second received on the network interface"
    otel:
      name: system.network.io
      unit: By/s
      type: gauge
      attributes:
        network.io.direction: receive
    tag_to_attribute:
      interface: network.interface.name

  # ─────────────────────────────────────────────────────────────────────────
  # Packet counts (packets per second, instantaneous rate)
  # OTel: system.network.packet.count (Gauge, {packet}/s) with network.io.direction
  # See deviation note on throughput above.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "packets_sent"
    channel: "network_packets_sent"
    display_name: "Network {interface} Packets Sent"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "packets"
    description: "Packets per second transmitted on the network interface"
    otel:
      name: system.network.packet.count
      unit: "{packet}/s"
      type: gauge
      attributes:
        network.io.direction: transmit
    tag_to_attribute:
      interface: network.interface.name

  - name: "packets_received"
    channel: "network_packets_received"
    display_name: "Network {interface} Packets Received"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "packets"
    description: "Packets per second received on the network interface"
    otel:
      name: system.network.packet.count
      unit: "{packet}/s"
      type: gauge
      attributes:
        network.io.direction: receive
    tag_to_attribute:
      interface: network.interface.name

  # ─────────────────────────────────────────────────────────────────────────
  # Errors (per second, instantaneous rate)
  # OTel: system.network.errors (Gauge, {error}/s) with network.io.direction
  # See deviation note on throughput above.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "errors_sent"
    channel: "network_errors_sent"
    display_name: "Network {interface} Send Errors"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "errors"
    description: "Outbound packets per second that could not be transmitted due to errors"
    otel:
      name: system.network.errors
      unit: "{error}/s"
      type: gauge
      attributes:
        network.io.direction: transmit
    tag_to_attribute:
      interface: network.interface.name

  - name: "errors_received"
    channel: "network_errors_received"
    display_name: "Network {interface} Receive Errors"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "errors"
    description: "Inbound packets per second that contained errors and were discarded"
    otel:
      name: system.network.errors
      unit: "{error}/s"
      type: gauge
      attributes:
        network.io.direction: receive
    tag_to_attribute:
      interface: network.interface.name

  # ─────────────────────────────────────────────────────────────────────────
  # Packets dropped / discards (per second, instantaneous rate)
  # OTel: system.network.packet.dropped (Gauge, {packet}/s) with network.io.direction
  # See deviation note on throughput above.
  # ─────────────────────────────────────────────────────────────────────────
  - name: "discards_sent"
    channel: "network_discards_sent"
    display_name: "Network {interface} Send Discards"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "errors"
    description: "Outbound packets per second discarded even though no errors were detected"
    otel:
      name: system.network.packet.dropped
      unit: "{packet}/s"
      type: gauge
      attributes:
        network.io.direction: transmit
    tag_to_attribute:
      interface: network.interface.name

  - name: "discards_received"
    channel: "network_discards_received"
    display_name: "Network {interface} Receive Discards"
    unit: "#"
    multi_instance_labels: ["interface"]
    category: "errors"
    description: "Inbound packets per second discarded even though no errors were detected"
    otel:
      name: system.network.packet.dropped
      unit: "{packet}/s"
      type: gauge
      attributes:
        network.io.direction: receive
    tag_to_attribute:
      interface: network.interface.name

tag_metadata:
  interface:
    type: resource
    label: "Network Interface"
  # System tags (injected by framework)
  host:
    type: resource
    label: "Host"
  os:
    type: resource
    label: "Operating System"
  platform:
    type: resource
    label: "Platform"
  probe_name:
    type: resource
    label: "Probe Name"
  probe_type:
    type: resource
    label: "Probe Type"
