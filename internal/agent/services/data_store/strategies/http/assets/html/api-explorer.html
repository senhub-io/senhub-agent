<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="agent-key" content="{{.AgentKey}}">
    <title>SenHub Agent - Sensor Builder</title>
    <link rel="icon" type="image/png" href="/web/{{.AgentKey}}/assets/logo.png">
    
    <!-- CSS Assets -->
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/variables.css">
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/base.css">
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/layout.css">
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/forms.css">
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/buttons.css">
    <link rel="stylesheet" href="/web/{{.AgentKey}}/assets/css/components.css">
</head>
<body>
    <div class="header">
        <div class="header-top">
            <h1>
                <img src="/web/{{.AgentKey}}/assets/logo.png" alt="SenHub Agent" class="logo">
                SenHub Agent
            </h1>
            <nav class="main-nav">
                <a href="/web/{{.AgentKey}}/dashboard" class="nav-link">Dashboard</a>
                <a href="/web/{{.AgentKey}}/explorer" class="nav-link active">Sensor Builder</a>
                <a href="/web/{{.AgentKey}}/docs" class="nav-link">Documentation</a>
            </nav>
        </div>
    </div>
    
    <div class="container">
        <div class="explorer-grid">
            <!-- Request Builder -->
            <div class="card">
                <h2>Configure Sensor</h2>
                
                <div class="form-group">
                    <label class="form-label" for="endpoint-type">Output Format</label>
                    <select id="endpoint-type" class="form-select">
                        <option value="">Loading endpoints...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="probe-select">Probe</label>
                    <select id="probe-select" class="form-select">
                        <option value="">Loading probes...</option>
                    </select>
                </div>

                <!-- Show Tags Option -->
                <div class="form-group" id="show-tags-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="show-tags-checkbox" checked>
                        <span>Include resource names in labels</span>
                        <span class="info-icon" title="When unchecked, resource identifiers are hidden from metric labels (e.g., 'State' instead of 'Interface LO/1 - State'). Currently available for Citrix and Netscaler probes only.">ⓘ</span>
                    </label>
                </div>

                <div class="form-group" id="tag-filters-group" style="display: none;">
                    <label class="form-label">Filters</label>
                    <div id="tag-filters">
                        <!-- Dynamic tag filters will be loaded here -->
                    </div>
                </div>
            </div>
            
            <!-- Response and URL Generator -->
            <div class="card">
                <!-- Generated URL Section -->
                <div class="form-group">
                    <label class="form-label">Sensor URL</label>
                    <div id="generated-url" class="url-generator">
                        Select an endpoint and probe to generate URL...
                    </div>
                    <input type="text" id="manual-url" class="form-input" 
                           style="display: none; margin-top: 0.5rem;" 
                           placeholder="Edit URL manually for advanced filtering...">
                    
                    <div class="button-group">
                        <button id="edit-url-btn" class="btn btn-secondary" disabled>
                            Edit URL
                        </button>
                        <button id="copy-url-btn" class="btn btn-secondary" disabled>
                            Copy Sensor URL
                        </button>
                        <button id="test-request-btn" class="btn btn-primary" disabled>
                            Preview
                        </button>
                    </div>
                </div>
                
                <!-- Response Section -->
                <h2>Response</h2>
                <div class="button-group" style="margin-bottom: var(--spacing-md);">
                    <button id="copy-response-btn" class="btn btn-secondary" disabled>
                        Copy Response
                    </button>
                    <button id="clear-response-btn" class="btn btn-secondary">
                        Clear
                    </button>
                    <a href="/api/{{.AgentKey}}/lookups/prtg" class="btn btn-secondary" download="senhub-prtg-lookups.zip" title="Download PRTG lookup definitions for interpreting numeric metric values">
                        PRTG Lookups
                    </a>
                </div>
                <div id="response-view-toggle" class="response-view-toggle" style="display: none;">
                    <button id="view-table-btn" class="btn btn-sm active">Table</button>
                    <button id="view-json-btn" class="btn btn-sm">JSON</button>
                </div>
                <div id="response-area" class="result-area centered adaptive-height">
                    <span class="placeholder-text">Click "Preview" to see the response...</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- JavaScript Assets -->
    <script>
        // Make agent key available globally
        window.AGENT_KEY = '{{.AgentKey}}';
    </script>
    <script src="/web/{{.AgentKey}}/assets/js/base.js"></script>
    <script src="/web/{{.AgentKey}}/assets/js/tag-filters.js"></script>
    <script src="/web/{{.AgentKey}}/assets/js/api-explorer.js"></script>
</body>
</html>
