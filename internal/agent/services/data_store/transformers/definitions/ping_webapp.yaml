probe_name: "ping_webapp"
friendly_name: "Ping WebApp"
multi_instance_labels: ["url"]

metrics:
  # WebApp Ping Metrics
  - name: "averageLatency"
    channel: "ping_average_latency"
    display_name: "Average Latency ({url})"
    unit: "ms"
    category: "connectivity"
    multi_instance_labels: ["url"]
    description: "Average round-trip time to the web application endpoint"

  - name: "packetLoss"
    channel: "ping_packet_loss"
    display_name: "Packet Loss ({url})"
    unit: "%"
    category: "connectivity"
    multi_instance_labels: ["url"]
    description: "Percentage of ICMP packets lost to the web application endpoint"

tag_metadata:
  url:
    type: resource
    label: "Web Application URL"
