  <circle cx="60" cy="18" r="9" fill="#00caf6"/>
  <!-- ears -->
  <rect x="14" y="58" width="16" height="28" rx="6" fill="#c9c9c9"/>
  <rect x="90" y="58" width="16" height="28" rx="6" fill="#c9c9c9"/>
  <!-- head -->
  <rect x="24" y="40" width="72" height="64" rx="16" fill="#4a4a4a"/>
  <rect x="33" y="49" width="54" height="46" rx="9" fill="#ededed"/>
