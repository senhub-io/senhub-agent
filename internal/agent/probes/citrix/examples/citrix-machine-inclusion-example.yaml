# Citrix Probe Configuration - Simplified Directory-First Approach
# The probe now aligns with Director console inventory (showing all machines)

# Standard configuration - aligns with Director console
probes:
  - name: citrix
    params:
      base_url: "https://director.company.com/Director/OData/v4/Data"
      auth:
        username: "domain\\user"
        password: "password"
      delivery_controller:
        url: "https://ddc.company.com"
        site_filter: "PROD"
      interval: 120

# How It Works:
# - Inventory shows ALL machines from the site (like Director console)
# - Operational metrics are naturally filtered (only active machines produce sessions/connections)
# - No complex filtering strategies needed

# Example Behavior:
# - Director console shows: 259 machines (including OFF/Unregistered)
# - Agent inventory metrics: 259 machines (aligned with Director)
# - Agent session metrics: Only machines with active sessions
# - Agent connection metrics: Only machines with active connections

# Generated Infrastructure Metrics:
# - sessions_connected: Only from active machines
# - user_connections_total_active: Only active connections
# - connection_failures_total: All failures (including from OFF machines if any)
# - machines_total: All machines (259)
# - machines_by_state: Breakdown by registration state

# Benefits:
# ✅ Simple configuration - no complex strategies
# ✅ Aligned with Director console (source of truth)
# ✅ Comprehensive inventory visibility
# ✅ Operational metrics auto-filtered by activity
# ✅ No pollution from inactive machines