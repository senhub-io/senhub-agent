version: "2.0.0"
description: "Optimized Nagios checks configuration - utilizes all available metrics"

checks:
  # System Health - Overall system monitoring with key metrics.
  # Only cross-platform channels are shipped: cpu_load* is Unix-only
  # (no load average on Windows), so it is left to operator config.
  - name: "system_health"
    description: "Overall system health check"
    metrics:
      - channel: "cpu_usage_total"
        aggregation: "average"
        warning: "80"
        critical: "90"
        unit: "%"
        description: "Average CPU usage across all cores"
      - channel: "memory_used_percent"
        aggregation: "max"
        warning: "85"
        critical: "95"
        unit: "%"
        description: "Memory usage percentage"

  # CPU Detailed Monitoring - cross-platform CPU channels only.
  # cpu_iowait and cpu_load* are Unix-only; operators add them in their
  # own config/nagios.yaml on Linux hosts.
  - name: "cpu_detailed"
    description: "Comprehensive CPU monitoring"
    probe_filter: "cpu"
    metrics:
      - channel: "cpu_usage_total"
        warning: "80"
        critical: "90"
        unit: "%"
      - channel: "cpu_system"
        warning: "30"
        critical: "50"
        unit: "%"
        description: "CPU time spent in system mode"
      - channel: "cpu_user"
        warning: "70"
        critical: "85"
        unit: "%"
        description: "CPU time spent in user mode"

  # CPU Cores Individual - matches every core the probe reports
  # (core count is host-derived; no fixed core list is shipped).
  - name: "cpu_cores"
    description: "Monitor each CPU core individually"
    probe_filter: "cpu"
    metrics:
      - channel: "cpu_core_usage"
        aggregation: "none"
        warning: "80"
        critical: "90"
        unit: "%"
        tag_context: "core"

  # Memory Comprehensive
  # Ships only cross-platform channels so the default yields no
  # UNKNOWN-by-construction on a clean host. memory_used_percent is the
  # one memory channel emitted on every OS. memory_available is
  # Windows-only; memory_free / swap_used_percent / memory_cached are
  # Unix-only (memory_available is intentionally not emitted on Unix —
  # see internal/agent/probes/memory/memoryProbe_unix.go). Operators who
  # want OS-specific detail add those channels to their own
  # config/nagios.yaml.
  - name: "memory_detailed"
    description: "Detailed memory usage monitoring"
    probe_filter: "memory"
    metrics:
      - channel: "memory_used_percent"
        warning: "85"
        critical: "95"
        unit: "%"

  # Network Interfaces - matches every interface the probe reports
  # (no interface list is shipped pinned; operators narrow it in their
  # own config/nagios.yaml if they want a specific subset).
  - name: "network_detailed"
    description: "Per-interface network monitoring (all interfaces)"
    probe_filter: "network"
    metrics:
      - channel: "bytes_sent"
        aggregation: "sum"
        warning: "100000000"
        critical: "500000000"
        unit: "B/s"
        tag_context: "interface"
      - channel: "bytes_received"
        aggregation: "sum"
        warning: "100000000"
        critical: "500000000"
        unit: "B/s"
        tag_context: "interface"
      - channel: "packets_sent"
        aggregation: "sum"
        warning: "1000000"
        critical: "5000000"
        unit: "pkt/s"
        tag_context: "interface"
      - channel: "packets_received"
        aggregation: "sum"
        warning: "1000000"
        critical: "5000000"
        unit: "pkt/s"
        tag_context: "interface"
      - channel: "errors_sent"
        aggregation: "sum"
        warning: "100"
        critical: "1000"
        unit: "err/s"
        tag_context: "interface"
      - channel: "errors_received"
        aggregation: "sum"
        warning: "100"
        critical: "1000"
        unit: "err/s"
        tag_context: "interface"

  # Network Health Summary - Aggregated view
  - name: "network_health"
    description: "Network health summary"
    probe_filter: "network"
    metrics:
      - channel: "bytes_sent"
        aggregation: "sum"
        warning: "1000000000"
        critical: "2000000000"
        unit: "B/s"
      - channel: "bytes_received"
        aggregation: "sum"
        warning: "1000000000"
        critical: "2000000000"
        unit: "B/s"
      - channel: "errors_sent"
        aggregation: "sum"
        warning: "10"
        critical: "100"
        unit: "err/s"
      - channel: "errors_received"
        aggregation: "sum"
        warning: "10"
        critical: "100"
        unit: "err/s"

  # Gateway Connectivity
  - name: "gateway"
    description: "Network gateway connectivity"
    probe_filter: "ping_gateway"
    metrics:
      - channel: "averageLatency"
        warning: "100"
        critical: "500"
        unit: "ms"
      - channel: "packetLoss"
        warning: "5"
        critical: "10"
        unit: "%"

  # Web Application Health
  - name: "webapp"
    description: "Web application health monitoring"
    probe_filter: "ping_webapp"
    metrics:
      - channel: "averageLatency"
        aggregation: "average"
        warning: "2000"
        critical: "5000"
        unit: "ms"
        tag_context: "url"
      - channel: "packetLoss"
        warning: "1"
        critical: "5"
        unit: "%"
        description: "Packet loss percentage"

  # Load WebApp Monitoring (real metrics from cache)
  - name: "webapp_load"
    description: "Web application performance monitoring"
    probe_filter: "load_webapp"
    metrics:
      - channel: "total_time"
        warning: "5000"
        critical: "10000"
        unit: "ms"
        description: "Total request time"
      - channel: "ttfb"
        warning: "2000"
        critical: "5000"
        unit: "ms"
        description: "Time to first byte"
      - channel: "connecttime"
        warning: "1000"
        critical: "3000"
        unit: "ms"
        description: "Connection establishment time"
      - channel: "dnstime"
        warning: "500"
        critical: "2000"
        unit: "ms"
        description: "DNS resolution time"
      - channel: "tlstime"
        warning: "1000"
        critical: "3000"
        unit: "ms"
        description: "TLS handshake time"

  # Veeam Backup & Replication
  - name: veeam_jobs
    description: "Veeam backup jobs status"
    probe_filter: "veeam"
    metrics:
      - channel: veeam_jobs_failed
        aggregation: sum
        warning: "0"
        critical: "0"
        unit: "jobs"
        description: "Number of failed backup jobs"
      - channel: veeam_jobs_warning
        aggregation: sum
        warning: "0"
        critical: ""
        unit: "jobs"
        description: "Number of backup jobs with warnings"

  - name: veeam_job_detail
    description: "Veeam per-job backup status"
    probe_filter: "veeam"
    metrics:
      - channel: veeam_job_status
        aggregation: max
        warning: "2"
        critical: "3"
        unit: "status"
        tag_context: "job_name"
        description: "Job status (0=None, 1=Success, 2=Warning, 3=Failed)"
      - channel: veeam_job_seconds_since
        aggregation: max
        warning: "90000"
        critical: "176400"
        unit: "s"
        tag_context: "job_name"
        description: "Time since last backup run (warn 25h, crit 49h)"

  - name: veeam_repositories
    description: "Veeam repository capacity"
    probe_filter: "veeam"
    metrics:
      - channel: veeam_repo_free_pct
        aggregation: min
        warning: "20"
        critical: "10"
        unit: "%"
        invert: true
        tag_context: "repo_name"
        description: "Repository free space percentage"

  - name: veeam_license
    description: "Veeam license status"
    probe_filter: "veeam"
    metrics:
      - channel: veeam_license_days_left
        aggregation: min
        warning: "30"
        critical: "7"
        unit: "days"
        invert: true
        description: "Days until license expiration"
      - channel: veeam_license_instances_remaining
        aggregation: min
        warning: "5"
        critical: "1"
        unit: "instances"
        invert: true
        description: "Remaining licensed instances"

  - name: veeam_proxies
    description: "Veeam proxy status"
    probe_filter: "veeam"
    metrics:
      - channel: veeam_proxies_disabled
        aggregation: sum
        warning: "0"
        critical: ""
        unit: "proxies"
        description: "Number of disabled proxies"

  - name: veeam_protected_objects
    description: "Veeam protected objects status"
    probe_filter: "veeam"
    metrics:
      - channel: veeam_objects_failed
        aggregation: sum
        warning: "0"
        critical: "1"
        unit: "objects"
        description: "Number of objects whose last backup failed"
      - channel: veeam_object_restore_points
        aggregation: min
        warning: "2"
        critical: "1"
        unit: "#"
        invert: true
        tag_context: "object_name"
        description: "Minimum restore points per object (warn <2, crit <1)"

  - name: veeam_infrastructure
    description: "Veeam infrastructure health"
    probe_filter: "veeam"
    metrics:
      - channel: veeam_servers_unavailable
        aggregation: sum
        warning: "0"
        critical: "1"
        unit: "servers"
        description: "Number of unavailable managed servers"