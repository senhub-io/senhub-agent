  - name: "logon_brokering"
    channel: "logon_brokering"
    display_name: "Logon Brokering"
    unit: "s"
    
  - name: "logon_vmstart"
    channel: "logon_vmstart"
    display_name: "Logon VM Start"
    unit: "s"
    
  - name: "logon_hdx"
    channel: "logon_hdx"
    display_name: "Logon HDX"
    unit: "s"
    
  - name: "logon_authentication"
    channel: "logon_authentication"
    display_name: "Logon Authentication"
