site_name: SenHub Agent
site_url: https://agent.senhub.io/docs/
site_description: >-
  The OpenTelemetry-native infrastructure agent — documentation: installation,
  configuration, probes, outputs (PRTG, Nagios, Prometheus, OTLP) and release notes.
copyright: © 2026 SenHub Agent contributors · Apache 2.0 · Built by Sensor Factory
repo_url: https://github.com/senhub-io/senhub-agent
repo_name: senhub-io/senhub-agent
edit_uri: edit/dev/docs/user-guide/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/senhub-io/senhub-agent
    - icon: material/web
      link: https://senhub.io
  homepage: https://agent.senhub.io/

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/rn-filter.js
  - javascripts/dev-banner.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

