# Syslog Probe Metrics Definitions
# Based on RFC 3164 Syslog Protocol specification
#
# Format v3 — OTel-first source of truth.
# Syslog is an event conduit probe (relays log messages). Not a metrics source.
# See senhub-semantic-conventions §4.8.

probe_name: "syslog"
friendly_name: "Syslog"
version: "3.0.0"

metrics:
  # Syslog Event Severity — relayed log message, not a metric.
  - name: "syslog_event"
    channel: "syslog_severity"
    display_name: "Syslog {facility_name} Severity"
    unit: "#"
    multi_instance_labels: ["facility", "facility_name", "hostname", "tag"]
    description: "Syslog message severity level (RFC 3164)"
    category: "events"
    lookup: "sfs.syslog.severity"
    otel:
      skip: true
      reason: "Event conduit probe — syslog_event is the severity of the last relayed message, not a meaningful Prometheus metric. Future: OTLP log export in V2."

tag_metadata:
  facility_name:
    type: resource
    label: "Syslog Facility"
  hostname:
    type: resource
    label: "Source Host"
  tag:
    type: resource
    label: "Application Tag"
  # System tags (injected by framework)
  host:
    type: resource
    label: "Host"
  os:
    type: resource
    label: "Operating System"
  platform:
    type: resource
    label: "Platform"
  probe_name:
    type: resource
    label: "Probe Name"
  probe_type:
    type: resource
    label: "Probe Type"
