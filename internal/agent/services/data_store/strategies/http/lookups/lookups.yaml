netscaler.ha.state:
  description: "High Availability Node Role"
  type: status
  source: "Citrix ADC NITRO API - hanode hacurstatus field"
  mappings:
    0:
      text: "UNKNOWN"
      severity: "warning"
      description: "HA role cannot be determined"
    1:
      text: "SECONDARY"
      severity: "ok"
      description: "Node is in secondary role (standby)"
    2:
      text: "PRIMARY"
      severity: "ok"
      description: "Node is in primary role (active)"
  desired_value: null

