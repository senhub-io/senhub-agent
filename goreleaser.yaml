before:
  hooks:
    - go mod tidy

builds:
  - id: "senhub-agent"
    main: ./cmd/agent/main.go
    binary: "senhub-agent"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X senhub-agent.go/internal/agent/cliArgs.Version={{.Version}}
      - -X senhub-agent.go/internal/agent/cliArgs.CommitHash={{.Commit}}
      - -X senhub-agent.go/internal/agent/cliArgs.BuildTime={{.Date}}
      - -X senhub-agent.go/internal/agent/cliArgs.GoVersion={{.Env.GOVERSION}}
      - -X senhub-agent.go/internal/agent/cliArgs.Env=production
      - -X senhub-agent.go/internal/agent/cliArgs.ProductionURL=https://eu-west-1.intake.senhub.io
      - -X senhub-agent.go/internal/agent/cliArgs.DevelopmentURL=https://eu-west-1.intake-dev.senhub.io

archives:
  - id: binaries
    format: binary
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - none*  # N'inclut aucun fichier supplémentaire

release:
  draft: false
  mode: replace
  make_latest: true  # Marque cette version comme la plus récente

signs:
  - artifacts: none

source:
  enabled: false

changelog:
  skip: true
