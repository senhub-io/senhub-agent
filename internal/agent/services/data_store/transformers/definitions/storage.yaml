# Dell PowerVault ME Storage Metrics Definitions
# Compatible with senhub-sensor-dellpowervaultme-agent PowerShell connector

probe_name: "storage"
version: "1.0.0"

metrics:
  # Physical Drive Capacity
  - name: "dell_powervault_me.drive.capacity_bytes"
    channel: "Physical Drive Capacity"
    display_name: "Drive {drive_name} ({drive_id}) Capacity"
    unit: "Bytes"
    multi_instance_labels: ["drive_id", "drive_name", "drive_type", "drive_interface", "enclosure_id", "slot", "host"]
    description: "Total capacity of Dell PowerVault ME physical drives in bytes"

  # Disk Group Capacity
  - name: "dell_powervault_me.diskgroup.capacity_bytes"
    channel: "Disk Group Total Capacity"
    display_name: "Disk Group {diskgroup_name} Total Capacity"
    unit: "Bytes"
    multi_instance_labels: ["diskgroup_id", "diskgroup_name", "raid_type", "host"]
    description: "Total capacity of Dell PowerVault ME disk groups in bytes"
    
  - name: "dell_powervault_me.diskgroup.used_bytes"
    channel: "Disk Group Used Capacity"
    display_name: "Disk Group {diskgroup_name} Used"
    unit: "Bytes"
    multi_instance_labels: ["diskgroup_id", "diskgroup_name", "raid_type", "host"]
    description: "Used capacity of Dell PowerVault ME disk groups in bytes"
    
  - name: "dell_powervault_me.diskgroup.free_bytes"
    channel: "Disk Group Free Capacity"
    display_name: "Disk Group {diskgroup_name} Free"
    unit: "Bytes"
    multi_instance_labels: ["diskgroup_id", "diskgroup_name", "raid_type", "host"]
    description: "Free capacity of Dell PowerVault ME disk groups in bytes"
    calculated_metric: "diskgroup.capacity_bytes - diskgroup.used_bytes"
    
  - name: "dell_powervault_me.diskgroup.used_percent"
    channel: "Disk Group Usage Percentage"
    display_name: "Disk Group {diskgroup_name} Usage"
    unit: "%"
    multi_instance_labels: ["diskgroup_id", "diskgroup_name", "raid_type", "host"]
    description: "Used capacity percentage of Dell PowerVault ME disk groups"
    calculated_metric: "(diskgroup.used_bytes / diskgroup.capacity_bytes) * 100"
    alert_threshold_warning: 80
    alert_threshold_critical: 90

  # Volume Capacity
  - name: "dell_powervault_me.volume.capacity_bytes"
    channel: "Volume Total Capacity"
    display_name: "Volume {volume_name} Total Capacity"
    unit: "Bytes"
    multi_instance_labels: ["volume_id", "volume_name", "raid_type", "disk_group", "host"]
    description: "Total capacity of Dell PowerVault ME volumes in bytes"
    
  - name: "dell_powervault_me.volume.used_bytes"
    channel: "Volume Used Capacity"
    display_name: "Volume {volume_name} Used"
    unit: "Bytes"
    multi_instance_labels: ["volume_id", "volume_name", "raid_type", "disk_group", "host"]
    description: "Used capacity of Dell PowerVault ME volumes in bytes"
    
  - name: "dell_powervault_me.volume.free_bytes"
    channel: "Volume Free Capacity"
    display_name: "Volume {volume_name} Free"
    unit: "Bytes"
    multi_instance_labels: ["volume_id", "volume_name", "raid_type", "disk_group", "host"]
    description: "Free capacity of Dell PowerVault ME volumes in bytes"
    calculated_metric: "volume.capacity_bytes - volume.used_bytes"
    
  - name: "dell_powervault_me.volume.used_percent"
    channel: "Volume Usage Percentage"
    display_name: "Volume {volume_name} Usage"
    unit: "%"
    multi_instance_labels: ["volume_id", "volume_name", "raid_type", "disk_group", "host"]
    description: "Used capacity percentage of Dell PowerVault ME volumes"
    calculated_metric: "(volume.used_bytes / volume.capacity_bytes) * 100"
    alert_threshold_warning: 85
    alert_threshold_critical: 95

  # Volume I/O Performance
  - name: "dell_powervault_me.volume.io.reads"
    channel: "Volume Read Operations"
    display_name: "Volume {volume_name} Read Ops"
    unit: "ops/s"
    multi_instance_labels: ["volume_id", "volume_name", "raid_type", "disk_group", "host"]
    description: "Number of read operations on Dell PowerVault ME volumes"
    
  - name: "dell_powervault_me.volume.io.writes"
    channel: "Volume Write Operations"
    display_name: "Volume {volume_name} Write Ops"
    unit: "ops/s"
    multi_instance_labels: ["volume_id", "volume_name", "raid_type", "disk_group", "host"]
    description: "Number of write operations on Dell PowerVault ME volumes"
    
  - name: "dell_powervault_me.volume.io.total_ops"
    channel: "Volume Total Operations"
    display_name: "Volume {volume_name} Total Ops"
    unit: "ops/s"
    multi_instance_labels: ["volume_id", "volume_name", "raid_type", "disk_group", "host"]
    description: "Total I/O operations on Dell PowerVault ME volumes"
    calculated_metric: "volume.io.reads + volume.io.writes"
    
  - name: "dell_powervault_me.volume.io.read_bytes"
    channel: "Volume Read Throughput"
    display_name: "Volume {volume_name} Read Throughput"
    unit: "Bytes/s"
    multi_instance_labels: ["volume_id", "volume_name", "raid_type", "disk_group", "host"]
    description: "Bytes read from Dell PowerVault ME volumes"
    
  - name: "dell_powervault_me.volume.io.write_bytes"
    channel: "Volume Write Throughput"
    display_name: "Volume {volume_name} Write Throughput"
    unit: "Bytes/s"
    multi_instance_labels: ["volume_id", "volume_name", "raid_type", "disk_group", "host"]
    description: "Bytes written to Dell PowerVault ME volumes"

  # Drive Operations
  - name: "dell_powervault_me.drive.operations_progress"
    channel: "Drive Operations Progress"
    display_name: "Drive {drive_name} {operation_type} Progress"
    unit: "%"
    multi_instance_labels: ["drive_id", "drive_name", "drive_type", "operation_type", "enclosure_id", "slot", "host"]
    description: "Progress of ongoing operations on Dell PowerVault ME physical drives"
    
  - name: "dell_powervault_me.drive.has_operations"
    channel: "Drive Has Active Operations"
    display_name: "Drive {drive_name} Has Operations"
    unit: "boolean"
    multi_instance_labels: ["drive_id", "drive_name", "drive_type", "enclosure_id", "slot", "host"]
    description: "Indicates if Dell PowerVault ME physical drives have active operations"

  # Controller Performance
  - name: "dell_powervault_me.controller.temperature"
    channel: "Controller Temperature"
    display_name: "Controller {controller_name} Temperature"
    unit: "°C"
    multi_instance_labels: ["controller_id", "controller_name", "controller_slot", "host"]
    description: "Operating temperature of Dell PowerVault ME storage controllers"

  # Environmental Monitoring
  - name: "dell_powervault_me.fan.speed"
    channel: "Fan Speed"
    display_name: "Fan {fan_name} Speed"
    unit: "rpm"
    multi_instance_labels: ["fan_name", "fan_location", "enclosure_id", "host"]
    description: "Fan speed in RPM for Dell PowerVault ME cooling systems"
    
  - name: "dell_powervault_me.temperature"
    channel: "Environmental Temperature"
    display_name: "{sensor_location} Temperature"
    unit: "°C"
    multi_instance_labels: ["sensor_name", "sensor_location", "enclosure_id", "controller_id", "host"]
    description: "Environmental temperature readings that may impact performance"

  # System-wide Metrics
  - name: "dell_powervault_me.system.total_raw_capacity_bytes"
    channel: "System Total Raw Capacity"
    display_name: "System {system_name} Raw Capacity"
    unit: "Bytes"
    multi_instance_labels: ["system_name", "host"]
    description: "Total raw capacity of all drives in Dell PowerVault ME system"
    calculated_metric: "sum(drive.capacity_bytes)"
    
  - name: "dell_powervault_me.system.total_usable_capacity_bytes"
    channel: "System Total Usable Capacity"
    display_name: "System {system_name} Usable Capacity"
    unit: "Bytes"
    multi_instance_labels: ["system_name", "host"]
    description: "Total usable capacity after RAID overhead in Dell PowerVault ME system"
    calculated_metric: "sum(diskgroup.capacity_bytes)"
    
  - name: "dell_powervault_me.system.capacity_efficiency_percent"
    channel: "System Capacity Efficiency"
    display_name: "System {system_name} Efficiency"
    unit: "%"
    multi_instance_labels: ["system_name", "host"]
    description: "Capacity efficiency ratio (usable vs raw capacity)"
    calculated_metric: "(system.total_usable_capacity_bytes / system.total_raw_capacity_bytes) * 100"