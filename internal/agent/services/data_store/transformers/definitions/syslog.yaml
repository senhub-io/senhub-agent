# Syslog Probe Metrics Definitions
# Based on RFC 3164 Syslog Protocol specification

probe_name: "syslog"
version: "1.0.0"

metrics:
  # Syslog Event Severity
  - name: "syslog_event"
    channel: "syslog_severity"
    display_name: "Syslog {facility_name} Severity"
    unit: "#"
    multi_instance_labels: ["facility", "facility_name", "hostname", "tag"]
    description: "Syslog message severity level (RFC 3164)"
    category: "events"
    lookup: "sfs.syslog.severity"

tag_metadata:
  facility_name:
    type: resource
    label: "Syslog Facility"
  hostname:
    type: resource
    label: "Source Host"
  tag:
    type: resource
    label: "Application Tag"
  # System tags (injected by framework)
  host:
    type: resource
    label: "Host"
  os:
    type: resource
    label: "Operating System"
  platform:
    type: resource
    label: "Platform"
  probe_name:
    type: resource
    label: "Probe Name"
  probe_type:
    type: resource
    label: "Probe Type"