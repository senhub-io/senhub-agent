name: Master Release
on:
  push:
    tags:
      - '*.*.*'

jobs:
  check_branch:
    runs-on: ubuntu-latest
    outputs:
      is_master: ${{ steps.check.outputs.is_master }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if tag is on master branch
        id: check
        run: |
          git fetch --all
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})
          echo "Tag commit: $TAG_COMMIT"
          MASTER_BRANCH=$(git branch -r --contains $TAG_COMMIT | grep "origin/master" || echo "")
          if [[ -n "$MASTER_BRANCH" ]]; then
            echo "is_master=true" >> $GITHUB_OUTPUT
            echo "Tag is on master branch"
          else
            echo "is_master=false" >> $GITHUB_OUTPUT
            echo "Tag is not on master branch"
          fi

  release:
    needs: check_branch
    if: needs.check_branch.outputs.is_master == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.0'
      - name: Get Tag
        id: get_tag
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          files: |
            dist/senhub-agent_linux_*
            dist/senhub-agent_windows_*
            dist/senhub-agent_darwin_*
            dist/metadata.json
          generate_release_notes: false