probe_name: "network"
friendly_name: "Network Interface"
multi_instance_labels: ["interface"]

metrics:
  - name: "bytes_sent"
    channel: "network_bytes_sent"
    display_name: "Network {interface} Bytes Sent"
    unit: "bytes/sec"
    
  - name: "bytes_received"
    channel: "network_bytes_received"
    display_name: "Network {interface} Bytes Received"
    unit: "bytes/sec"
    
  - name: "packets_sent"
    channel: "network_packets_sent"
    display_name: "Network {interface} Packets Sent"
    unit: "packets/sec"
    
  - name: "packets_received"
    channel: "network_packets_received"
    display_name: "Network {interface} Packets Received"
    unit: "packets/sec"
    
  - name: "errors_sent"
    channel: "network_errors_sent"
    display_name: "Network {interface} Send Errors"
    unit: "errors/sec"
    
  - name: "errors_received"
    channel: "network_errors_received"
    display_name: "Network {interface} Receive Errors"
    unit: "errors/sec"
    
  - name: "discards_sent"
    channel: "network_discards_sent"
    display_name: "Network {interface} Send Discards"
    unit: "discards/sec"
    
  - name: "discards_received"
    channel: "network_discards_received"
    display_name: "Network {interface} Receive Discards"
    unit: "discards/sec"