name: Go-test-windows
on:
  pull_request:
    # Runs on every PR again: the repository is public, so Actions minutes
    # are free — the 2x-billing master-only restriction (#251) no longer
    # applies. Windows-specific code is additionally runtime-validated on a
    # real host (bbcloud) before releases.
    branches: [dev, master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
env:
  SENHUB_KEY: "test-key"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: 'go.mod'

      - name: Test with the Go CLI
        run: make test

      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          ENV: production
        run: make build

      - name: Test Windows Service
        shell: powershell
        run: |
          if (Test-Path -Path ".\scripts\test_windows_service.ps1") {
            .\scripts\test_windows_service.ps1
          } else {
            Write-Host "Service test script not found, skipping"
          }
