probe_name: "elasticsearch"
friendly_name: "Elasticsearch"
version: "1.0.0"
host_level: false
multi_instance_labels: ["collector", "operation", "thread_pool"]

# FREE-tier Elasticsearch / OpenSearch monitoring probe. Metrics from
# /_cluster/health and /_nodes/_local/stats REST endpoints.
# Names aligned with the otelcol-contrib elasticsearchreceiver where
# equivalents exist; extended under senhub.elasticsearch.* where not.

metrics:
  - name: "senhub.elasticsearch.up"
    channel: "elasticsearch_up"
    display_name: "Elasticsearch Up"
    unit: "#"
    category: "status"
    description: "1 when the cluster health endpoint is reachable, 0 otherwise"
    otel:
      name: senhub.elasticsearch.up
      unit: "1"
      type: gauge

  - name: "elasticsearch.cluster.health"
    channel: "elasticsearch_cluster_health"
    display_name: "Elasticsearch Cluster Health"
    unit: "#"
    category: "status"
    description: "Cluster health status encoded as integer: green=2, yellow=1, red=0"
    lookup: "elasticsearch.cluster.health"
    otel:
      name: elasticsearch.cluster.health
      unit: "1"
      type: gauge

  - name: "elasticsearch.cluster.nodes"
    channel: "elasticsearch_cluster_nodes"
    display_name: "Elasticsearch Cluster Nodes"
    unit: "#"
    category: "nodes"
    description: "Total number of nodes in the cluster"
    otel:
      name: elasticsearch.cluster.nodes
      unit: "{node}"
      type: gauge

  - name: "elasticsearch.cluster.data_nodes"
    channel: "elasticsearch_cluster_data_nodes"
    display_name: "Elasticsearch Cluster Data Nodes"
    unit: "#"
    category: "nodes"
    description: "Number of data nodes in the cluster"
    otel:
      name: elasticsearch.cluster.data_nodes
      unit: "{node}"
      type: gauge

  - name: "elasticsearch.cluster.shards.active"
    channel: "elasticsearch_shards_active"
    display_name: "Elasticsearch Active Shards"
    unit: "#"
    category: "shards"
    description: "Number of active primary and replica shards"
    otel:
      name: elasticsearch.cluster.shards.active
      unit: "{shard}"
      type: gauge

  - name: "elasticsearch.cluster.shards.unassigned"
    channel: "elasticsearch_shards_unassigned"
    display_name: "Elasticsearch Unassigned Shards"
    unit: "#"
    category: "shards"
    description: "Number of shards not assigned to any node"
    otel:
      name: elasticsearch.cluster.shards.unassigned
      unit: "{shard}"
      type: gauge

  - name: "elasticsearch.cluster.shards.relocating"
    channel: "elasticsearch_shards_relocating"
    display_name: "Elasticsearch Relocating Shards"
    unit: "#"
    category: "shards"
    description: "Number of shards being relocated between nodes"
    otel:
      name: elasticsearch.cluster.shards.relocating
      unit: "{shard}"
      type: gauge

  - name: "elasticsearch.cluster.pending_tasks"
    channel: "elasticsearch_pending_tasks"
    display_name: "Elasticsearch Pending Tasks"
    unit: "#"
    category: "tasks"
    description: "Number of cluster-level changes not yet executed"
    otel:
      name: elasticsearch.cluster.pending_tasks
      unit: "{task}"
      type: gauge

  # JVM metrics

  - name: "elasticsearch.jvm.memory.heap.used"
    channel: "elasticsearch_jvm_heap_used"
    display_name: "Elasticsearch JVM Heap Used"
    unit: "B"
    category: "jvm"
    description: "JVM heap memory currently used by the node"
    otel:
      name: elasticsearch.jvm.memory.heap.used
      unit: "By"
      type: gauge

  - name: "elasticsearch.jvm.memory.heap.max"
    channel: "elasticsearch_jvm_heap_max"
    display_name: "Elasticsearch JVM Heap Max"
    unit: "B"
    category: "jvm"
    description: "Maximum JVM heap memory available to the node"
    otel:
      name: elasticsearch.jvm.memory.heap.max
      unit: "By"
      type: gauge

  - name: "elasticsearch.jvm.gc.collections.count"
    channel: "elasticsearch_gc_{collector}_count"
    display_name: "Elasticsearch GC {collector} Collections"
    unit: "#"
    category: "jvm"
    description: "Number of GC collections for the given collector (young|old)"
    otel:
      name: elasticsearch.jvm.gc.collections.count
      unit: "{collection}"
      type: counter
    tag_to_attribute:
      collector: jvm.gc.name

  - name: "elasticsearch.jvm.gc.collections.elapsed"
    channel: "elasticsearch_gc_{collector}_time"
    display_name: "Elasticsearch GC {collector} Time"
    unit: "ms"
    category: "jvm"
    description: "Cumulative wall-clock time spent in GC for the given collector"
    otel:
      name: elasticsearch.jvm.gc.collections.elapsed
      unit: "ms"
      type: counter
    tag_to_attribute:
      collector: jvm.gc.name

  # Indexing / search

  - name: "elasticsearch.indexing.operations.completed"
    channel: "elasticsearch_indexing_{operation}_completed"
    display_name: "Elasticsearch Indexing {operation} Completed"
    unit: "#"
    category: "indexing"
    description: "Cumulative number of indexing operations completed (operation=index)"
    otel:
      name: elasticsearch.indexing.operations.completed
      unit: "{operation}"
      type: counter
    tag_to_attribute:
      operation: elasticsearch.indexing.operation

  - name: "elasticsearch.indexing.operations.time"
    channel: "elasticsearch_indexing_{operation}_time"
    display_name: "Elasticsearch Indexing {operation} Time"
    unit: "ms"
    category: "indexing"
    description: "Cumulative time spent in indexing operations"
    otel:
      name: elasticsearch.indexing.operations.time
      unit: "ms"
      type: counter
    tag_to_attribute:
      operation: elasticsearch.indexing.operation

  - name: "elasticsearch.search.operations.completed"
    channel: "elasticsearch_search_{operation}_completed"
    display_name: "Elasticsearch Search {operation} Completed"
    unit: "#"
    category: "search"
    description: "Cumulative search operations (operation=query|fetch)"
    otel:
      name: elasticsearch.search.operations.completed
      unit: "{operation}"
      type: counter
    tag_to_attribute:
      operation: elasticsearch.search.operation

  - name: "elasticsearch.search.operations.time"
    channel: "elasticsearch_search_{operation}_time"
    display_name: "Elasticsearch Search {operation} Time"
    unit: "ms"
    category: "search"
    description: "Cumulative time spent in search operations"
    otel:
      name: elasticsearch.search.operations.time
      unit: "ms"
      type: counter
    tag_to_attribute:
      operation: elasticsearch.search.operation

  # Process / OS

  - name: "elasticsearch.process.cpu.usage"
    channel: "elasticsearch_process_cpu"
    display_name: "Elasticsearch Process CPU Usage"
    unit: "%"
    category: "process"
    description: "CPU utilisation of the Elasticsearch process as a percentage (0-100)"
    otel:
      name: elasticsearch.process.cpu.usage
      unit: "1"
      type: gauge

  - name: "elasticsearch.os.memory.used"
    channel: "elasticsearch_os_memory_used"
    display_name: "Elasticsearch OS Memory Used"
    unit: "B"
    category: "os"
    description: "Physical memory used by the OS on the node"
    otel:
      name: elasticsearch.os.memory.used
      unit: "By"
      type: gauge

  # Thread pools

  - name: "elasticsearch.thread_pool.tasks.queued"
    channel: "elasticsearch_tp_{thread_pool}_queued"
    display_name: "Elasticsearch Thread Pool {thread_pool} Queued"
    unit: "#"
    category: "thread_pool"
    description: "Number of tasks currently queued in the thread pool"
    otel:
      name: elasticsearch.thread_pool.tasks.queued
      unit: "{task}"
      type: gauge
    tag_to_attribute:
      thread_pool: elasticsearch.thread_pool.name

  - name: "elasticsearch.thread_pool.tasks.completed"
    channel: "elasticsearch_tp_{thread_pool}_completed"
    display_name: "Elasticsearch Thread Pool {thread_pool} Completed"
    unit: "#"
    category: "thread_pool"
    description: "Cumulative tasks completed by the thread pool"
    otel:
      name: elasticsearch.thread_pool.tasks.completed
      unit: "{task}"
      type: counter
    tag_to_attribute:
      thread_pool: elasticsearch.thread_pool.name

  - name: "elasticsearch.thread_pool.tasks.rejected"
    channel: "elasticsearch_tp_{thread_pool}_rejected"
    display_name: "Elasticsearch Thread Pool {thread_pool} Rejected"
    unit: "#"
    category: "thread_pool"
    description: "Cumulative tasks rejected by the thread pool (queue full)"
    otel:
      name: elasticsearch.thread_pool.tasks.rejected
      unit: "{task}"
      type: counter
    tag_to_attribute:
      thread_pool: elasticsearch.thread_pool.name

tag_metadata:
  thread_pool:
    type: resource
    label: "Thread Pool"
  collector:
    type: category
    label: "GC Collector"
  operation:
    type: category
    label: "Operation"
  metric_type:
    type: category
    label: "Metric Category"
